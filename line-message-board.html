<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ข้อความดิจิทัล</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&family=Chakra+Petch:wght@600;700&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green: #06C755;
      --green-dark: #049A41;
      --green-glow: rgba(6,199,85,0.35);
      --card: rgba(15,20,15,0.75);
      --text: #e8f5e8;
      --muted: #7aaa7a;
      --border: rgba(6,199,85,0.18);
      --radius: 20px;
    }

    body {
      font-family: 'Sarabun', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
      background: #060e06;
      overflow-x: hidden;
    }

    /* === animated background === */
    .bg {
      position: fixed;
      inset: 0;
      z-index: 0;
      overflow: hidden;
    }
    .bg-grid {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(6,199,85,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(6,199,85,0.04) 1px, transparent 1px);
      background-size: 40px 40px;
    }
    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.55;
      animation: drift 12s ease-in-out infinite alternate;
    }
    .orb1 { width:420px; height:420px; top:-100px; left:-80px;  background: radial-gradient(circle, #06C755 0%, transparent 70%); animation-delay: 0s; }
    .orb2 { width:300px; height:300px; bottom:-80px; right:-60px; background: radial-gradient(circle, #00a844 0%, transparent 70%); animation-delay: -4s; }
    .orb3 { width:200px; height:200px; top:40%;  left:60%;  background: radial-gradient(circle, #06C755 0%, transparent 70%); opacity:0.25; animation-delay: -8s; }
    @keyframes drift {
      from { transform: translate(0,0) scale(1); }
      to   { transform: translate(30px, 20px) scale(1.08); }
    }

    /* === card === */
    .card {
      position: relative;
      z-index: 1;
      background: var(--card);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: 0 0 0 1px rgba(6,199,85,0.06), 0 24px 64px rgba(0,0,0,0.55);
      width: 100%;
      max-width: 440px;
      overflow: hidden;
      animation: slideUp 0.6s cubic-bezier(0.22,1,0.36,1) both;
    }
    /* top glow line */
    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent 0%, var(--green) 40%, var(--green) 60%, transparent 100%);
      opacity: 0.7;
    }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(36px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* === header === */
    .header {
      padding: 36px 28px 22px;
      position: relative;
      border-bottom: 1px solid var(--border);
    }
      50%      { opacity:0.5; transform:scale(0.7); }
    }
    .header-title {
      color: #fff;
      font-family: 'Chakra Petch', sans-serif;
      font-size: 22px;
      font-weight: 700;
      letter-spacing: 0.5px;
    }
    .header-sub {
      color: var(--muted);
      font-size: 13px;
      margin-top: 4px;
    }

    /* === profile === */
    .profile {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 20px 28px;
      border-bottom: 1px solid var(--border);
      min-height: 76px;
    }
    .avatar {
      width: 50px; height: 50px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid var(--green);
      flex-shrink: 0;
      box-shadow: 0 0 10px var(--green-glow);
    }
    .avatar-placeholder {
      width: 50px; height: 50px;
      border-radius: 50%;
      background: rgba(6,199,85,0.08);
      border: 2px solid var(--border);
      flex-shrink: 0;
    }
    .profile-info .name {
      font-weight: 600;
      font-size: 15px;
      color: var(--text);
    }
    .profile-info .uid {
      font-size: 11px;
      color: var(--muted);
      margin-top: 3px;
    }
    .skeleton {
      background: linear-gradient(90deg, rgba(6,199,85,0.06) 25%, rgba(6,199,85,0.12) 50%, rgba(6,199,85,0.06) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.4s infinite;
      border-radius: 6px;
    }
    .skeleton-name { width: 120px; height: 14px; }
    .skeleton-uid  { width: 80px;  height: 11px; margin-top: 6px; }
    @keyframes shimmer {
      0%   { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    /* === form === */
    .form-area { padding: 22px 28px 24px; border-bottom: 1px solid var(--border); }
    .label {
      font-size: 11px;
      font-weight: 600;
      font-family: 'Chakra Petch', sans-serif;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 1.2px;
      margin-bottom: 10px;
      display: block;
    }
    textarea {
      width: 100%;
      background: rgba(6,199,85,0.04);
      border: 1.5px solid var(--border);
      border-radius: 12px;
      padding: 14px 16px;
      font-family: 'Sarabun', sans-serif;
      font-size: 15px;
      color: var(--text);
      resize: none;
      min-height: 120px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      line-height: 1.6;
    }
    textarea:focus {
      border-color: var(--green);
      box-shadow: 0 0 0 3px rgba(6,199,85,0.10);
    }
    textarea::placeholder { color: rgba(122,170,122,0.4); }

    .char-count { text-align: right; font-size: 11px; color: var(--muted); margin-top: 6px; }
    .char-count.warn { color: #f0800a; }

    .btn {
      width: 100%;
      margin-top: 16px;
      padding: 15px;
      background: var(--green);
      color: #fff;
      border: none;
      border-radius: 12px;
      font-family: 'Chakra Petch', sans-serif;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s, box-shadow 0.2s;
      letter-spacing: 0.8px;
      box-shadow: 0 4px 20px var(--green-glow);
    }
    .btn:hover:not(:disabled) { background: var(--green-dark); box-shadow: 0 6px 28px var(--green-glow); }
    .btn:active:not(:disabled) { transform: scale(0.98); }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; box-shadow: none; }

    /* === recent messages === */
    .recent { padding: 20px 28px 28px; }
    .recent-title {
      font-family: 'Chakra Petch', sans-serif;
      font-size: 11px;
      font-weight: 600;
      color: var(--muted);
      letter-spacing: 1.2px;
      text-transform: uppercase;
      margin-bottom: 14px;
    }
    .msg-list { display: flex; flex-direction: column; gap: 10px; }
    .msg-item {
      background: rgba(6,199,85,0.04);
      border: 1px solid var(--border);
      border-left: 3px solid var(--green);
      border-radius: 10px;
      padding: 10px 14px;
      animation: fadeIn 0.4s ease both;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .ri-left { flex-shrink: 0; position: relative; width: 36px; height: 36px; }
    .ri-avatar {
      width: 36px; height: 36px;
      border-radius: 50%;
      object-fit: cover;
      border: 1.5px solid var(--green);
      box-shadow: 0 0 6px var(--green-glow);
      display: block;
    }
    .ri-fallback {
      width: 36px; height: 36px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--green), var(--green-dark));
      display: flex; align-items: center; justify-content: center;
      font-family: 'Chakra Petch', sans-serif;
      font-weight: 700; font-size: 14px; color: #fff;
    }
    .ri-body { flex: 1; min-width: 0; }
    @keyframes fadeIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
    .msg-item-text {
      font-size: 14px;
      color: var(--text);
      line-height: 1.5;
      margin-bottom: 5px;
    }
    .msg-item-meta {
      font-size: 11px;
      color: var(--muted);
    }
    .msg-empty {
      text-align: center;
      color: var(--muted);
      font-size: 13px;
      padding: 12px 0;
      opacity: 0.6;
    }

    /* === toast === */
    .toast-wrap {
      position: fixed; bottom: 30px; left: 50%;
      transform: translateX(-50%); z-index: 999;
      display: flex; flex-direction: column; gap: 10px; align-items: center;
    }
    .toast {
      background: rgba(6,199,85,0.15);
      border: 1px solid rgba(6,199,85,0.3);
      color: #fff;
      padding: 11px 22px;
      border-radius: 30px;
      font-size: 14px;
      font-family: 'Sarabun', sans-serif;
      box-shadow: 0 4px 20px rgba(0,0,0,0.4);
      animation: toastIn 0.35s cubic-bezier(0.22,1,0.36,1) both, toastOut 0.35s 2.5s ease forwards;
      white-space: nowrap;
      backdrop-filter: blur(12px);
    }
    .toast.error { background: rgba(180,0,0,0.3); border-color: rgba(255,60,60,0.3); }
    @keyframes toastIn  { from { opacity:0; transform:translateY(14px); } to { opacity:1; transform:translateY(0); } }
    @keyframes toastOut { to   { opacity:0; transform:translateY(14px); } }

    /* === login screen === */
    #login-screen {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; padding: 52px 28px; gap: 18px;
    }
    .line-logo {
      width: 76px; height: 76px;
      background: linear-gradient(135deg, var(--green), var(--green-dark));
      border-radius: 22px;
      display: flex; align-items: center; justify-content: center;
      font-size: 38px;
      box-shadow: 0 8px 30px var(--green-glow);
    }
    #login-screen h2 { font-size: 20px; font-weight: 700; color: var(--text); font-family: 'Chakra Petch', sans-serif; }
    #login-screen p  { font-size: 14px; color: var(--muted); text-align: center; line-height: 1.7; }
    .btn-login {
      width: 100%; max-width: 260px; padding: 14px;
      background: var(--green); color: #fff; border: none;
      border-radius: 12px; font-family: 'Chakra Petch', sans-serif;
      font-size: 15px; font-weight: 700; cursor: pointer;
      transition: background 0.2s, box-shadow 0.2s;
      box-shadow: 0 4px 20px var(--green-glow); letter-spacing: 0.5px;
    }
    .btn-login:hover { background: var(--green-dark); }

    .hidden { display: none !important; }
  </style>
</head>
<body>

<!-- background -->
<div class="bg">
  <div class="bg-grid"></div>
  <div class="orb orb1"></div>
  <div class="orb orb2"></div>
  <div class="orb orb3"></div>
</div>

<div class="card">
  <!-- Login screen -->
  <div id="login-screen" class="hidden">
    <div class="line-logo">💬</div>
    <h2>ข้อความดิจิทัล</h2>
    <p>กรุณาเข้าสู่ระบบด้วย LINE<br>เพื่อใช้งานการส่งข้อความ</p>
    <button class="btn-login" onclick="lineLogin()">เข้าสู่ระบบด้วย LINE</button>
  </div>

  <!-- Main app -->
  <div id="app-screen" class="hidden">
    <div class="header">
      <div class="header-title">ข้อความดิจิทัล</div>
      <div class="header-sub">ส่งข้อความดิจิทัลของคุณขึ้นจอ</div>
    </div>

    <div class="profile" id="profile-area">
      <div class="avatar-placeholder skeleton" id="avatar-placeholder"></div>
      <div class="profile-info">
        <div class="skeleton skeleton-name" id="skeleton-name"></div>
        <div class="skeleton skeleton-uid"  id="skeleton-uid"></div>
      </div>
    </div>

    <div class="form-area">
      <label class="label" for="msg">ข้อความ</label>
      <textarea id="msg" placeholder="พิมพ์ข้อความของคุณที่นี่..." maxlength="500" oninput="updateCount()"></textarea>
      <div class="char-count" id="char-count">0 / 500</div>
      <button class="btn" id="send-btn" onclick="sendMessage()" disabled>ส่งข้อความ →</button>
    </div>

    <!-- Recent messages -->
    <div class="recent">
      <div class="recent-title">📋 ข้อความที่ส่งล่าสุด</div>
      <div class="msg-list" id="msg-list">
        <div class="msg-empty">ยังไม่มีข้อความ</div>
      </div>
    </div>
  </div>
</div>

<div class="toast-wrap" id="toast-wrap"></div>

<script>
  const LIFF_ID  = '2007719419-zo9DgWwP';
  const SHEET_ID = '109cZGS6QIjl7N2Xox7TaMjb3SG6RSphX7PGOsIvUxYE';
  const GAS_URL  = 'https://script.google.com/macros/s/AKfycbx9Wlv7PEQzK8aHt_8l8YgHAOweg4tO4kSqGnlGu_KCWxcS_kLbuYwlFM1ncn-bK7TJ/exec';
  const SHEET_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=Messages`;

  let userProfile = null;
  const MAX_RECENT = 5;

  // ===== INIT =====
  async function init() {
    try {
      await liff.init({ liffId: LIFF_ID });
      if (!liff.isLoggedIn()) {
        show('login-screen');
      } else {
        show('app-screen');
        await loadProfile();
        loadRecent();
      }
    } catch (e) {
      toast('เกิดข้อผิดพลาดในการเชื่อมต่อ LINE', true);
      show('login-screen');
    }
  }

  function lineLogin() { liff.login(); }

  async function loadProfile() {
    try {
      userProfile = await liff.getProfile();
      renderProfile(userProfile);
      document.getElementById('send-btn').disabled = false;
    } catch (e) {
      toast('ไม่สามารถดึงข้อมูลโปรไฟล์ได้', true);
    }
  }

  function renderProfile(p) {
    document.getElementById('profile-area').innerHTML = `
      <img class="avatar" src="${p.pictureUrl||''}" alt="avatar"
           onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 50 50%22><circle cx=%2225%22 cy=%2225%22 r=%2225%22 fill=%22%23062%22/></svg>'" />
      <div class="profile-info">
        <div class="name">${esc(p.displayName)}</div>
        <div class="uid">UID: ${p.userId.slice(0,16)}…</div>
      </div>`;
  }

  // ===== RECENT from Sheet =====
  async function loadRecent() {
    try {
      const res  = await fetch(SHEET_URL + '&t=' + Date.now());
      const text = await res.text();
      const json = JSON.parse(text.replace(/^[^(]+\(/, '').replace(/\);$/, ''));
      const rows = (json.table.rows || []).slice(-MAX_RECENT).reverse();
      renderRecent(rows);
    } catch(e) {
      console.warn('loadRecent error', e);
    }
  }

  function renderRecent(rows) {
    const list = document.getElementById('msg-list');
    if (!rows.length) { list.innerHTML = '<div class="msg-empty">ยังไม่มีข้อความ</div>'; return; }
    list.innerHTML = rows.map((row, i) => {
      const c    = row.c || [];
      const ts   = c[0]?.v || '';
      const name = c[1]?.v || 'ไม่ระบุชื่อ';
      const pic  = c[3]?.v || '';
      const msg  = c[4]?.v || '';
      const initial = (name[0]||'?').toUpperCase();
      const avatarHtml = (pic && pic.startsWith('https://'))
        ? `<img class="ri-avatar" src="${esc(pic)}" alt="${esc(name)}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`
        : '';
      const fallbackStyle = (pic && pic.startsWith('https://')) ? 'display:none' : '';
      return `<div class="msg-item" style="animation-delay:${i*0.07}s">
        <div class="ri-left">
          ${avatarHtml}
          <div class="ri-fallback" style="${fallbackStyle}">${initial}</div>
        </div>
        <div class="ri-body">
          <div class="msg-item-text">${esc(msg)}</div>
          <div class="msg-item-meta">${esc(name)} · ${esc(ts)}</div>
        </div>
      </div>`;
    }).join('');
  }

  // ===== TEXTAREA =====
  function updateCount() {
    const val = document.getElementById('msg').value;
    const cc  = document.getElementById('char-count');
    cc.textContent = `${val.length} / 500`;
    cc.className = 'char-count' + (val.length > 450 ? ' warn' : '');
  }

  // ===== SEND =====
  async function sendMessage() {
    const msg = document.getElementById('msg').value.trim();
    if (!msg) { toast('กรุณาพิมพ์ข้อความก่อนส่ง'); return; }
    if (!userProfile) { toast('ยังไม่ได้โหลดโปรไฟล์', true); return; }

    const btn = document.getElementById('send-btn');
    btn.disabled = true;
    btn.textContent = 'กำลังส่ง...';

    const payload = {
      timestamp: new Date().toLocaleString('th-TH', { timeZone: 'Asia/Bangkok' }),
      userId: userProfile.userId,
      displayName: userProfile.displayName,
      pictureUrl: userProfile.pictureUrl || '',
      message: msg
    };

    try {
      await fetch(GAS_URL, {
        method: 'POST', mode: 'no-cors',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });
      toast('✅ ส่งข้อความสำเร็จ!');
      document.getElementById('msg').value = '';
      updateCount();
      // รอ GAS บันทึกแล้ว refresh recent
      setTimeout(loadRecent, 2000);
    } catch(e) {
      toast('ส่งไม่สำเร็จ กรุณาลองใหม่', true);
    } finally {
      btn.disabled = false;
      btn.textContent = 'ส่งข้อความ →';
    }
  }

  // ===== UTILS =====
  function show(id) {
    document.querySelectorAll('#login-screen, #app-screen').forEach(el => el.classList.add('hidden'));
    document.getElementById(id).classList.remove('hidden');
  }
  function toast(msg, isError = false) {
    const wrap = document.getElementById('toast-wrap');
    const el = document.createElement('div');
    el.className = 'toast' + (isError ? ' error' : '');
    el.textContent = msg;
    wrap.appendChild(el);
    setTimeout(() => el.remove(), 3000);
  }
  function esc(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  init();
</script>
</body>
</html>
