<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title id="page-title">วันวิสาขบูชา ๒๕๖๙</title>
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+Thai:wght@300;400;600;700&family=Sarabun:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --gold:#c9a84c;--gold-lt:#f0d080;--gold-dim:#7a5f28;--amber:#f5a623;
  --deep:#080503;--surface:#18110a;--card:#1c1208;--border:rgba(201,168,76,.18);
  --text:#f0e6cc;--muted:#8a7450;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--deep);color:var(--text);font-family:'Sarabun',sans-serif;min-height:100vh;overflow-x:hidden;}
#bg{position:fixed;inset:0;z-index:0;pointer-events:none;
  background:radial-gradient(ellipse 60% 40% at 50% 0%,rgba(201,168,76,.06) 0%,transparent 70%),
             radial-gradient(ellipse 30% 30% at 80% 80%,rgba(232,130,26,.04) 0%,transparent 60%);}
#stars{position:fixed;inset:0;z-index:0;pointer-events:none;}
#app{position:relative;z-index:10;max-width:820px;margin:0 auto;padding:0 20px 60px;}

/* ── LIFF gate (บังคับเปิดผ่าน LIFF) ── */
#liff-gate{
  position:fixed;inset:0;z-index:200;
  background:var(--deep);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:20px;padding:32px;text-align:center;
}
#liff-gate .gate-icon{font-size:56px;animation:pulse 3s ease-in-out infinite;}
#liff-gate h2{font-family:'Noto Serif Thai',serif;font-size:1.4rem;color:var(--gold-lt);}
#liff-gate p{color:var(--muted);font-size:.9rem;line-height:1.8;max-width:320px;}
.btn-line-login{
  display:inline-flex;align-items:center;gap:10px;
  padding:14px 32px;background:linear-gradient(135deg,#00a000,#00c300);
  border:none;border-radius:40px;color:#fff;font-family:'Sarabun',sans-serif;
  font-size:1.1rem;font-weight:700;cursor:pointer;
  box-shadow:0 4px 20px rgba(0,195,0,.4);transition:all .25s;
}
.btn-line-login:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(0,195,0,.6);}

/* Header */
header{text-align:center;padding:48px 0 28px;}
.logo-wrap{display:inline-flex;align-items:center;justify-content:center;
  width:80px;height:80px;border-radius:50%;margin-bottom:16px;
  background:radial-gradient(circle,rgba(201,168,76,.15),transparent 70%);
  animation:pulse 3s ease-in-out infinite;}
#logo-img{width:64px;height:64px;object-fit:contain;border-radius:50%;display:none;}
#logo-emoji{font-size:48px;line-height:1;display:block;}
@keyframes pulse{0%,100%{filter:drop-shadow(0 0 6px rgba(245,166,35,.5));}50%{filter:drop-shadow(0 0 22px rgba(245,166,35,.9));}}
h1{font-family:'Noto Serif Thai',serif;font-size:clamp(1.5rem,5vw,2.4rem);font-weight:700;
  color:var(--gold-lt);letter-spacing:.02em;text-shadow:0 2px 24px rgba(201,168,76,.35);margin-bottom:6px;}
.subtitle{color:var(--muted);font-size:.9rem;letter-spacing:.1em;}

/* LINE profile strip */
#line-profile{display:none;align-items:center;gap:10px;
  background:rgba(0,185,0,.08);border:1px solid rgba(0,185,0,.2);
  border-radius:40px;padding:8px 16px;margin:0 auto 20px;
  width:fit-content;max-width:100%;}
#line-profile img{width:32px;height:32px;border-radius:50%;object-fit:cover;}
.ln-name{font-size:.88rem;color:#7df07d;font-weight:600;}

/* Tabs */
.tab-bar{display:flex;gap:2px;background:var(--surface);border:1px solid var(--border);
  border-radius:14px;padding:4px;margin:0 0 24px;overflow-x:auto;}
.tab-bar::-webkit-scrollbar{display:none;}
.tab{flex:1;padding:11px 8px;background:none;border:none;border-radius:10px;
  color:var(--muted);font-family:'Sarabun',sans-serif;font-size:.85rem;font-weight:600;
  cursor:pointer;transition:all .25s;white-space:nowrap;}
.tab.on{background:var(--card);color:var(--gold-lt);border:1px solid var(--border);box-shadow:0 2px 10px rgba(0,0,0,.3);}
.tab:hover:not(.on){color:var(--gold);}
.panel{display:none;animation:fadeUp .35s ease;}
.panel.on{display:block;}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}

/* Card */
.card{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:28px;margin-bottom:16px;}
.card-title{font-family:'Noto Serif Thai',serif;font-size:1rem;font-weight:600;color:var(--gold);margin-bottom:20px;display:flex;align-items:center;gap:8px;}

/* Form */
.field{margin-bottom:18px;}
.field label{display:block;font-size:.76rem;font-weight:600;color:var(--muted);margin-bottom:7px;text-transform:uppercase;letter-spacing:.08em;}
.field label .req{color:var(--amber);margin-left:2px;}
.field input{width:100%;padding:12px 15px;background:rgba(0,0,0,.4);border:1.5px solid rgba(201,168,76,.2);border-radius:10px;color:var(--text);font-family:'Sarabun',sans-serif;font-size:.97rem;outline:none;transition:border-color .2s,box-shadow .2s;}
.field input:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(201,168,76,.1);}
.field input::placeholder{color:rgba(138,116,80,.5);}
.field input.err-field{border-color:#e07070!important;box-shadow:0 0 0 3px rgba(224,112,112,.15)!important;}
.row-2{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
@media(max-width:520px){.row-2{grid-template-columns:1fr;}}

/* Buttons */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:12px 26px;border:none;border-radius:10px;font-family:'Sarabun',sans-serif;font-size:.95rem;font-weight:600;cursor:pointer;transition:all .25s;white-space:nowrap;}
.btn-primary{background:linear-gradient(135deg,#a07830,var(--gold));color:#0a0503;box-shadow:0 4px 16px rgba(201,168,76,.25);}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(201,168,76,.4);}
.btn-primary:active{transform:translateY(0) scale(.98);}
.btn-primary:disabled{opacity:.55;transform:none;cursor:not-allowed;}
.btn-sm{padding:9px 18px;font-size:.84rem;border-radius:8px;}
.btn-full{width:100%;}
.divider{height:1px;background:var(--border);margin:20px 0;}

/* Candle zone */
.candle-zone{min-height:180px;display:flex;flex-wrap:wrap;gap:16px;align-content:flex-start;padding:4px 0;margin-top:16px;}
.candle-wrap{display:flex;flex-direction:column;align-items:center;gap:4px;
  cursor:pointer;animation:popIn .5s cubic-bezier(.34,1.56,.64,1);}
.candle-wrap:hover .c-flame-g{filter:brightness(1.3);}
@keyframes popIn{from{opacity:0;transform:scale(.4) translateY(20px);}to{opacity:1;transform:scale(1) translateY(0);}}
.candle-lbl{font-size:.64rem;color:var(--gold-lt);text-align:center;max-width:60px;line-height:1.3;word-break:break-word;}
.c-avatar{width:30px;height:30px;border-radius:50%;object-fit:cover;border:1.5px solid rgba(201,168,76,.4);}
.c-avatar-d{width:30px;height:30px;border-radius:50%;background:rgba(201,168,76,.15);border:1.5px solid rgba(201,168,76,.3);display:flex;align-items:center;justify-content:center;font-size:.72rem;color:var(--gold);font-weight:600;}
.flame{animation:flicker 1.8s ease-in-out infinite;transform-origin:50% 100%;}
@keyframes flicker{0%,100%{transform:scaleX(1) scaleY(1) rotate(-1deg);}30%{transform:scaleX(.88) scaleY(1.12) rotate(1.5deg);}60%{transform:scaleX(1.08) scaleY(.93) rotate(-1.8deg);}}
.counter-pill{display:inline-flex;align-items:center;gap:6px;background:rgba(201,168,76,.1);border:1px solid var(--border);border-radius:20px;padding:5px 16px;font-size:.82rem;color:var(--muted);}
.counter-pill b{color:var(--amber);}
.candle-empty{width:100%;text-align:center;padding:32px 0;color:var(--muted);font-size:.9rem;}
.loading-txt{width:100%;text-align:center;padding:24px 0;color:var(--muted);font-size:.85rem;}

/* ── Candle Popup Modal ── */
#candle-modal{
  position:fixed;inset:0;z-index:100;
  display:flex;align-items:center;justify-content:center;
  background:rgba(0,0,0,.7);backdrop-filter:blur(4px);
  opacity:0;pointer-events:none;transition:opacity .25s;
}
#candle-modal.show{opacity:1;pointer-events:auto;}
.modal-box{
  background:var(--card);border:1px solid rgba(201,168,76,.4);
  border-radius:20px;padding:28px 32px;max-width:340px;width:90%;
  text-align:center;position:relative;
  box-shadow:0 20px 60px rgba(0,0,0,.6),0 0 40px rgba(201,168,76,.1);
  transform:scale(.9);transition:transform .25s;
}
#candle-modal.show .modal-box{transform:scale(1);}
.modal-avatar{width:60px;height:60px;border-radius:50%;object-fit:cover;border:2px solid rgba(201,168,76,.5);margin:0 auto 12px;}
.modal-avatar-d{width:60px;height:60px;border-radius:50%;background:rgba(201,168,76,.15);border:2px solid rgba(201,168,76,.4);display:flex;align-items:center;justify-content:center;font-size:1.4rem;color:var(--gold);font-weight:700;margin:0 auto 12px;}
.modal-name{font-family:'Noto Serif Thai',serif;font-size:1.1rem;color:var(--gold-lt);margin-bottom:6px;}
.modal-candle{font-size:2.5rem;margin-bottom:12px;}
.modal-wish{font-size:.9rem;color:var(--text);background:rgba(0,0,0,.3);border-radius:10px;padding:10px 14px;margin-bottom:16px;font-style:italic;line-height:1.7;border-left:2px solid var(--gold-dim);}
.modal-no-wish{font-size:.85rem;color:var(--muted);margin-bottom:16px;}
.modal-close{position:absolute;top:12px;right:14px;background:none;border:none;color:var(--muted);font-size:1.2rem;cursor:pointer;padding:4px;}
.modal-close:hover{color:var(--text);}

/* Prayer */
.prayer-card{margin-bottom:10px;}
.prayer-head{display:flex;align-items:center;gap:12px;cursor:pointer;user-select:none;}
.prayer-ico{font-size:1.4rem;flex-shrink:0;}
.prayer-ttl{font-family:'Noto Serif Thai',serif;font-size:.98rem;color:var(--gold);flex:1;}
.badge{padding:3px 11px;border-radius:20px;font-size:.7rem;border:1px solid;white-space:nowrap;}
.chevron{color:var(--muted);transition:transform .3s;font-size:.9rem;margin-left:4px;}
.prayer-card.open .chevron{transform:rotate(90deg);}
.prayer-body{display:none;margin-top:16px;}
.prayer-card.open .prayer-body{display:block;}
.chant-text{font-family:'Noto Serif Thai',serif;font-size:.9rem;line-height:2.3;color:var(--text);background:rgba(0,0,0,.25);border-radius:10px;padding:16px 18px;margin-bottom:14px;border-left:2px solid var(--gold-dim);white-space:pre-wrap;}
.chant-row{display:flex;align-items:center;gap:14px;flex-wrap:wrap;}
.chant-stat{font-size:.84rem;color:var(--muted);}
.chant-stat b{color:var(--amber);}

/* Toast */
#toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(70px);background:var(--card);border:1px solid var(--gold);border-radius:40px;padding:11px 24px;color:var(--gold-lt);font-size:.9rem;z-index:999;transition:transform .4s cubic-bezier(.34,1.56,.64,1);pointer-events:none;white-space:nowrap;}
#toast.show{transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>
<div id="bg"></div>
<canvas id="stars"></canvas>

<!-- LIFF Gate — บังคับเปิดผ่าน LINE -->
<div id="liff-gate">
  <div class="gate-icon">🪔</div>
  <h2>วันวิสาขบูชา ๒๕๖๙</h2>
  <p>กรุณาเปิดผ่าน LINE เพื่อเข้าใช้งาน<br>ระบบต้องการข้อมูลโปรไฟล์ LINE ของคุณ</p>
  <button class="btn-line-login" onclick="loginLiff()">💚 เข้าสู่ระบบด้วย LINE</button>
</div>

<div id="app" style="display:none;">
  <header>
    <div class="logo-wrap">
      <img id="logo-img" src="" alt="logo">
      <span id="logo-emoji">🪔</span>
    </div>
    <h1 id="site-title">วันวิสาขบูชา ๒๕๖๙</h1>
    <p class="subtitle" id="site-subtitle">น้อมนำจิตใจ · สู่ความสงบ · บุญ · ธรรมะ</p>
  </header>

  <div id="line-profile">
    <img id="lp-img" src="" alt="">
    <div class="ln-name" id="lp-name"></div>
  </div>

  <nav class="tab-bar">
    <button class="tab on" data-p="candle">🕯️ เวียนเทียน</button>
    <button class="tab" data-p="prayer">📿 บทสวด</button>
  </nav>

  <div class="panel on" id="panel-candle">
    <div class="card">
      <div class="card-title">🕯️ จุดเทียนออนไลน์</div>
      <div class="row-2">
        <div class="field">
          <label>ชื่อของคุณ <span class="req">*</span></label>
          <input id="c-name" type="text" placeholder="จำเป็นต้องกรอก" maxlength="30" required>
        </div>
        <div class="field">
          <label>คำอธิษฐาน (ไม่บังคับ)</label>
          <input id="c-wish" type="text" placeholder="ขอให้..." maxlength="60">
        </div>
      </div>
      <button class="btn btn-primary btn-full" id="btn-light" onclick="lightCandle()">🕯️ จุดเทียนบูชา</button>
      <div class="divider"></div>
      <div class="counter-pill">เทียนที่จุดแล้ว <b id="candle-total">0</b> เล่ม</div>
      <div class="candle-zone" id="candle-grid">
        <div class="loading-txt">⏳ กำลังโหลด...</div>
      </div>
    </div>
  </div>

  <div class="panel" id="panel-prayer">
    <div id="prayer-list"></div>
  </div>
</div>

<!-- Candle Popup -->
<div id="candle-modal" onclick="closeModal(event)">
  <div class="modal-box">
    <button class="modal-close" onclick="document.getElementById('candle-modal').classList.remove('show')">✕</button>
    <div class="modal-candle">🕯️</div>
    <div id="modal-avatar-wrap"></div>
    <div class="modal-name" id="modal-name"></div>
    <div id="modal-wish-wrap"></div>
  </div>
</div>

<div id="toast"></div>

<script>
// ═══════════════════════════════════
// CONFIG
// ═══════════════════════════════════
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzbOkYcp1g-HPSl1HsxP0_sVtudfxvU_Kkg-GPzT5dbIBrwPnludL6X59GERUK1-xyN5Q/exec";
const DISCORD_WH = "https://discord.com/api/webhooks/1495459514348994692/o61b7SllQmS06vi7TG9AKie4pLEYXkTYTJ2AlcVMjWCvJzNkbcONSyYb0zqhqFGSHJo8";
const LIFF_ID    = "2007719419-hN3Ikxwz";

let chants      = JSON.parse(localStorage.getItem("vb4_p") || "{}");
let lineProfile = null;

function saveChants(){ localStorage.setItem("vb4_p", JSON.stringify(chants)); }

// ═══════════════════════════════════
// STARS
// ═══════════════════════════════════
(()=>{
  const c=document.getElementById("stars"),cx=c.getContext("2d");
  const s=Array.from({length:80},()=>({x:Math.random(),y:Math.random(),r:Math.random()*.9+.2,ph:Math.random()*Math.PI*2,sp:Math.random()*.01+.004}));
  function resize(){c.width=innerWidth;c.height=innerHeight;}resize();addEventListener("resize",resize);
  function draw(t){cx.clearRect(0,0,c.width,c.height);s.forEach(st=>{const a=.2+.4*Math.sin(t*st.sp+st.ph);cx.beginPath();cx.arc(st.x*c.width,st.y*c.height,st.r,0,Math.PI*2);cx.fillStyle=`rgba(240,208,120,${a})`;cx.fill();});requestAnimationFrame(draw);}
  requestAnimationFrame(draw);
})();

// ═══════════════════════════════════
// TABS
// ═══════════════════════════════════
document.querySelector(".tab-bar").addEventListener("click",e=>{
  const b=e.target.closest(".tab");if(!b)return;
  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("on"));
  document.querySelectorAll(".panel").forEach(p=>p.classList.remove("on"));
  b.classList.add("on");
  document.getElementById("panel-"+b.dataset.p).classList.add("on");
});

// ═══════════════════════════════════
// TOAST
// ═══════════════════════════════════
let tTmr;
function toast(m){const t=document.getElementById("toast");t.textContent=m;t.classList.add("show");clearTimeout(tTmr);tTmr=setTimeout(()=>t.classList.remove("show"),2800);}

// ═══════════════════════════════════
// CONFIG (title/subtitle จาก Sheet, logo จาก localStorage)
// ═══════════════════════════════════
async function fetchConfig(){
  // logo เก็บใน localStorage (set โดย admin บนเครื่องนั้น → แต่ผู้ใช้ไม่มี)
  // วิธีที่ถูก: เก็บ logo URL ใน Sheet Config → fetch มา
  try{
    const r = await fetch(SCRIPT_URL+"?action=config");
    if(!r.ok) throw new Error();
    const d = await r.json();
    if(d.title){
      document.getElementById("site-title").textContent = d.title;
      document.getElementById("page-title").textContent = d.title;
    }
    if(d.subtitle) document.getElementById("site-subtitle").textContent = d.subtitle;
    // logo — เก็บเป็น key "logo" ใน Config sheet
    if(d.logo && d.logo.length > 4){
      document.getElementById("logo-img").src = d.logo;
      document.getElementById("logo-img").style.display = "block";
      document.getElementById("logo-emoji").style.display = "none";
    }
  }catch(e){ /* ใช้ default */ }
}

// ═══════════════════════════════════
// LIFF — บังคับ login
// ═══════════════════════════════════
async function initLiff(){
  try{
    await liff.init({liffId: LIFF_ID});
    if(!liff.isLoggedIn()){
      // แสดง gate บังคับ login
      document.getElementById("liff-gate").style.display = "flex";
      document.getElementById("app").style.display = "none";
      return;
    }
    // ล็อกอินแล้ว → ดึงโปรไฟล์
    const p = await liff.getProfile();
    lineProfile = {name:p.displayName, id:p.userId, pic:p.pictureUrl||""};
    // แสดง app
    document.getElementById("liff-gate").style.display = "none";
    document.getElementById("app").style.display = "block";
    // แสดง profile strip
    document.getElementById("lp-img").src = lineProfile.pic;
    document.getElementById("lp-name").textContent = lineProfile.name;
    document.getElementById("line-profile").style.display = "flex";
    // prefill ชื่อ
    document.getElementById("c-name").value = lineProfile.name;
    // บันทึก visitor
    postSheet("visitor",{lineId:lineProfile.id, lineName:lineProfile.name, linePic:lineProfile.pic});
    // โหลดข้อมูล
    fetchConfig();
    fetchCandles();
    renderPrayers();
    setInterval(fetchCandles, 30000);
  }catch(e){
    console.error("LIFF init error:",e);
    // fallback: ถ้า LIFF init fail (เช่น dev environment) ให้ผ่านได้
    document.getElementById("liff-gate").style.display = "none";
    document.getElementById("app").style.display = "block";
    fetchConfig();
    fetchCandles();
    renderPrayers();
  }
}

function loginLiff(){
  liff.login();
}

// ═══════════════════════════════════
// CANDLE
// ═══════════════════════════════════
const hues=[44,30,200,340,280,120,180,60,260];

function candleSVG(h){
  return `<svg width="32" height="68" viewBox="0 0 36 74" overflow="visible">
    <ellipse cx="18" cy="14" rx="13" ry="13" fill="rgba(245,166,35,.1)"/>
    <ellipse cx="18" cy="15" rx="7" ry="7" fill="rgba(245,166,35,.14)"/>
    <g class="flame c-flame-g">
      <ellipse cx="18" cy="13" rx="4.5" ry="8" fill="#f5a623" opacity=".9"/>
      <ellipse cx="18" cy="15" rx="2.8" ry="5" fill="#fff2aa"/>
      <ellipse cx="18" cy="17" rx="1.6" ry="2.8" fill="white"/>
    </g>
    <rect x="17" y="21" width="2" height="5" rx="1" fill="#5a3e1b"/>
    <rect x="13" y="26" width="10" height="32" rx="3.5" fill="hsl(${h},65%,86%)"/>
    <rect x="15" y="26" width="3.5" height="32" rx="2" fill="hsl(${h},55%,94%)" opacity=".4"/>
    <ellipse cx="18" cy="57" rx="6" ry="2.2" fill="hsl(${h},45%,68%)"/>
    <path d="M13 37 Q11.5 43 12.5 47 Q13.5 51 13 47 Q13 43 15 39Z" fill="hsl(${h},55%,88%)" opacity=".5"/>
  </svg>`;
}

function avatarEl(pic,name){
  const init = esc((name||"?")[0].toUpperCase());
  if(pic) return `<img class="c-avatar" src="${esc(pic)}" alt="" onerror="this.outerHTML='<div class=c-avatar-d>${init}</div>'">`;
  return `<div class="c-avatar-d">${init}</div>`;
}

let candleRows = []; // เก็บไว้ใช้กับ popup

async function fetchCandles(){
  try{
    const r = await fetch(SCRIPT_URL+"?action=candles");
    if(!r.ok) throw new Error("HTTP "+r.status);
    const d = await r.json();
    candleRows = d.rows || [];
    renderCandleGrid(candleRows, d.total ?? candleRows.length);
  }catch(e){
    document.getElementById("candle-grid").innerHTML='<div class="candle-empty">ไม่สามารถโหลดได้ · ลองใหม่อีกครั้ง</div>';
    console.warn("fetchCandles:",e);
  }
}

function renderCandleGrid(rows, total){
  document.getElementById("candle-total").textContent = total;
  const display = rows.slice(0,20);
  if(!display.length){
    document.getElementById("candle-grid").innerHTML='<div class="candle-empty">ยังไม่มีการจุดเทียน · เป็นคนแรกได้เลย 🙏</div>';
    return;
  }
  document.getElementById("candle-grid").innerHTML = display.map((c,i)=>`
    <div class="candle-wrap" onclick="showCandlePopup(${i})" title="คลิกดูคำอธิษฐาน">
      ${candleSVG(hues[i%hues.length])}
      ${avatarEl(c.pic, c.name)}
      <div class="candle-lbl">${esc(c.name)}</div>
    </div>`).join("");
}

// ── Candle Popup ──
function showCandlePopup(i){
  const c = candleRows[i];
  if(!c) return;
  const aw = document.getElementById("modal-avatar-wrap");
  const init = esc((c.name||"?")[0].toUpperCase());
  aw.innerHTML = c.pic
    ? `<img class="modal-avatar" src="${esc(c.pic)}" alt="" onerror="this.outerHTML='<div class=modal-avatar-d>${init}</div>'">`
    : `<div class="modal-avatar-d">${init}</div>`;
  document.getElementById("modal-name").textContent = c.name || "";
  const ww = document.getElementById("modal-wish-wrap");
  if(c.wish){
    ww.innerHTML = `<div class="modal-wish">"${esc(c.wish)}"</div>`;
  } else {
    ww.innerHTML = `<div class="modal-no-wish">ไม่ได้ใส่คำอธิษฐาน</div>`;
  }
  document.getElementById("candle-modal").classList.add("show");
}

function closeModal(e){
  if(e.target === document.getElementById("candle-modal"))
    document.getElementById("candle-modal").classList.remove("show");
}

// ── Light Candle ──
async function lightCandle(){
  const nameEl = document.getElementById("c-name");
  const name   = nameEl.value.trim();
  const wish   = document.getElementById("c-wish").value.trim();

  // validate ชื่อบังคับ
  if(!name){
    nameEl.classList.add("err-field");
    nameEl.focus();
    toast("❗ กรุณากรอกชื่อก่อนจุดเทียน");
    setTimeout(()=>nameEl.classList.remove("err-field"), 2000);
    return;
  }

  const btn = document.getElementById("btn-light");
  btn.disabled = true; btn.textContent = "⏳ กำลังจุด...";

  const pic    = lineProfile?.pic  || "";
  const lineId = lineProfile?.id   || "";
  const lineName = lineProfile?.name || "";

  try{
    await fetch(SCRIPT_URL,{
      method:"POST", headers:{"Content-Type":"application/json"},
      body: JSON.stringify({type:"candle", name, wish, pic, lineId, lineName}),
      mode:"no-cors"
    });
    await new Promise(r=>setTimeout(r,1400));
    await fetchCandles();

    document.getElementById("c-name").value = lineProfile?.name || "";
    document.getElementById("c-wish").value = "";
    toast(`🕯️ จุดเทียนให้ "${name}" แล้ว · สาธุ! 🙏`);

    // Discord — แจ้งทุกครั้งที่จุดเทียน
    const cnt = parseInt(document.getElementById("candle-total").textContent) || 0;
    const wishPart = wish ? `\n> *"${wish}"*` : "";
    autoDiscord(`🕯️ **${name}** จุดเทียนบูชาแล้ว${wishPart}`);

    // Discord milestone
    if(cnt > 0 && cnt % 10 === 0)
      autoDiscord(`🪔 มีผู้จุดเทียนออนไลน์ครบ **${cnt} เล่ม**แล้ว! สาธุ 🙏`);

  }catch(e){
    toast("❌ เกิดข้อผิดพลาด ลองใหม่");
  }finally{
    btn.disabled = false; btn.textContent = "🕯️ จุดเทียนบูชา";
  }
}

document.getElementById("c-name").addEventListener("keydown",e=>{if(e.key==="Enter")lightCandle();});

function merit(n){for(let i=ML.length-1;i>=0;i--)if(n>=ML[i].min)return ML[i];return ML[0];}

function renderPrayers(){
  document.getElementById("prayer-list").innerHTML=prayers.map(p=>{
    const n=chants[p.id]||0,m=merit(n);
    return `<div class="card prayer-card" id="pc-${p.id}" onclick="toggleP('${p.id}',event)">
      <div class="prayer-head">
        <span class="prayer-ico">${p.icon}</span>
        <span class="prayer-ttl">${p.title}</span>
        <span class="badge" id="badge-${p.id}" style="background:${m.bg};border-color:${m.c};color:${m.c};">${m.l}</span>
        <span class="chevron">›</span>
      </div>
      <div class="prayer-body">
        <div class="divider"></div>
        <pre class="chant-text">${p.text}</pre>
        <div class="chant-row">
          <button class="btn btn-primary btn-sm" onclick="doChant('${p.id}',event)">🙏 สวดมนต์</button>
          <span class="chant-stat">สวดแล้ว <b id="cn-${p.id}">${n}</b> ครั้ง</span>

    </div>`;
  }).join("");
}

function toggleP(id,e){if(e.target.closest(".btn"))return;document.getElementById("pc-"+id).classList.toggle("open");}

function doChant(id,e){
  e.stopPropagation();
  chants[id]=(chants[id]||0)+1;saveChants();
  const n=chants[id],m=merit(n);
  document.getElementById("cn-"+id).textContent=n;
  const b=document.getElementById("badge-"+id);
  b.textContent=m.l;b.style.color=m.c;b.style.background=m.bg;b.style.borderColor=m.c;
  toast(`🙏 สาธุ! สวดครั้งที่ ${n}`);
  // upsert ใน sheet (ส่ง lineId ไปด้วยเพื่อ upsert per user)
  postSheet("chant",{prayer:prayers.find(p=>p.id===id)?.title, prayerId:id, count:n, lineId:lineProfile?.id||"", lineName:lineProfile?.name||""});
  if(n===108) autoDiscord(`🌟 **${prayers.find(p=>p.id===id)?.title}** — สวดครบ 108 ครั้ง! สาธุ 🙏`);
}

async function postSheet(type,data){
  try{
    await fetch(SCRIPT_URL,{method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({type,...data}),mode:"no-cors"});
  }catch(e){console.warn("Sheet:",e);}
}

// ═══════════════════════════════════
// DISCORD
// ═══════════════════════════════════
async function autoDiscord(content){
  try{
    const tot = Object.values(chants).reduce((a,b)=>a+b,0);
    const cnt = parseInt(document.getElementById("candle-total").textContent)||0;
    await fetch(DISCORD_WH,{method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({username:"วิสาขบูชา 🪔",embeds:[{
        title:"🪔 วันวิสาขบูชา ๒๕๖๙",description:content,color:0xc9a84c,
        fields:[
          {name:"🕯️ เทียนทั้งหมด",value:`${cnt} เล่ม`,inline:true},
          {name:"🙏 สวดมนต์รวม",value:`${tot} ครั้ง`,inline:true},
        ],
        footer:{text:"สาธุ 🙏"},timestamp:new Date().toISOString()
      }]})});
  }catch(e){console.warn("Discord:",e);}
}
