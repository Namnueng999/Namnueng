<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title id="page-title">วันวิสาขบูชา ๒๕๖๙</title>
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+Thai:wght@300;400;600;700&family=Sarabun:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --gold:#c9a84c;--gold-lt:#f0d080;--gold-dim:#7a5f28;--amber:#f5a623;
  --deep:#080503;--surface:#18110a;--card:#1c1208;--border:rgba(201,168,76,.18);
  --text:#f0e6cc;--muted:#8a7450;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--deep);color:var(--text);font-family:'Sarabun',sans-serif;min-height:100vh;overflow-x:hidden;}
#bg{position:fixed;inset:0;z-index:0;pointer-events:none;
  background:radial-gradient(ellipse 60% 40% at 50% 0%,rgba(201,168,76,.06) 0%,transparent 70%),
             radial-gradient(ellipse 30% 30% at 80% 80%,rgba(232,130,26,.04) 0%,transparent 60%);}
#stars{position:fixed;inset:0;z-index:0;pointer-events:none;}
#app{position:relative;z-index:10;max-width:820px;margin:0 auto;padding:0 20px 60px;}

/* Header */
header{text-align:center;padding:48px 0 32px;}
.logo-wrap{display:inline-flex;align-items:center;justify-content:center;
  width:80px;height:80px;border-radius:50%;margin-bottom:16px;
  background:radial-gradient(circle,rgba(201,168,76,.15),transparent 70%);
  animation:pulse 3s ease-in-out infinite;}
.logo-wrap img{width:64px;height:64px;object-fit:contain;border-radius:50%;}
.logo-emoji{font-size:48px;line-height:1;}
@keyframes pulse{0%,100%{filter:drop-shadow(0 0 6px rgba(245,166,35,.5));}50%{filter:drop-shadow(0 0 22px rgba(245,166,35,.9));}}
h1{font-family:'Noto Serif Thai',serif;font-size:clamp(1.5rem,5vw,2.4rem);font-weight:700;
  color:var(--gold-lt);letter-spacing:.02em;text-shadow:0 2px 24px rgba(201,168,76,.35);margin-bottom:6px;}
.subtitle{color:var(--muted);font-size:.9rem;letter-spacing:.1em;}

/* LINE profile strip */
#line-profile{display:none;align-items:center;gap:10px;
  background:rgba(0,185,0,.08);border:1px solid rgba(0,185,0,.2);
  border-radius:40px;padding:8px 16px;margin:0 auto 24px;
  width:fit-content;max-width:100%;}
#line-profile img{width:32px;height:32px;border-radius:50%;object-fit:cover;}
#line-profile .ln-name{font-size:.88rem;color:#7df07d;font-weight:600;}
#line-profile .ln-id{font-size:.72rem;color:var(--muted);}

/* Tabs */
.tab-bar{display:flex;gap:2px;background:var(--surface);border:1px solid var(--border);
  border-radius:14px;padding:4px;margin:0 0 24px;overflow-x:auto;}
.tab-bar::-webkit-scrollbar{display:none;}
.tab{flex:1;min-width:0;padding:11px 8px;background:none;border:none;border-radius:10px;
  color:var(--muted);font-family:'Sarabun',sans-serif;font-size:.85rem;font-weight:600;
  cursor:pointer;transition:all .25s;white-space:nowrap;}
.tab.on{background:var(--card);color:var(--gold-lt);border:1px solid var(--border);box-shadow:0 2px 10px rgba(0,0,0,.3);}
.tab:hover:not(.on){color:var(--gold);}
.panel{display:none;animation:fadeUp .35s ease;}
.panel.on{display:block;}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}

/* Card */
.card{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:28px;margin-bottom:16px;}
.card-title{font-family:'Noto Serif Thai',serif;font-size:1rem;font-weight:600;color:var(--gold);margin-bottom:20px;display:flex;align-items:center;gap:8px;}

/* Form */
.field{margin-bottom:18px;}
.field label{display:block;font-size:.76rem;font-weight:600;color:var(--muted);margin-bottom:7px;text-transform:uppercase;letter-spacing:.08em;}
.field input,.field textarea{width:100%;padding:12px 15px;background:rgba(0,0,0,.4);border:1.5px solid rgba(201,168,76,.2);border-radius:10px;color:var(--text);font-family:'Sarabun',sans-serif;font-size:.97rem;outline:none;transition:border-color .2s,box-shadow .2s;}
.field input:focus,.field textarea:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(201,168,76,.1);}
.field input::placeholder,.field textarea::placeholder{color:rgba(138,116,80,.5);}
.row-2{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
@media(max-width:520px){.row-2{grid-template-columns:1fr;}}

/* Buttons */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:12px 26px;border:none;border-radius:10px;font-family:'Sarabun',sans-serif;font-size:.95rem;font-weight:600;cursor:pointer;transition:all .25s;text-decoration:none;white-space:nowrap;}
.btn-primary{background:linear-gradient(135deg,#a07830,var(--gold));color:#0a0503;box-shadow:0 4px 16px rgba(201,168,76,.25);}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(201,168,76,.4);}
.btn-primary:active{transform:translateY(0);}
.btn-sm{padding:9px 18px;font-size:.84rem;border-radius:8px;}
.btn-full{width:100%;}
.btn-ghost{background:rgba(201,168,76,.1);border:1px solid rgba(201,168,76,.3);color:var(--gold-lt);}
.btn-ghost:hover{background:rgba(201,168,76,.2);}
.divider{height:1px;background:var(--border);margin:20px 0;}

/* Candle zone */
.candle-zone{min-height:180px;display:flex;flex-wrap:wrap;gap:16px;align-content:flex-start;padding:4px 0;}
.candle-wrap{display:flex;flex-direction:column;align-items:center;gap:4px;animation:popIn .5s cubic-bezier(.34,1.56,.64,1);}
@keyframes popIn{from{opacity:0;transform:scale(.4) translateY(20px);}to{opacity:1;transform:scale(1) translateY(0);}}
.candle-lbl{font-size:.64rem;color:var(--gold-lt);text-align:center;max-width:60px;line-height:1.3;word-break:break-word;}
.candle-avatar{width:30px;height:30px;border-radius:50%;object-fit:cover;border:1.5px solid rgba(201,168,76,.4);background:rgba(201,168,76,.15);}
.candle-avatar-default{width:30px;height:30px;border-radius:50%;background:rgba(201,168,76,.15);border:1.5px solid rgba(201,168,76,.3);display:flex;align-items:center;justify-content:center;font-size:.7rem;color:var(--gold);}
.flame{animation:flicker 1.8s ease-in-out infinite;transform-origin:50% 100%;}
@keyframes flicker{0%,100%{transform:scaleX(1) scaleY(1) rotate(-1deg);}30%{transform:scaleX(.88) scaleY(1.12) rotate(1.5deg);}60%{transform:scaleX(1.08) scaleY(.93) rotate(-1.8deg);}}
.counter-pill{display:inline-flex;align-items:center;gap:6px;background:rgba(201,168,76,.1);border:1px solid var(--border);border-radius:20px;padding:5px 16px;font-size:.82rem;color:var(--muted);margin-top:4px;}
.counter-pill b{color:var(--amber);}
.candle-empty{width:100%;text-align:center;padding:32px 0;color:var(--muted);font-size:.9rem;}

/* Prayer */
.prayer-card{margin-bottom:10px;}
.prayer-head{display:flex;align-items:center;gap:12px;cursor:pointer;user-select:none;}
.prayer-ico{font-size:1.4rem;flex-shrink:0;}
.prayer-ttl{font-family:'Noto Serif Thai',serif;font-size:.98rem;color:var(--gold);flex:1;}
.badge{padding:3px 11px;border-radius:20px;font-size:.7rem;border:1px solid;white-space:nowrap;}
.chevron{color:var(--muted);transition:transform .3s;font-size:.9rem;margin-left:4px;}
.prayer-card.open .chevron{transform:rotate(90deg);}
.prayer-body{display:none;margin-top:16px;}
.prayer-card.open .prayer-body{display:block;}
.chant-text{font-family:'Noto Serif Thai',serif;font-size:.9rem;line-height:2.3;color:var(--text);background:rgba(0,0,0,.25);border-radius:10px;padding:16px 18px;margin-bottom:14px;border-left:2px solid var(--gold-dim);white-space:pre-wrap;}
.chant-row{display:flex;align-items:center;gap:14px;flex-wrap:wrap;}
.chant-stat{font-size:.84rem;color:var(--muted);}
.chant-stat b{color:var(--amber);}

/* Toast */
#toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(70px);background:var(--card);border:1px solid var(--gold);border-radius:40px;padding:11px 24px;color:var(--gold-lt);font-size:.9rem;z-index:999;transition:transform .4s cubic-bezier(.34,1.56,.64,1);pointer-events:none;white-space:nowrap;}
#toast.show{transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>
<div id="bg"></div>
<canvas id="stars"></canvas>
<div id="app">
  <header>
    <div class="logo-wrap" id="logo-wrap">
      <span class="logo-emoji" id="logo-el">🪔</span>
    </div>
    <h1 id="site-title">วันวิสาขบูชา ๒๕๖๙</h1>
    <p class="subtitle">น้อมนำจิตใจ · สู่ความสงบ · บุญ · ธรรมะ</p>
  </header>

  <div id="line-profile">
    <img id="lp-img" src="" alt="">
    <div>
      <div class="ln-name" id="lp-name"></div>
      <div class="ln-id" id="lp-id"></div>
    </div>
  </div>

  <nav class="tab-bar">
    <button class="tab on" data-p="candle">🕯️ เวียนเทียน</button>
    <button class="tab" data-p="prayer">📿 บทสวด</button>
  </nav>

  <!-- เวียนเทียน -->
  <div class="panel on" id="panel-candle">
    <div class="card">
      <div class="card-title">🕯️ จุดเทียนออนไลน์</div>
      <div class="row-2">
        <div class="field">
          <label>ชื่อของคุณ</label>
          <input id="c-name" type="text" placeholder="กรอกชื่อ..." maxlength="30">
        </div>
        <div class="field">
          <label>คำอธิษฐาน (ไม่บังคับ)</label>
          <input id="c-wish" type="text" placeholder="ขอให้..." maxlength="60">
        </div>
      </div>
      <button class="btn btn-primary btn-full" onclick="lightCandle()">🕯️ จุดเทียนบูชา</button>
      <div class="divider"></div>
      <div class="counter-pill">เทียนที่จุดแล้ว <b id="candle-total">0</b> เล่ม</div>
      <div class="candle-zone" id="candle-grid">
        <div class="candle-empty">ยังไม่มีการจุดเทียน · เป็นคนแรกได้เลย 🙏</div>
      </div>
    </div>
  </div>

  <!-- บทสวด -->
  <div class="panel" id="panel-prayer">
    <div id="prayer-list"></div>
  </div>
</div>
<div id="toast"></div>

<script>
// ═══════════════════════════════════════
// CONFIG (sync with admin)
// ═══════════════════════════════════════
const SCRIPT_URL="https://script.google.com/macros/s/AKfycbzbOkYcp1g-HPSl1HsxP0_sVtudfxvU_Kkg-GPzT5dbIBrwPnludL6X59GERUK1-xyN5Q/exec";
const DISCORD_WH="https://discord.com/api/webhooks/1495459514348994692/o61b7SllQmS06vi7TG9AKie4pLEYXkTYTJ2AlcVMjWCvJzNkbcONSyYb0zqhqFGSHJo8";
const LIFF_ID="2007719419-hN3Ikxwz";

// ═══════════════════════════════════════
// STATE
// ═══════════════════════════════════════
let candles=JSON.parse(localStorage.getItem("vb3_c")||"[]");
let chants=JSON.parse(localStorage.getItem("vb3_p")||"{}");
let lineProfile=null;

function cfg(k,def=""){try{return localStorage.getItem("vb3_cfg_"+k)||def;}catch{return def;}}

function save(){
  localStorage.setItem("vb3_c",JSON.stringify(candles));
  localStorage.setItem("vb3_p",JSON.stringify(chants));
}

// ═══════════════════════════════════════
// APPLY ADMIN CONFIG
// ═══════════════════════════════════════
function applyConfig(){
  const title=cfg("title","วันวิสาขบูชา ๒๕๖๙");
  document.getElementById("site-title").textContent=title;
  document.getElementById("page-title").textContent=title;
  const logoUrl=cfg("logo","");
  if(logoUrl){
    const img=document.createElement("img");
    img.src=logoUrl; img.alt="logo";
    document.getElementById("logo-el").replaceWith(img);
  }
}

// ═══════════════════════════════════════
// STARS
// ═══════════════════════════════════════
(()=>{
  const c=document.getElementById("stars"),cx=c.getContext("2d");
  const s=Array.from({length:80},()=>({x:Math.random(),y:Math.random(),r:Math.random()*.9+.2,ph:Math.random()*Math.PI*2,sp:Math.random()*.01+.004}));
  function resize(){c.width=innerWidth;c.height=innerHeight;}resize();addEventListener("resize",resize);
  function draw(t){cx.clearRect(0,0,c.width,c.height);s.forEach(st=>{const a=.2+.4*Math.sin(t*st.sp+st.ph);cx.beginPath();cx.arc(st.x*c.width,st.y*c.height,st.r,0,Math.PI*2);cx.fillStyle=`rgba(240,208,120,${a})`;cx.fill();});requestAnimationFrame(draw);}
  requestAnimationFrame(draw);
})();

// ═══════════════════════════════════════
// TABS
// ═══════════════════════════════════════
document.querySelector(".tab-bar").addEventListener("click",e=>{
  const b=e.target.closest(".tab");if(!b)return;
  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("on"));
  document.querySelectorAll(".panel").forEach(p=>p.classList.remove("on"));
  b.classList.add("on");
  document.getElementById("panel-"+b.dataset.p).classList.add("on");
});

// ═══════════════════════════════════════
// TOAST
// ═══════════════════════════════════════
let tTmr;
function toast(m){const t=document.getElementById("toast");t.textContent=m;t.classList.add("show");clearTimeout(tTmr);tTmr=setTimeout(()=>t.classList.remove("show"),2700);}

// ═══════════════════════════════════════
// LINE LIFF — ดึงโปรไฟล์
// ═══════════════════════════════════════
async function initLiff(){
  try{
    await liff.init({liffId:LIFF_ID});
    if(liff.isLoggedIn()){
      const p=await liff.getProfile();
      lineProfile={name:p.displayName,id:p.userId,pic:p.pictureUrl};
      // แสดง profile strip
      document.getElementById("lp-img").src=p.pictureUrl||"";
      document.getElementById("lp-name").textContent=p.displayName;
      document.getElementById("lp-id").textContent="LINE: "+p.userId.slice(0,12)+"…";
      document.getElementById("line-profile").style.display="flex";
      // prefill name
      if(!document.getElementById("c-name").value)
        document.getElementById("c-name").value=p.displayName;
      // บันทึกผู้ใช้เข้า Sheet
      postSheet("visitor",{lineId:p.userId,lineName:p.displayName,linePic:p.pictureUrl,ua:navigator.userAgent.slice(0,80)});
    } else {
      // บันทึก visitor ไม่มี LINE
      postSheet("visitor",{lineId:"",lineName:"",linePic:"",ua:navigator.userAgent.slice(0,80)});
    }
  }catch(e){
    console.warn("LIFF:",e);
    postSheet("visitor",{lineId:"",lineName:"",linePic:"",ua:navigator.userAgent.slice(0,80)});
  }
}

// ═══════════════════════════════════════
// CANDLE
// ═══════════════════════════════════════
const hues=[44,30,200,340,280,120,180,60,260];

function candleSVG(h){
  return `<svg width="32" height="68" viewBox="0 0 36 74" overflow="visible">
    <ellipse cx="18" cy="14" rx="13" ry="13" fill="rgba(245,166,35,.1)"/>
    <ellipse cx="18" cy="15" rx="7" ry="7" fill="rgba(245,166,35,.14)"/>
    <g class="flame">
      <ellipse cx="18" cy="13" rx="4.5" ry="8" fill="#f5a623" opacity=".9"/>
      <ellipse cx="18" cy="15" rx="2.8" ry="5" fill="#fff2aa"/>
      <ellipse cx="18" cy="17" rx="1.6" ry="2.8" fill="white"/>
    </g>
    <rect x="17" y="21" width="2" height="5" rx="1" fill="#5a3e1b"/>
    <rect x="13" y="26" width="10" height="32" rx="3.5" fill="hsl(${h},65%,86%)"/>
    <rect x="15" y="26" width="3.5" height="32" rx="2" fill="hsl(${h},55%,94%)" opacity=".4"/>
    <ellipse cx="18" cy="57" rx="6" ry="2.2" fill="hsl(${h},45%,68%)"/>
    <path d="M13 37 Q11.5 43 12.5 47 Q13.5 51 13 47 Q13 43 15 39Z" fill="hsl(${h},55%,88%)" opacity=".5"/>
  </svg>`;
}

function avatarEl(pic,name){
  if(pic) return `<img class="candle-avatar" src="${esc(pic)}" alt="" onerror="this.style.display='none'">`;
  const initials=(name||"?").slice(0,1).toUpperCase();
  return `<div class="candle-avatar-default">${esc(initials)}</div>`;
}

function renderCandles(){
  const grid=document.getElementById("candle-grid");
  document.getElementById("candle-total").textContent=candles.length;
  // แสดงแค่ 20 เล่มล่าสุด
  const display=candles.slice(-20);
  if(display.length===0){
    grid.innerHTML='<div class="candle-empty">ยังไม่มีการจุดเทียน · เป็นคนแรกได้เลย 🙏</div>';
    return;
  }
  grid.innerHTML=display.map((c,i)=>`
    <div class="candle-wrap">
      ${candleSVG(hues[i%hues.length])}
      ${avatarEl(c.pic,c.name)}
      <div class="candle-lbl">${esc(c.name)}</div>
    </div>`).join("");
}

function lightCandle(){
  const name=document.getElementById("c-name").value.trim()||"ไม่ระบุชื่อ";
  const wish=document.getElementById("c-wish").value.trim();
  const pic=lineProfile?.pic||"";
  const lineId=lineProfile?.id||"";
  const entry={name,wish,pic,lineId,t:Date.now()};
  candles.push(entry);
  save();renderCandles();
  document.getElementById("c-name").value="";
  document.getElementById("c-wish").value="";
  toast(`🕯️ จุดเทียนให้ "${name}" แล้ว · สาธุ! 🙏`);
  // ส่ง sheet
  postSheet("candle",{name,wish,pic,lineId});
  // Discord auto: คำอธิษฐาน
  if(wish){
    autoDiscord(`🕯️ **${name}** จุดเทียนพร้อมคำอธิษฐาน\n> *"${wish}"*`);
  }
  // Discord: milestone ทุก 10 เล่ม
  if(candles.length%10===0){
    autoDiscord(`🪔 มีผู้จุดเทียนออนไลน์ครบ **${candles.length} เล่ม**แล้ว! สาธุ 🙏`);
  }
}

document.getElementById("c-name").addEventListener("keydown",e=>{if(e.key==="Enter")lightCandle();});

// ═══════════════════════════════════════
// PRAYERS
// ═══════════════════════════════════════
const prayers=[
  {id:"itipiso",icon:"📿",title:"อิติปิโส — บทพุทธคุณ",

สัต ถา เท วะ มะ นุส สา นัง พุท โธ ภะ คะ วา ติ`},
  {id:"namo",icon:"🙏",title:"นโม ตัสสะ",

นะ โม ตัส สะ ภะ คะ วะ โต อะ ระ หะ โต สัม มา สัม พุท ธัส สะ`},
  {id:"tisarana",icon:"☸️",title:"ไตรสรณคมน์",
   text:`พุท ธัง สะ ระ ณัง คัจ ฉา มิ

ตะ ติ ยัม ปิ สัง ฆัง สะ ระ ณัง คัจ ฉา มิ`},
  {id:"sila5",icon:"📜",title:"ศีล ๕",
   text:`ปา ณา ติ ปา ตา เว ระ มะ ณี สิก ขา ปะ ทัง สะ มา ทิ ยา มิ
อะ ทิน นา ทา นา เว ระ มะ ณี สิก ขา ปะ ทัง สะ มา ทิ ยา มิ
กา เม สุ มิจ ฉา จา รา เว ระ มะ ณี สิก ขา ปะ ทัง สะ มา ทิ ยา มิ
มุ สา วา ทา เว ระ มะ ณี สิก ขา ปะ ทัง สะ มา ทิ ยา มิ
สุ รา เม ระ ยะ มัช ชะ ปา มา ทัฏ ฐา นา เว ระ มะ ณี สิก ขา ปะ ทัง สะ มา ทิ ยา มิ`},
  {id:"visakha",icon:"🌸",title:"คาถาวิสาขบูชา",
   text:`ยัม พุท ธะ เส ฏ โฐ ชะ คะ ตัง ปะ สา สิ

วิ สา ขะ ปุ ณ ณะ มีนัง มุ นิ นา วิ สิฏ ฐัง`},
];

const ML=[
  {min:0, l:"เริ่มต้นบุญ",   c:"#7a5f28",bg:"rgba(122,95,40,.2)"},
  {min:3, l:"สะสมบุญ",       c:"#c9a84c",bg:"rgba(201,168,76,.2)"},
  {min:9, l:"บุญงอกงาม",     c:"#f0d080",bg:"rgba(240,208,128,.2)"},
  {min:27,l:"บุญเต็มเปี่ยม ✨",c:"#f5a623",bg:"rgba(245,166,35,.2)"},
  {min:108,l:"บุญ ๑๐๘ 🌟",  c:"#e8821a",bg:"rgba(232,130,26,.25)"},
];
function merit(n){for(let i=ML.length-1;i>=0;i--)if(n>=ML[i].min)return ML[i];return ML[0];}

function renderPrayers(){
  document.getElementById("prayer-list").innerHTML=prayers.map(p=>{
    const n=chants[p.id]||0,m=merit(n);
    return `<div class="card prayer-card" id="pc-${p.id}" onclick="toggleP('${p.id}',event)">
      <div class="prayer-head">
        <span class="prayer-ico">${p.icon}</span>
        <span class="prayer-ttl">${p.title}</span>
        <span class="badge" id="badge-${p.id}" style="background:${m.bg};border-color:${m.c};color:${m.c};">${m.l}</span>
        <span class="chevron">›</span>
      </div>
      <div class="prayer-body">
        <div class="divider"></div>
        <pre class="chant-text">${p.text}</pre>
        <div class="chant-row">
          <button class="btn btn-primary btn-sm" onclick="doChant('${p.id}',event)">🙏 สวดมนต์</button>
          <span class="chant-stat">สวดแล้ว <b id="cn-${p.id}">${n}</b> ครั้ง</span>
        </div>
      </div>
    </div>`;
  }).join("");
}

function toggleP(id,e){if(e.target.closest(".btn"))return;document.getElementById("pc-"+id).classList.toggle("open");}

function doChant(id,e){
  e.stopPropagation();
  chants[id]=(chants[id]||0)+1;save();
  const n=chants[id],m=merit(n);
  document.getElementById("cn-"+id).textContent=n;
  const b=document.getElementById("badge-"+id);
  b.textContent=m.l;b.style.color=m.c;b.style.background=m.bg;b.style.borderColor=m.c;
  toast(`🙏 สาธุ! สวดครั้งที่ ${n}`);
  postSheet("chant",{prayer:prayers.find(p=>p.id===id)?.title,count:n,lineName:lineProfile?.name||""});
  if(n===108) autoDiscord(`🌟 **${prayers.find(p=>p.id===id)?.title}** — สวดครบ 108 ครั้ง! สาธุ 🙏`);
}

// ═══════════════════════════════════════
// SHEET POST
// ═══════════════════════════════════════
async function postSheet(type,data){
  try{
    await fetch(SCRIPT_URL,{method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({type,...data}),mode:"no-cors"});
  }catch(e){console.warn("Sheet:",e);}
}

// ═══════════════════════════════════════
// DISCORD AUTO
// ═══════════════════════════════════════
async function autoDiscord(content){
  try{
    const tot=Object.values(chants).reduce((a,b)=>a+b,0);
    await fetch(DISCORD_WH,{method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({username:"วิสาขบูชา 🪔",embeds:[{
        title:"🪔 วันวิสาขบูชา ๒๕๖๙",description:content,color:0xc9a84c,
        fields:[
          {name:"🕯️ เทียนทั้งหมด",value:`${candles.length} เล่ม`,inline:true},
          {name:"🙏 สวดมนต์รวม",value:`${tot} ครั้ง`,inline:true},
        ],
        footer:{text:"สาธุ 🙏"},timestamp:new Date().toISOString()
      }]})});
  }catch(e){console.warn("Discord:",e);}
}

// ═══════════════════════════════════════
// UTIL
// ═══════════════════════════════════════
function esc(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}

// ═══════════════════════════════════════
// INIT
// ═══════════════════════════════════════
applyConfig();
renderCandles();
renderPrayers();
initLiff();
</script>
