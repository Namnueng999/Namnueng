<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>หลังบ้าน — จัดการกระทง 🪷</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Mitr:wght@400;500;600&family=Sarabun:wght@300;400;600&display=swap');
:root {
  --gold:#F4C542; --gold-dim:rgba(244,197,66,0.1);
  --bg:#07101f; --sur:rgba(8,20,48,0.97);
  --bdr:rgba(244,197,66,0.18); --txt:rgba(255,255,255,0.87);
  --mut:rgba(255,255,255,0.38); --r:13px;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Sarabun',sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;}

header{background:linear-gradient(135deg,#040c1c,#091830);border-bottom:1px solid var(--bdr);
  padding:0 24px;height:58px;display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:50;backdrop-filter:blur(20px);}
.logo{font-family:'Mitr',sans-serif;font-size:16px;font-weight:600;color:var(--gold);display:flex;align-items:center;gap:8px;}
.pills{display:flex;gap:10px;}
.pill{background:var(--gold-dim);border:1px solid var(--bdr);border-radius:20px;padding:4px 12px;font-family:'Mitr',sans-serif;font-size:12px;color:var(--gold);}

.wrap{max-width:1080px;margin:0 auto;padding:24px 18px;}
.pg-title{font-family:'Mitr',sans-serif;font-size:19px;font-weight:600;margin-bottom:3px;}
.pg-sub{font-size:12px;color:var(--mut);margin-bottom:22px;}

/* Upload */
.card{background:var(--sur);border:1px solid var(--bdr);border-radius:var(--r);padding:20px;margin-bottom:24px;}
.card-title{font-family:'Mitr',sans-serif;font-size:14px;font-weight:500;color:var(--gold);margin-bottom:14px;}

.dz{border:2px dashed rgba(244,197,66,0.22);border-radius:11px;padding:28px 16px;text-align:center;cursor:pointer;
  position:relative;background:rgba(255,255,255,0.015);transition:all .3s;margin-bottom:12px;}
.dz:hover,.dz.over{border-color:var(--gold);background:rgba(244,197,66,0.04);}
.dz input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;}
.dz-ico{font-size:32px;margin-bottom:7px;}
.dz-txt{font-size:13px;color:var(--mut);}
.dz-sub{font-size:11px;color:rgba(255,255,255,.18);margin-top:3px;}

#prev-list{display:grid;grid-template-columns:repeat(auto-fill,minmax(90px,1fr));gap:8px;margin-bottom:12px;}
.pi{position:relative;aspect-ratio:1;background:rgba(255,255,255,.04);border:1px solid var(--bdr);border-radius:9px;overflow:hidden;}
.pi img{width:100%;height:100%;object-fit:contain;padding:4px;}
.pi span{position:absolute;bottom:0;left:0;right:0;background:rgba(0,0,0,.65);font-size:8px;padding:2px 4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.pi-rm{position:absolute;top:3px;right:3px;width:16px;height:16px;background:rgba(231,76,60,.9);border:none;border-radius:50%;color:#fff;font-size:8px;cursor:pointer;display:flex;align-items:center;justify-content:center;}

.row{display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
.fc{font-size:12px;color:var(--mut);}

.pg-wrap{margin-top:10px;display:none;}
.pg-bg{background:rgba(255,255,255,.07);border-radius:20px;height:5px;overflow:hidden;margin-bottom:4px;}
.pg-fill{height:100%;background:linear-gradient(90deg,#C89B0A,#F4C542);width:0%;transition:width .3s;border-radius:20px;}
.pg-lbl{font-size:11px;color:var(--mut);}

/* Buttons */
.btn{font-family:'Mitr',sans-serif;font-size:12px;font-weight:500;padding:8px 18px;border-radius:9px;
  border:none;cursor:pointer;transition:all .2s;display:inline-flex;align-items:center;gap:5px;}
.btn:disabled{opacity:.4;cursor:not-allowed;}
.btn-gold{background:linear-gradient(135deg,#C89B0A,#F4C542);color:#1a0a00;font-weight:600;}
.btn-gold:hover:not(:disabled){transform:translateY(-1px);box-shadow:0 4px 14px rgba(244,197,66,.35);}
.btn-out{background:transparent;border:1px solid var(--bdr);color:var(--txt);}
.btn-out:hover{border-color:rgba(244,197,66,.4);background:var(--gold-dim);}
.btn-del{background:rgba(231,76,60,.1);border:1px solid rgba(231,76,60,.28);color:#e74c3c;}
.btn-del:hover{background:rgba(231,76,60,.22);}
.btn-sm{padding:5px 11px;font-size:11px;border-radius:7px;}
.btn-on{background:rgba(46,204,113,.1);border:1px solid rgba(46,204,113,.3);color:#2ecc71;}
.btn-off{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.12);color:var(--mut);}

/* Grid */
.sec-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.sec-ttl{font-family:'Mitr',sans-serif;font-size:14px;color:var(--gold);}
#grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:13px;}

.kc{background:var(--sur);border:1px solid var(--bdr);border-radius:var(--r);overflow:hidden;transition:all .2s;position:relative;}
.kc:hover{border-color:rgba(244,197,66,.38);transform:translateY(-2px);}
.kc.off{opacity:.42;}
.ki{aspect-ratio:1;background:repeating-conic-gradient(rgba(255,255,255,.04) 0% 25%,transparent 0% 50%) 0 0/14px 14px;
  display:flex;align-items:center;justify-content:center;padding:8px;cursor:pointer;overflow:hidden;}
.ki img{max-width:100%;max-height:100%;object-fit:contain;transition:transform .3s;}
.kc:hover .ki img{transform:scale(1.07);}
.kb{padding:8px 10px;border-top:1px solid var(--bdr);}
.kn{font-size:11px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:2px;}
.km{font-size:10px;color:var(--mut);margin-bottom:8px;}
.ka{display:flex;gap:4px;}
.badge{position:absolute;top:6px;right:6px;padding:2px 7px;border-radius:20px;font-size:10px;font-family:'Mitr',sans-serif;}
.bon{background:rgba(46,204,113,.15);border:1px solid rgba(46,204,113,.4);color:#2ecc71;}
.boff{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);color:rgba(255,255,255,.3);}

/* Modal */
#modal{position:fixed;inset:0;background:rgba(0,0,0,.78);backdrop-filter:blur(8px);z-index:100;
  display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .3s;}
#modal.show{opacity:1;pointer-events:all;}
.mb{background:rgba(6,14,34,.98);border:1px solid rgba(244,197,66,.28);border-radius:18px;padding:22px;
  width:90%;max-width:360px;text-align:center;transform:scale(.9);transition:transform .3s cubic-bezier(.34,1.56,.64,1);}
#modal.show .mb{transform:scale(1);}
.m-bg{background:repeating-conic-gradient(rgba(255,255,255,.05) 0% 25%,transparent 0% 50%) 0 0/16px 16px;
  border-radius:10px;padding:16px;margin-bottom:12px;min-height:180px;display:flex;align-items:center;justify-content:center;}
.m-bg img{max-height:160px;max-width:100%;object-fit:contain;}
.m-name{font-family:'Mitr',sans-serif;font-size:14px;margin-bottom:4px;}
.m-meta{font-size:11px;color:var(--mut);margin-bottom:14px;}
.m-url{font-size:9px;color:rgba(255,255,255,.18);margin-top:8px;word-break:break-all;}

/* Empty / Skeleton */
.empty{text-align:center;padding:44px 20px;color:var(--mut);grid-column:1/-1;}
.empty-ico{font-size:40px;margin-bottom:8px;opacity:.4;}
.sk{background:linear-gradient(90deg,rgba(255,255,255,.04) 25%,rgba(255,255,255,.08) 50%,rgba(255,255,255,.04) 75%);
  background-size:200% 100%;animation:sh 1.5s infinite;border-radius:7px;}
@keyframes sh{to{background-position:-200% 0;}}

#toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(80px);
  background:rgba(4,12,30,.97);border:1px solid var(--bdr);border-radius:11px;padding:10px 18px;
  font-family:'Mitr',sans-serif;font-size:13px;z-index:200;
  transition:transform .4s cubic-bezier(.34,1.56,.64,1);white-space:nowrap;}
#toast.show{transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>
<header>
  <div class="logo">🪷 หลังบ้าน — จัดการกระทง</div>
  <div class="pills">
    <div class="pill">🖼️ <span id="ttl">—</span></div>
    <div class="pill">✅ เปิด <span id="act">—</span></div>
  </div>
</header>
<div class="wrap">
  <div class="pg-title">📂 จัดการรูปกระทง</div>
  <div class="pg-sub">อัพโหลด · เปิด/ปิด · ลบ รูปกระทงที่ใช้ในระบบ</div>

  <div class="card">
    <div class="card-title">📤 อัพโหลดรูปกระทงใหม่</div>
    <div class="dz" id="dz">
      <input type="file" id="fi" accept="image/png,image/jpeg,image/webp" multiple>
      <div class="dz-ico">🖼️</div>
      <div class="dz-txt">ลากไฟล์มาวางที่นี่ หรือคลิกเพื่อเลือก</div>
      <div class="dz-sub">แนะนำ PNG พื้นหลังโปร่งใส · PNG, JPG, WebP</div>
    </div>
    <div id="prev-list"></div>
    <div class="row">
      <button class="btn btn-gold" id="up-btn" onclick="doUpload()" disabled>📤 อัพโหลด</button>
      <button class="btn btn-out" onclick="clearFiles()">ล้าง</button>
      <span class="fc" id="fc"></span>
    </div>
    <div class="pg-wrap" id="pg-wrap">
      <div class="pg-bg"><div class="pg-fill" id="pg-fill"></div></div>
      <div class="pg-lbl" id="pg-lbl"></div>
    </div>
  </div>

  <div>
    <div class="sec-bar">
      <div class="sec-ttl">🪷 รายการกระทงทั้งหมด</div>
      <button class="btn btn-out btn-sm" onclick="loadList()">🔄 รีเฟรช</button>
    </div>
    <div id="grid"><div class="empty"><div class="empty-ico">⏳</div><div>กำลังโหลด...</div></div></div>
  </div>
</div>

<div id="modal" onclick="if(event.target===this)closeModal()">
  <div class="mb">
    <div class="m-bg"><img id="m-img" src="" alt=""></div>
    <div class="m-name" id="m-name"></div>
    <div class="m-meta" id="m-meta"></div>
    <div class="row" style="justify-content:center;gap:7px;">
      <button class="btn btn-out btn-sm" onclick="closeModal()">ปิด</button>
      <button class="btn btn-sm" id="m-tog" onclick="mToggle()"></button>
      <button class="btn btn-del btn-sm" onclick="mDelete()">🗑️ ลบ</button>
    </div>
    <div class="m-url" id="m-url"></div>
  </div>
</div>
<div id="toast"></div>

<script>
const GAS_URL = "https://script.google.com/macros/s/AKfycbwM6LgPjcoKS1ER-QeBGhfG9tJOj7qXvNigPeT6Pa_st0-GIY2CMl-D7rB4Dk5cP9QOOQ/exec";

// gasGet — ลอง fetch ปกติก่อน ถ้าไม่ได้ fallback JSONP
async function gasGet(params) {
  const p = new URLSearchParams({ ...params, _: Date.now() });
  const url = GAS_URL + '?' + p;
  try {
    const res = await fetch(url, { mode: 'cors', cache: 'no-store' });
    if (res.ok) return await res.json();
  } catch(_) {}
  return new Promise((resolve, reject) => {
    const cb = '_cb' + Math.random().toString(36).slice(2);
    const t  = setTimeout(() => { cleanup(); reject(new Error('GAS timeout — Re-deploy GAS')); }, 15000);
    let script;
    function cleanup() { clearTimeout(t); delete window[cb]; if(script) script.remove(); }
    window[cb] = (data) => { cleanup(); resolve(data); };
    const p2 = new URLSearchParams({ ...params, callback: cb, _: Date.now() });
    script = document.createElement('script');
    script.src = GAS_URL + '?' + p2;
    script.onerror = () => { cleanup(); reject(new Error('JSONP failed')); };
    document.head.appendChild(script);
  });
}

let list = [], selFiles = [], modalItem = null;

async function loadList() {
  const grid = document.getElementById('grid');
  grid.innerHTML = [1,2,3,4,5,6].map(()=>`
    <div style="background:var(--sur);border:1px solid var(--bdr);border-radius:13px;overflow:hidden;">
      <div class="sk" style="aspect-ratio:1;"></div>
      <div style="padding:9px 10px;">
        <div class="sk" style="height:10px;margin-bottom:5px;border-radius:6px;"></div>
        <div class="sk" style="height:9px;width:50%;border-radius:6px;"></div>
      </div>
    </div>`).join('');
  try {
    const d = await gasGet({ action: 'listKrathongs' });
    list = d.krathongs || [];
    renderGrid(); updateStats();
  } catch(e) {
    grid.innerHTML = `<div class="empty"><div class="empty-ico">❌</div><div>โหลดไม่ได้<br><small>${e.message}</small><br><small style="opacity:.5">ตรวจสอบว่า Re-deploy GAS แล้ว</small></div></div>`;
  }
}

function renderGrid() {
  const grid = document.getElementById('grid');
  if (!list.length) {
    grid.innerHTML = '<div class="empty"><div class="empty-ico">🪷</div><div>ยังไม่มีกระทง<br>อัพโหลดก่อนเลย!</div></div>';
    return;
  }
  grid.innerHTML = list.map(k => `
    <div class="kc ${k.active?'':'off'}" id="kc-${k.id}">
      <span class="badge ${k.active?'bon':'boff'}">${k.active?'✅':'⏸'}</span>
      <div class="ki" onclick="openModal('${k.id}')">
        <img src="${k.url}" alt="${esc(k.name)}"
          onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 60 60%22><text y=%2248%22 font-size=%2248%22>🪷</text></svg>'">
      </div>
      <div class="kb">
        <div class="kn" title="${esc(k.name)}">${esc(k.name)}</div>
        <div class="km">${fmtSize(k.size)} · ${k.created}</div>
        <div class="ka">
          <button class="btn btn-sm ${k.active?'btn-on':'btn-off'}" onclick="tog('${k.id}')">${k.active?'⏸':'▶️'}</button>
          <button class="btn btn-del btn-sm" onclick="del('${k.id}')">🗑️</button>
          <button class="btn btn-out btn-sm" onclick="openModal('${k.id}')">👁</button>
        </div>
      </div>
    </div>`).join('');
}

function updateStats() {
  document.getElementById('ttl').textContent = list.length;
  document.getElementById('act').textContent = list.filter(k=>k.active).length;
}

// File picker
const fi = document.getElementById('fi');
fi.addEventListener('change', e => handleFiles([...e.target.files]));
const dz = document.getElementById('dz');
dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('over'); });
dz.addEventListener('dragleave', () => dz.classList.remove('over'));
dz.addEventListener('drop', e => { e.preventDefault(); dz.classList.remove('over'); handleFiles([...e.dataTransfer.files]); });

function handleFiles(files) {
  selFiles = [...selFiles, ...files.filter(f => f.type.startsWith('image/'))];
  renderPrev();
}
function renderPrev() {
  document.getElementById('prev-list').innerHTML = selFiles.map((f,i) => `
    <div class="pi">
      <img src="${URL.createObjectURL(f)}" alt="">
      <span>${esc(f.name)}</span>
      <button class="pi-rm" onclick="rmF(${i})">✕</button>
    </div>`).join('');
  document.getElementById('up-btn').disabled = !selFiles.length;
  document.getElementById('fc').textContent = selFiles.length ? selFiles.length+' ไฟล์' : '';
}
function rmF(i) { selFiles.splice(i,1); renderPrev(); }
function clearFiles() { selFiles=[]; fi.value=''; renderPrev(); }

// Upload — no-cors POST ส่ง base64 ใน body
async function doUpload() {
  if (!selFiles.length) return;
  const btn = document.getElementById('up-btn');
  const pw  = document.getElementById('pg-wrap');
  const pf  = document.getElementById('pg-fill');
  const pl  = document.getElementById('pg-lbl');
  btn.disabled = true; pw.style.display = 'block';
  let done = 0;
  for (const file of selFiles) {
    pl.textContent = `อัพโหลด ${file.name} (${done+1}/${selFiles.length})...`;
    pf.style.width = (done/selFiles.length*100)+'%';
    try {
      const b64 = await toB64(file);
      const params = new URLSearchParams({
        action: 'uploadKrathong',
        mimeType: file.type,
        filename: encodeURIComponent(file.name),
      });
      // ส่ง no-cors POST (GAS รับ body เป็น base64 ผ่าน doPost)
      await fetch(GAS_URL + '?' + params, {
        method: 'POST',
        mode:   'no-cors',
        headers: { 'Content-Type': 'text/plain' },
        body:   b64,
      });
      toast(`✅ ${file.name} ส่งแล้ว`);
      done++;
    } catch(e) {
      toast(`❌ ${file.name}: ${e.message}`, true);
    }
  }
  pf.style.width = '100%';
  pl.textContent = `ส่งแล้ว ${done}/${selFiles.length} ไฟล์ — รอ 3 วิ แล้วรีเฟรช...`;
  clearFiles();
  setTimeout(async () => {
    pw.style.display = 'none';
    await loadList();
    btn.disabled = false;
  }, 3000);
}

// Toggle
async function tog(id) {
  const k = list.find(x=>x.id===id); if(!k) return;
  try {
    await gasGet({ action: 'toggle', fileId: id });
    k.active = !k.active; renderGrid(); updateStats();
    toast(`${k.active?'✅':'⏸'} "${k.name}"`);
  } catch(e) { toast('❌ '+e.message, true); }
}

// Delete
async function del(id) {
  const k = list.find(x=>x.id===id);
  if (!k || !confirm(`ลบ "${k.name}" จริงๆ?`)) return;
  try {
    await gasGet({ action: 'delete', fileId: id });
    list = list.filter(x=>x.id!==id); renderGrid(); updateStats();
    toast(`🗑️ ลบแล้ว`); closeModal();
  } catch(e) { toast('❌ '+e.message, true); }
}

// Modal
function openModal(id) {
  modalItem = list.find(k=>k.id===id); if(!modalItem) return;
  const k = modalItem;
  document.getElementById('m-img').src = k.url;
  document.getElementById('m-name').textContent = k.name;
  document.getElementById('m-meta').textContent = fmtSize(k.size)+' · '+k.created;
  document.getElementById('m-url').textContent  = k.url;
  const tb = document.getElementById('m-tog');
  tb.textContent = k.active ? '⏸ ปิด' : '▶️ เปิด';
  tb.className   = `btn btn-sm ${k.active?'btn-on':'btn-out'}`;
  document.getElementById('modal').classList.add('show');
}
function closeModal() { document.getElementById('modal').classList.remove('show'); modalItem=null; }
function mToggle()    { if(modalItem){ tog(modalItem.id); closeModal(); } }
function mDelete()    { if(modalItem) del(modalItem.id); }

// Helpers
function toB64(file) {
  return new Promise((res,rej)=>{ const r=new FileReader(); r.onload=()=>res(r.result.split(',')[1]); r.onerror=rej; r.readAsDataURL(file); });
}
function fmtSize(b) { if(!b) return '—'; if(b<1024) return b+'B'; if(b<1048576) return (b/1024).toFixed(0)+'KB'; return (b/1048576).toFixed(1)+'MB'; }
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function toast(msg,err) {
  const el=document.getElementById('toast');
  el.textContent=msg; el.style.borderColor=err?'rgba(231,76,60,.5)':'rgba(244,197,66,.3)';
  el.classList.add('show'); setTimeout(()=>el.classList.remove('show'),3500);
}

window.addEventListener('DOMContentLoaded', loadList);
</script>
</body>
</html>
