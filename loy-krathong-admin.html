<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>หลังบ้าน — จัดการกระทง</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Mitr:wght@300;400;500;600&family=Sarabun:wght@300;400;600&display=swap');

  :root {
    --gold: #F4C542; --gold-dim: rgba(244,197,66,0.12);
    --bg: #080f1e; --surface: rgba(10,25,55,0.95);
    --border: rgba(244,197,66,0.2); --text: rgba(255,255,255,0.88);
    --muted: rgba(255,255,255,0.4); --green: #2ecc71; --red: #e74c3c;
    --radius: 14px;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'Sarabun',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }

  header {
    background:linear-gradient(135deg,#050d1e,#0a1a3a);
    border-bottom:1px solid var(--border);
    padding:0 28px; height:60px;
    display:flex; align-items:center; justify-content:space-between;
    position:sticky; top:0; z-index:50; backdrop-filter:blur(20px);
  }
  .logo { font-family:'Mitr',sans-serif; font-size:17px; font-weight:600; color:var(--gold); display:flex; align-items:center; gap:8px; }
  .stat-pill { background:var(--gold-dim); border:1px solid var(--border); border-radius:20px; padding:4px 14px; font-family:'Mitr',sans-serif; font-size:12px; color:var(--gold); }
  .header-right { display:flex; gap:12px; }

  .container { max-width:1100px; margin:0 auto; padding:28px 20px; }
  .page-title { font-family:'Mitr',sans-serif; font-size:20px; font-weight:600; margin-bottom:4px; }
  .page-sub { font-size:13px; color:var(--muted); margin-bottom:24px; }

  /* Upload Card */
  .upload-card {
    background:var(--surface); border:1px solid var(--border); border-radius:var(--radius);
    padding:24px; margin-bottom:28px;
  }
  .card-title { font-family:'Mitr',sans-serif; font-size:15px; font-weight:500; color:var(--gold); margin-bottom:16px; display:flex; align-items:center; gap:8px; }

  .drop-zone {
    border:2px dashed rgba(244,197,66,0.25); border-radius:12px;
    padding:32px 20px; text-align:center; cursor:pointer;
    transition:all 0.3s; margin-bottom:14px; position:relative;
    background:rgba(255,255,255,0.02);
  }
  .drop-zone:hover, .drop-zone.over { border-color:var(--gold); background:rgba(244,197,66,0.04); }
  .drop-zone input { position:absolute; inset:0; opacity:0; cursor:pointer; width:100%; height:100%; }
  .drop-zone-icon { font-size:36px; margin-bottom:8px; }
  .drop-zone-text { font-size:14px; color:var(--muted); }
  .drop-zone-sub  { font-size:11px; color:rgba(255,255,255,0.2); margin-top:4px; }

  #preview-list { display:grid; grid-template-columns:repeat(auto-fill,minmax(100px,1fr)); gap:10px; margin-bottom:14px; }
  .prev-item { position:relative; aspect-ratio:1; background:rgba(255,255,255,0.04); border:1px solid var(--border); border-radius:10px; overflow:hidden; }
  .prev-item img { width:100%; height:100%; object-fit:contain; padding:5px; }
  .prev-item span { position:absolute; bottom:0; left:0; right:0; background:rgba(0,0,0,0.65); font-size:9px; padding:2px 4px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .prev-remove { position:absolute; top:3px; right:3px; width:17px; height:17px; background:rgba(231,76,60,0.9); border:none; border-radius:50%; color:#fff; font-size:9px; cursor:pointer; display:flex; align-items:center; justify-content:center; }

  .row { display:flex; gap:10px; align-items:center; flex-wrap:wrap; }

  /* Progress */
  .progress-wrap { margin-top:12px; display:none; }
  .progress-bg { background:rgba(255,255,255,0.07); border-radius:20px; height:5px; overflow:hidden; margin-bottom:5px; }
  .progress-fill { height:100%; background:linear-gradient(90deg,#C89B0A,#F4C542); width:0%; transition:width 0.3s; border-radius:20px; }
  .progress-label { font-size:11px; color:var(--muted); }

  /* Buttons */
  .btn { font-family:'Mitr',sans-serif; font-size:13px; font-weight:500; padding:9px 20px; border-radius:10px; border:none; cursor:pointer; transition:all 0.2s; display:inline-flex; align-items:center; gap:6px; }
  .btn:disabled { opacity:.4; cursor:not-allowed; }
  .btn-gold { background:linear-gradient(135deg,#C89B0A,#F4C542); color:#1a0a00; font-weight:600; }
  .btn-gold:hover:not(:disabled) { transform:translateY(-1px); box-shadow:0 4px 14px rgba(244,197,66,0.4); }
  .btn-outline { background:transparent; border:1px solid var(--border); color:var(--text); }
  .btn-outline:hover { border-color:rgba(244,197,66,0.4); background:var(--gold-dim); }
  .btn-danger { background:rgba(231,76,60,0.12); border:1px solid rgba(231,76,60,0.3); color:#e74c3c; }
  .btn-danger:hover { background:rgba(231,76,60,0.25); }
  .btn-sm { padding:5px 12px; font-size:12px; border-radius:8px; }
  .btn-toggle-on  { background:rgba(46,204,113,0.12); border:1px solid rgba(46,204,113,0.3); color:#2ecc71; }
  .btn-toggle-off { background:rgba(255,255,255,0.06); border:1px solid rgba(255,255,255,0.15); color:var(--muted); }

  /* Grid */
  .section-bar { display:flex; align-items:center; justify-content:space-between; margin-bottom:14px; }
  .section-title { font-family:'Mitr',sans-serif; font-size:15px; color:var(--gold); }
  #grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(170px,1fr)); gap:14px; }

  .k-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); overflow:hidden; transition:all 0.2s; position:relative; }
  .k-card:hover { border-color:rgba(244,197,66,0.4); transform:translateY(-2px); }
  .k-card.off { opacity:.45; }

  .k-img { aspect-ratio:1; background:repeating-conic-gradient(rgba(255,255,255,0.04) 0% 25%,transparent 0% 50%) 0 0/16px 16px; display:flex; align-items:center; justify-content:center; padding:10px; cursor:pointer; overflow:hidden; }
  .k-img img { max-width:100%; max-height:100%; object-fit:contain; transition:transform 0.3s; }
  .k-card:hover .k-img img { transform:scale(1.06); }

  .k-body { padding:9px 11px; border-top:1px solid var(--border); }
  .k-name { font-size:11px; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; margin-bottom:3px; }
  .k-meta { font-size:10px; color:var(--muted); margin-bottom:9px; }
  .k-actions { display:flex; gap:5px; }

  .badge { position:absolute; top:7px; right:7px; padding:2px 8px; border-radius:20px; font-size:10px; font-family:'Mitr',sans-serif; }
  .badge-on  { background:rgba(46,204,113,0.18); border:1px solid rgba(46,204,113,0.45); color:#2ecc71; }
  .badge-off { background:rgba(255,255,255,0.06); border:1px solid rgba(255,255,255,0.12); color:rgba(255,255,255,0.35); }

  /* Modal */
  #modal { position:fixed; inset:0; background:rgba(0,0,0,0.75); backdrop-filter:blur(8px); z-index:100; display:flex; align-items:center; justify-content:center; opacity:0; pointer-events:none; transition:opacity 0.3s; }
  #modal.show { opacity:1; pointer-events:all; }
  .modal-box { background:rgba(8,15,35,0.98); border:1px solid rgba(244,197,66,0.3); border-radius:20px; padding:24px; width:90%; max-width:380px; text-align:center; transform:scale(0.9); transition:transform 0.3s cubic-bezier(0.34,1.56,0.64,1); }
  #modal.show .modal-box { transform:scale(1); }
  .modal-bg { background:repeating-conic-gradient(rgba(255,255,255,0.05) 0% 25%,transparent 0% 50%) 0 0/18px 18px; border-radius:12px; padding:18px; margin-bottom:14px; min-height:200px; display:flex; align-items:center; justify-content:center; }
  .modal-bg img { max-height:180px; max-width:100%; object-fit:contain; }
  .modal-name { font-family:'Mitr',sans-serif; font-size:15px; margin-bottom:5px; }
  .modal-meta { font-size:11px; color:var(--muted); margin-bottom:16px; }
  .modal-url { font-size:10px; color:rgba(255,255,255,0.2); margin-top:10px; word-break:break-all; }

  /* Empty / Skeleton */
  .empty { text-align:center; padding:50px 20px; color:var(--muted); grid-column:1/-1; }
  .empty-icon { font-size:44px; margin-bottom:10px; opacity:.4; }
  .sk { background:linear-gradient(90deg,rgba(255,255,255,0.04) 25%,rgba(255,255,255,0.08) 50%,rgba(255,255,255,0.04) 75%); background-size:200% 100%; animation:sh 1.5s infinite; border-radius:8px; }
  @keyframes sh { to { background-position:-200% 0; } }

  /* Toast */
  #toast { position:fixed; bottom:22px; left:50%; transform:translateX(-50%) translateY(80px); background:rgba(5,15,35,0.97); border:1px solid var(--border); border-radius:12px; padding:11px 20px; font-family:'Mitr',sans-serif; font-size:13px; z-index:200; transition:transform 0.4s cubic-bezier(0.34,1.56,0.64,1); white-space:nowrap; }
  #toast.show { transform:translateX(-50%) translateY(0); }

  #file-count { font-size:12px; color:var(--muted); }
</style>
</head>
<body>

<header>
  <div class="logo">🪷 หลังบ้าน — จัดการกระทง</div>
  <div class="header-right">
    <div class="stat-pill">🖼️ ทั้งหมด: <span id="ttl">—</span></div>
    <div class="stat-pill">✅ เปิด: <span id="act">—</span></div>
  </div>
</header>

<div class="container">
  <div class="page-title">📂 จัดการรูปกระทง</div>
  <div class="page-sub">อัพโหลด เปิด/ปิด และลบรูปกระทงที่ใช้ในระบบ</div>

  <!-- Upload -->
  <div class="upload-card">
    <div class="card-title">📤 อัพโหลดรูปกระทงใหม่</div>
    <div class="drop-zone" id="drop-zone">
      <input type="file" id="file-input" accept="image/png,image/jpeg,image/webp" multiple>
      <div class="drop-zone-icon">🖼️</div>
      <div class="drop-zone-text">ลากไฟล์มาวางที่นี่ หรือคลิกเพื่อเลือก</div>
      <div class="drop-zone-sub">PNG พื้นหลังโปร่งใสแนะนำ · รองรับ PNG, JPG, WebP</div>
    </div>

    <div id="preview-list"></div>

    <div class="row">
      <button class="btn btn-gold" id="up-btn" onclick="doUpload()" disabled>📤 อัพโหลด</button>
      <button class="btn btn-outline" onclick="clearFiles()">ล้าง</button>
      <span id="file-count"></span>
    </div>

    <div class="progress-wrap" id="prog-wrap">
      <div class="progress-bg"><div class="progress-fill" id="prog-fill"></div></div>
      <div class="progress-label" id="prog-label">กำลังอัพโหลด...</div>
    </div>
  </div>

  <!-- List -->
  <div>
    <div class="section-bar">
      <div class="section-title">🪷 รายการกระทงทั้งหมด</div>
      <button class="btn btn-outline btn-sm" onclick="loadList()">🔄 รีเฟรช</button>
    </div>
    <div id="grid">
      <div class="empty"><div class="empty-icon">⏳</div><div>กำลังโหลด...</div></div>
    </div>
  </div>
</div>

<!-- Modal -->
<div id="modal" onclick="if(event.target===this)closeModal()">
  <div class="modal-box">
    <div class="modal-bg"><img id="m-img" src="" alt=""></div>
    <div class="modal-name" id="m-name"></div>
    <div class="modal-meta" id="m-meta"></div>
    <div class="row" style="justify-content:center;gap:8px;">
      <button class="btn btn-outline btn-sm" onclick="closeModal()">ปิด</button>
      <button class="btn btn-sm" id="m-tog" onclick="mToggle()"></button>
      <button class="btn btn-danger btn-sm" onclick="mDelete()">🗑️ ลบ</button>
    </div>
    <div class="modal-url" id="m-url"></div>
  </div>
</div>

<div id="toast"></div>

<script>
const GAS = "https://script.google.com/macros/s/AKfycbwM6LgPjcoKS1ER-QeBGhfG9tJOj7qXvNigPeT6Pa_st0-GIY2CMl-D7rB4Dk5cP9QOOQ/exec";

let list = [];
let selectedFiles = [];
let modalItem = null;

// ===== LOAD =====
async function loadList() {
  const grid = document.getElementById('grid');
  grid.innerHTML = [1,2,3,4,5,6].map(()=>`
    <div style="background:var(--surface);border:1px solid var(--border);border-radius:14px;overflow:hidden;">
      <div class="sk" style="aspect-ratio:1;"></div>
      <div style="padding:10px 12px;"><div class="sk" style="height:11px;margin-bottom:6px;border-radius:6px;"></div><div class="sk" style="height:9px;width:55%;border-radius:6px;"></div></div>
    </div>`).join('');

  try {
    const r = await fetch(`${GAS}?action=listKrathongs&_=${Date.now()}`);
    const d = await r.json();
    list = d.krathongs || [];
    renderGrid();
    updateStats();
  } catch(e) {
    grid.innerHTML = `<div class="empty"><div class="empty-icon">❌</div><div>โหลดไม่ได้<br><small>${e.message}</small></div></div>`;
  }
}

function renderGrid() {
  const grid = document.getElementById('grid');
  if (!list.length) {
    grid.innerHTML = `<div class="empty"><div class="empty-icon">🪷</div><div>ยังไม่มีกระทง อัพโหลดก่อนเลย!</div></div>`;
    return;
  }
  grid.innerHTML = list.map(k => `
    <div class="k-card ${k.active?'':'off'}" id="kc-${k.id}">
      <span class="badge ${k.active?'badge-on':'badge-off'}">${k.active?'✅ เปิด':'⏸ ปิด'}</span>
      <div class="k-img" onclick="openModal('${k.id}')">
        <img src="${k.url}" alt="${esc(k.name)}" onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 60 60%22><text y=%2248%22 font-size=%2248%22>🪷</text></svg>'">
      </div>
      <div class="k-body">
        <div class="k-name" title="${esc(k.name)}">${esc(k.name)}</div>
        <div class="k-meta">${fmtSize(k.size)}</div>
        <div class="k-actions">
          <button class="btn btn-sm ${k.active?'btn-toggle-on':'btn-toggle-off'}" onclick="toggle('${k.id}')">${k.active?'⏸':'▶️'}</button>
          <button class="btn btn-danger btn-sm" onclick="del('${k.id}')">🗑️</button>
          <button class="btn btn-outline btn-sm" onclick="openModal('${k.id}')">👁</button>
        </div>
      </div>
    </div>`).join('');
}

function updateStats() {
  document.getElementById('ttl').textContent = list.length;
  document.getElementById('act').textContent = list.filter(k=>k.active).length;
}

// ===== FILE PICKER =====
document.getElementById('file-input').addEventListener('change', e => handleFiles([...e.target.files]));
const dz = document.getElementById('drop-zone');
dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('over'); });
dz.addEventListener('dragleave', () => dz.classList.remove('over'));
dz.addEventListener('drop', e => { e.preventDefault(); dz.classList.remove('over'); handleFiles([...e.dataTransfer.files]); });

function handleFiles(files) {
  selectedFiles = [...selectedFiles, ...files.filter(f => f.type.startsWith('image/'))];
  renderPreview();
}

function renderPreview() {
  document.getElementById('preview-list').innerHTML = selectedFiles.map((f, i) => `
    <div class="prev-item">
      <img src="${URL.createObjectURL(f)}" alt="">
      <span>${esc(f.name)}</span>
      <button class="prev-remove" onclick="rmFile(${i})">✕</button>
    </div>`).join('');
  document.getElementById('up-btn').disabled = !selectedFiles.length;
  document.getElementById('file-count').textContent = selectedFiles.length ? `${selectedFiles.length} ไฟล์` : '';
}

function rmFile(i) { selectedFiles.splice(i,1); renderPreview(); }
function clearFiles() { selectedFiles=[]; document.getElementById('file-input').value=''; renderPreview(); }

// ===== UPLOAD — แบ่ง chunk เพื่อหลีกเลี่ยง URL limit =====
async function doUpload() {
  if (!selectedFiles.length) return;
  const btn = document.getElementById('up-btn');
  const pw  = document.getElementById('prog-wrap');
  const pf  = document.getElementById('prog-fill');
  const pl  = document.getElementById('prog-label');
  btn.disabled = true;
  pw.style.display = 'block';

  let done = 0;
  for (const file of selectedFiles) {
    pl.textContent = `อัพโหลด ${file.name} (${done+1}/${selectedFiles.length})...`;
    pf.style.width = (done/selectedFiles.length*100)+'%';
    try {
      // แปลงเป็น base64 แล้วส่งเป็น chunks ผ่าน multiple GET requests
      const b64 = await toBase64(file);
      // ถ้ารูปเล็ก (<300KB) ส่งครั้งเดียวได้
      if (b64.length < 300000) {
        const params = new URLSearchParams({
          action: 'uploadKrathong',
          base64: b64,
          mimeType: file.type,
          filename: file.name,
        });
        const r = await fetch(`${GAS}?${params}`);
        const d = await r.json();
        if (d.success) {
          list.unshift({ id:d.id, name:d.name, url:d.url, active:true, size:file.size, created:new Date().toLocaleString('th-TH') });
          toast(`✅ ${file.name} อัพโหลดแล้ว`);
        } else { toast(`❌ ${file.name}: ${d.error||'ไม่ทราบสาเหตุ'}`, true); }
      } else {
        // รูปใหญ่ — ส่งเป็น no-cors POST (GAS รับได้ ไม่สน CORS response)
        const params = new URLSearchParams({ action:'uploadKrathong', mimeType:file.type, filename:file.name });
        await fetch(`${GAS}?${params}`, {
          method: 'POST',
          mode: 'no-cors',
          headers: { 'Content-Type': 'text/plain' },
          body: b64,
        });
        // no-cors ไม่ได้ response — โหลดรายการใหม่แทน
        toast(`✅ ${file.name} ส่งแล้ว (กำลังรีเฟรช...)`);
        await new Promise(r=>setTimeout(r,2500));
        const r2 = await fetch(`${GAS}?action=listKrathongs&_=${Date.now()}`);
        const d2 = await r2.json();
        list = d2.krathongs || [];
      }
      done++;
    } catch(e) {
      toast(`❌ ${file.name}: ${e.message}`, true);
    }
  }

  pf.style.width = '100%';
  pl.textContent = `เสร็จแล้ว ${done}/${selectedFiles.length} ไฟล์`;
  setTimeout(()=>{ pw.style.display='none'; },2500);
  clearFiles();
  renderGrid();
  updateStats();
  btn.disabled = false;
}

// ===== TOGGLE =====
async function toggle(id) {
  const k = list.find(x=>x.id===id);
  if (!k) return;
  try {
    await fetch(`${GAS}?action=toggle&fileId=${id}&_=${Date.now()}`);
    k.active = !k.active;
    renderGrid(); updateStats();
    toast(`${k.active?'✅ เปิด':'⏸ ปิด'} "${k.name}" แล้ว`);
  } catch(e) { toast('❌ '+e.message, true); }
}

// ===== DELETE =====
async function del(id) {
  const k = list.find(x=>x.id===id);
  if (!k || !confirm(`ลบกระทง "${k.name}" จริงๆ?`)) return;
  try {
    await fetch(`${GAS}?action=delete&fileId=${id}&_=${Date.now()}`);
    list = list.filter(x=>x.id!==id);
    renderGrid(); updateStats();
    toast(`🗑️ ลบ "${k.name}" แล้ว`);
    closeModal();
  } catch(e) { toast('❌ '+e.message, true); }
}

// ===== MODAL =====
function openModal(id) {
  modalItem = list.find(k=>k.id===id);
  if (!modalItem) return;
  const k = modalItem;
  document.getElementById('m-img').src  = k.url;
  document.getElementById('m-name').textContent = k.name;
  document.getElementById('m-meta').textContent = fmtSize(k.size)+' · '+k.created;
  document.getElementById('m-url').textContent  = k.url;
  const tb = document.getElementById('m-tog');
  tb.textContent = k.active ? '⏸ ปิดใช้งาน' : '▶️ เปิดใช้งาน';
  tb.className   = `btn btn-sm ${k.active?'btn-toggle-on':'btn-outline'}`;
  document.getElementById('modal').classList.add('show');
}
function closeModal() { document.getElementById('modal').classList.remove('show'); modalItem=null; }
function mToggle()    { if (modalItem) { toggle(modalItem.id); closeModal(); } }
function mDelete()    { if (modalItem) del(modalItem.id); }

// ===== HELPERS =====
function toBase64(file) {
  return new Promise((res,rej)=>{
    const r = new FileReader();
    r.onload  = () => res(r.result.split(',')[1]);
    r.onerror = rej;
    r.readAsDataURL(file);
  });
}
function fmtSize(b) {
  if (!b) return '—';
  if (b<1024) return b+'B';
  if (b<1024*1024) return (b/1024).toFixed(0)+'KB';
  return (b/1024/1024).toFixed(1)+'MB';
}
function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function toast(msg, err) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.style.borderColor = err ? 'rgba(231,76,60,0.5)' : 'rgba(244,197,66,0.3)';
  el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'), 3500);
}

window.addEventListener('DOMContentLoaded', loadList);
</script>
</body>
</html>
