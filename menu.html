<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>สั่งอาหาร</title>
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&family=Prompt:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#0f0e0c; --surface:#1a1814; --card:#221f1b;
    --accent:#e8a020; --accent2:#f5c842; --text:#f0ead8;
    --muted:#8a7d6a; --success:#4caf7d; --border:#2e2a24;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--bg);color:var(--text);font-family:'Sarabun',sans-serif;min-height:100vh;}

  .header{background:linear-gradient(135deg,#1a1410 0%,#2a1f0a 100%);border-bottom:1px solid var(--border);padding:16px 20px;position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between;}
  .header-left h1{font-family:'Prompt',sans-serif;font-size:1.3rem;color:var(--accent);}
  .header-left p{font-size:0.8rem;color:var(--muted);}
  .cart-btn{background:var(--accent);color:#000;border:none;border-radius:50px;padding:10px 18px;font-family:'Sarabun',sans-serif;font-size:0.9rem;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:8px;transition:all 0.2s;}
  .cart-btn:hover{background:var(--accent2);transform:scale(1.03);}
  .cart-count{background:#000;color:var(--accent);border-radius:50%;width:22px;height:22px;display:flex;align-items:center;justify-content:center;font-size:0.75rem;font-weight:700;}
  .table-banner{background:linear-gradient(90deg,#2a1f0a,#1a1410);border-bottom:1px solid var(--border);padding:10px 20px;display:flex;align-items:center;gap:10px;}
  .table-num{font-family:'Prompt',sans-serif;font-size:1.8rem;color:var(--accent);font-weight:700;}
  .table-label{color:var(--muted);font-size:0.85rem;}

  .categories{display:flex;gap:10px;padding:16px 20px;overflow-x:auto;scrollbar-width:none;border-bottom:1px solid var(--border);background:var(--surface);}
  .categories::-webkit-scrollbar{display:none;}
  .cat-btn{background:var(--card);border:1px solid var(--border);color:var(--muted);border-radius:50px;padding:8px 18px;font-family:'Sarabun',sans-serif;font-size:0.85rem;cursor:pointer;white-space:nowrap;transition:all 0.2s;flex-shrink:0;}
  .cat-btn.active{background:var(--accent);color:#000;border-color:var(--accent);font-weight:700;}

  .menu-grid{padding:16px 20px;display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:14px;max-width:900px;margin:0 auto;}
  .menu-card{background:var(--card);border-radius:16px;overflow:hidden;border:1px solid var(--border);transition:all 0.25s;position:relative;}
  .menu-card:hover{transform:translateY(-3px);border-color:var(--accent);}
  .menu-card.out-of-stock{opacity:0.4;pointer-events:none;}
  .menu-img{width:100%;height:120px;background:var(--surface);display:flex;align-items:center;justify-content:center;font-size:2.5rem;position:relative;}
  .menu-img img{width:100%;height:100%;object-fit:cover;position:absolute;}
  .badge-sold{position:absolute;top:8px;right:8px;background:#cc3333;color:#fff;font-size:0.65rem;padding:3px 7px;border-radius:20px;}
  .menu-info{padding:12px;}
  .menu-name{font-weight:600;font-size:0.9rem;margin-bottom:4px;}
  .menu-desc{font-size:0.75rem;color:var(--muted);margin-bottom:8px;line-height:1.4;}
  .menu-price{font-family:'Prompt',sans-serif;color:var(--accent);font-size:1rem;font-weight:700;}
  .has-opts-badge{font-size:0.7rem;color:var(--muted);margin-top:3px;}
  .add-btn{width:100%;margin-top:8px;background:var(--accent);border:none;color:#000;font-weight:700;font-size:0.85rem;padding:8px;border-radius:8px;cursor:pointer;font-family:'Sarabun',sans-serif;transition:all 0.2s;}
  .add-btn:hover{background:var(--accent2);}

  .overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:200;display:none;}
  .cart-modal{position:fixed;bottom:0;left:0;right:0;z-index:201;background:var(--surface);border-radius:24px 24px 0 0;padding:24px 20px 32px;max-height:80vh;overflow-y:auto;transform:translateY(100%);transition:transform 0.35s cubic-bezier(.32,2,.55,.89);}
  .cart-modal.open{transform:translateY(0);}
  .cart-title{font-family:'Prompt',sans-serif;font-size:1.2rem;margin-bottom:16px;}
  .cart-item{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--border);}
  .ci-emoji{font-size:1.8rem;width:44px;text-align:center;}
  .ci-info{flex:1;}
  .ci-name{font-weight:600;font-size:0.9rem;}
  .ci-opts{font-size:0.75rem;color:var(--accent);margin-top:2px;}
  .ci-price{color:var(--muted);font-size:0.85rem;margin-top:2px;}
  .ci-qty{display:flex;align-items:center;gap:10px;}
  .qty-btn{background:var(--card);border:1px solid var(--border);color:var(--text);width:30px;height:30px;border-radius:50%;cursor:pointer;font-size:1rem;transition:all 0.15s;}
  .qty-btn:hover{background:var(--accent);color:#000;border-color:var(--accent);}
  .note-input{width:100%;margin-top:16px;padding:12px;background:var(--card);border:1px solid var(--border);border-radius:10px;color:var(--text);font-family:'Sarabun',sans-serif;font-size:0.9rem;resize:none;}
  .order-total{margin-top:16px;font-size:1.1rem;font-weight:700;text-align:right;}
  .order-total span{color:var(--accent);font-family:'Prompt',sans-serif;font-size:1.3rem;}
  .confirm-btn{width:100%;margin-top:16px;background:var(--accent);color:#000;border:none;border-radius:14px;padding:16px;font-size:1rem;font-weight:700;font-family:'Sarabun',sans-serif;cursor:pointer;transition:all 0.2s;}
  .confirm-btn:hover{background:var(--accent2);}
  .confirm-btn:disabled{background:var(--muted);cursor:not-allowed;}
  .empty-cart{text-align:center;padding:40px;color:var(--muted);}

  /* Options modal */
  .opt-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.65);z-index:250;display:none;}
  .opt-overlay.open{display:block;}
  .opt-modal{position:fixed;bottom:0;left:0;right:0;z-index:251;background:var(--surface);border-radius:24px 24px 0 0;padding:24px 20px 36px;max-height:85vh;overflow-y:auto;transform:translateY(100%);transition:transform 0.35s cubic-bezier(.32,2,.55,.89);}
  .opt-modal.open{transform:translateY(0);}
  .opt-modal-header{display:flex;align-items:center;gap:12px;margin-bottom:4px;}
  .opt-modal-emoji{font-size:2.2rem;}
  .opt-modal-name{font-family:'Prompt',sans-serif;font-size:1.1rem;font-weight:700;}
  .opt-modal-price{color:var(--accent);font-family:'Prompt',sans-serif;font-size:1rem;margin-bottom:16px;}
  .opt-group-label{font-size:0.75rem;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.06em;margin:18px 0 10px;display:flex;align-items:center;gap:6px;}
  .opt-required-badge{background:var(--accent);color:#000;font-size:0.65rem;padding:2px 8px;border-radius:10px;font-weight:700;}
  .opt-chips{display:flex;flex-wrap:wrap;gap:8px;}
  .opt-chip{padding:10px 20px;border-radius:50px;border:1.5px solid var(--border);background:var(--card);color:var(--text);font-family:'Sarabun',sans-serif;font-size:0.9rem;cursor:pointer;transition:all 0.18s;user-select:none;}
  .opt-chip.selected{background:var(--accent);color:#000;border-color:var(--accent);font-weight:700;}
  .opt-chip:active{transform:scale(0.96);}
  .chip-price{font-size:0.8rem;opacity:0.85;}
  .opt-add-cart-btn{width:100%;margin-top:22px;background:var(--accent);color:#000;border:none;border-radius:14px;padding:16px;font-size:1rem;font-weight:700;font-family:'Sarabun',sans-serif;cursor:pointer;transition:all 0.2s;}
  .opt-add-cart-btn:active{transform:scale(0.98);}
  .opt-add-cart-btn:disabled{background:var(--muted);cursor:not-allowed;}

  .success-screen{display:none;position:fixed;inset:0;background:var(--bg);z-index:300;flex-direction:column;align-items:center;justify-content:center;gap:20px;}
  .success-screen.show{display:flex;}
  .success-icon{font-size:5rem;animation:pop 0.5s cubic-bezier(.32,2,.55,.89);}
  @keyframes pop{from{transform:scale(0)}to{transform:scale(1)}}
  .success-screen h2{font-family:'Prompt',sans-serif;font-size:1.5rem;color:var(--success);}
  .success-screen p{color:var(--muted);font-size:0.9rem;}
  .back-btn{background:var(--card);border:1px solid var(--border);color:var(--text);padding:12px 28px;border-radius:50px;cursor:pointer;font-family:'Sarabun',sans-serif;font-size:0.9rem;transition:all 0.2s;margin-top:10px;}
  .back-btn:hover{background:var(--accent);color:#000;}

  .table-closed-screen{display:none;position:fixed;inset:0;background:var(--bg);z-index:300;flex-direction:column;align-items:center;justify-content:center;gap:16px;text-align:center;padding:32px;}
  .table-closed-screen.show{display:flex;}
  .closed-icon{font-size:5rem;}
  .table-closed-screen h2{font-family:'Prompt',sans-serif;font-size:1.5rem;color:#cc4444;}
  .table-closed-screen p{color:var(--muted);font-size:0.95rem;line-height:1.6;}

  .loading{text-align:center;padding:60px;color:var(--muted);}
  .spinner{width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 16px;}
  @keyframes spin{to{transform:rotate(360deg)}}

  /* LINE Profile */
  .line-profile{display:flex;align-items:center;gap:8px;cursor:pointer;}
  .line-avatar{width:34px;height:34px;border-radius:50%;border:2px solid var(--accent);object-fit:cover;flex-shrink:0;}
  .line-avatar-placeholder{width:34px;height:34px;border-radius:50%;background:var(--card);border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:1rem;flex-shrink:0;}
  .line-name{font-size:0.78rem;color:var(--muted);max-width:80px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .header-right{display:flex;align-items:center;gap:10px;}
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <h1>🍽️ สั่งอาหาร</h1>
    <p id="restaurantName">กำลังโหลด...</p>
  </div>
  <div class="header-right">
    <div class="line-profile" id="lineProfile" title="โปรไฟล์ LINE">
      <div class="line-avatar-placeholder" id="lineAvatarWrap">👤</div>
      <span class="line-name" id="lineName"></span>
    </div>
    <button class="cart-btn" onclick="toggleCart()">
      🛒 <span class="cart-count" id="cartCount">0</span>
    </button>
  </div>
</div>

<div class="table-banner">
  <div class="table-num" id="tableDisplay">-</div>
  <div class="table-label">โต๊ะของคุณ</div>
</div>

<div class="categories" id="categoriesBar"></div>
<div id="menuContainer">
  <div class="loading"><div class="spinner"></div>กำลังโหลดเมนู...</div>
</div>

<div class="overlay" id="overlay" onclick="toggleCart()"></div>
<div class="cart-modal" id="cartModal">
  <div class="cart-title">🛒 รายการที่เลือก</div>
  <div id="cartItems"></div>
  <textarea class="note-input" id="orderNote" rows="2" placeholder="หมายเหตุ เช่น ไม่ใส่ผัก, เผ็ดน้อย..."></textarea>
  <div class="order-total">รวม: <span id="totalPrice">฿0</span></div>
  <button class="confirm-btn" id="confirmBtn" onclick="submitOrder()">✅ ส่งออเดอร์</button>
</div>

<div class="opt-overlay" id="optOverlay" onclick="closeOptModal()"></div>
<div class="opt-modal" id="optModal">
  <div class="opt-modal-header">
    <div class="opt-modal-emoji" id="optEmoji"></div>
    <div class="opt-modal-name" id="optName"></div>
  </div>
  <div class="opt-modal-price" id="optPrice"></div>
  <div id="optGroupsBody"></div>
  <button class="opt-add-cart-btn" id="optAddBtn" onclick="confirmAddToCart()">+ เพิ่มใส่ตะกร้า</button>
</div>

<div class="table-closed-screen" id="tableClosedScreen">
  <div class="closed-icon">🔒</div>
  <h2>โต๊ะนี้ปิดอยู่</h2>
  <p>ขณะนี้โต๊ะ <strong id="closedTableNum"></strong> ยังไม่เปิดให้บริการ<br>กรุณาติดต่อพนักงาน</p>
</div>

<div class="success-screen" id="successScreen">
  <div class="success-icon">✅</div>
  <h2>ส่งออเดอร์แล้ว!</h2>
  <p>ครัวได้รับออเดอร์ของคุณแล้ว</p>
  <p id="successOrderId" style="color:var(--accent);font-weight:700;"></p>
  <button class="back-btn" onclick="resetOrder()">สั่งเพิ่ม</button>
</div>

<script>
const GAS_URL   = 'https://script.google.com/macros/s/AKfycbzX3F5pmXMe2lerCHLPDn9Ky3Tf8ToFR0AwpD8Q6rm5_GcjVWRdlRfp-UJZbVdFnKll/exec';
const LIFF_ID   = '2007719419-VWYNXsXh';

let menu    = [];
let cart    = [];
let tableNum   = '1';
let currentCat = 'ทั้งหมด';
let gasUrl     = GAS_URL;
let lineUser   = null; // { userId, displayName, pictureUrl }
let currentOptItem       = null;
let currentOptSelections = {};

async function initLiff() {
  try {
    await liff.init({ liffId: LIFF_ID });
    if (!liff.isLoggedIn()) {
      liff.login({ redirectUri: window.location.href });
      return false;
    }
    const profile = await liff.getProfile();
    lineUser = {
      userId:      profile.userId,
      displayName: profile.displayName,
      pictureUrl:  profile.pictureUrl || ''
    };
    // แสดงโปรไฟล์ใน header
    document.getElementById('lineName').textContent = profile.displayName;
    if (profile.pictureUrl) {
      document.getElementById('lineAvatarWrap').innerHTML =
        '<img class="line-avatar" src="' + profile.pictureUrl + '" alt="avatar">';
    }
    return true;
  } catch(e) {
    console.warn('LIFF init failed:', e);
    return true; // ถ้า LIFF ใช้ไม่ได้ (เปิดนอก LINE) ให้ทำงานต่อได้
  }
}

function getParams() {
  const p = new URLSearchParams(window.location.search);
  tableNum = p.get('table') || '1';
  document.getElementById('tableDisplay').textContent = tableNum;
}

async function loadMenu() {
  getParams();
  // init LIFF ก่อน — ถ้า redirect login จะหยุดที่นี่
  const liffReady = await initLiff();
  if (!liffReady) return;
  try {
    const res  = await fetch(gasUrl + '?action=getMenu');
    const data = await res.json();
    let tableStates = {};
    try { tableStates = JSON.parse(data.tableStates || '{}'); } catch(e) {}
    if (tableStates[String(tableNum)] === false) {
      document.getElementById('closedTableNum').textContent = tableNum;
      document.getElementById('tableClosedScreen').classList.add('show');
      document.getElementById('restaurantName').textContent = data.restaurantName || 'ร้านอาหาร';
      return;
    }
    menu = data.menu || [];
    document.getElementById('restaurantName').textContent = data.restaurantName || 'ร้านอาหาร';
    document.title = data.restaurantName || 'สั่งอาหาร';
    renderCategories();
    renderMenu('ทั้งหมด');
  } catch(e) {
    document.getElementById('menuContainer').innerHTML =
      '<div class="loading" style="color:#cc5533">⚠️ โหลดเมนูไม่ได้ กรุณาลองใหม่</div>';
  }
}

function renderCategories() {
  const cats = ['ทั้งหมด', ...new Set(menu.map(m => m.category).filter(Boolean))];
  document.getElementById('categoriesBar').innerHTML =
    cats.map(c => `<button class="cat-btn ${c===currentCat?'active':''}" onclick="filterCat('${c}')">${c}</button>`).join('');
}

function filterCat(cat) {
  currentCat = cat;
  renderCategories();
  renderMenu(cat);
}

function renderMenu(cat) {
  const items = cat === 'ทั้งหมด' ? menu : menu.filter(m => m.category === cat);
  if (!items.length) {
    document.getElementById('menuContainer').innerHTML = '<div class="loading">ไม่มีเมนูในหมวดนี้</div>';
    return;
  }
  document.getElementById('menuContainer').innerHTML = '<div class="menu-grid">' + items.map(item => {
    let hasOpts = false;
    try { hasOpts = !!(item.options && JSON.parse(item.options).filter(g => g.name && g.choices && g.choices.length).length); } catch(e) {}
    const soldOut = item.available === false || item.available === 'false';
    return '<div class="menu-card' + (soldOut ? ' out-of-stock' : '') + '">' +
      '<div class="menu-img">' +
        (item.image ? '<img src="' + item.image + '" onerror="this.style.display=\'none\'">' : '') +
        '<span>' + (item.emoji || '🍽️') + '</span>' +
        (soldOut ? '<div class="badge-sold">หมด</div>' : '') +
      '</div>' +
      '<div class="menu-info">' +
        '<div class="menu-name">' + item.name + '</div>' +
        (item.description ? '<div class="menu-desc">' + item.description + '</div>' : '') +
        '<div class="menu-price">฿' + Number(item.price).toLocaleString() + '</div>' +
        (hasOpts ? '<div class="has-opts-badge">🎛️ มีตัวเลือกเสริม</div>' : '') +
        '<button class="add-btn" onclick="addToCart(\'' + item.id + '\', event)">+ เพิ่ม</button>' +
      '</div>' +
    '</div>';
  }).join('') + '</div>';
}

function addToCart(id, ev) {
  const item = menu.find(m => m.id === id);
  if (!item) return;
  let groups = [];
  try { groups = item.options ? JSON.parse(item.options) : []; } catch(e) {}
  groups = groups.filter(g => g.name && g.choices && g.choices.length);
  if (groups.length > 0) {
    openOptModal(item, groups);
  } else {
    pushToCart(item, {});
    if (ev && ev.target) {
      const btn = ev.target;
      btn.textContent = '✓ เพิ่มแล้ว';
      btn.style.background = 'var(--success)';
      setTimeout(function() { btn.textContent = '+ เพิ่ม'; btn.style.background = ''; }, 800);
    }
  }
}

function openOptModal(item, groups) {
  currentOptItem       = { item, groups };
  currentOptSelections = {};
  document.getElementById('optEmoji').textContent = item.emoji || '🍽️';
  document.getElementById('optName').textContent  = item.name;
  document.getElementById('optPrice').textContent = '฿' + Number(item.price).toLocaleString();
  renderOptGroupsUI(groups);
  updateOptAddBtn();
  document.getElementById('optOverlay').classList.add('open');
  document.getElementById('optModal').classList.add('open');
}

function closeOptModal() {
  document.getElementById('optOverlay').classList.remove('open');
  document.getElementById('optModal').classList.remove('open');
  currentOptItem       = null;
  currentOptSelections = {};
}

function renderOptGroupsUI(groups) {
  document.getElementById('optGroupsBody').innerHTML = groups.map(function(g) {
    return '<div class="opt-group-label">' + g.name + '</div>' +
      '<div class="opt-chips">' +
      g.choices.map(function(c) {
        // รองรับทั้ง { label, extraPrice } และ string เก่า
        var label      = typeof c === 'object' ? c.label : c;
        var extraPrice = typeof c === 'object' ? (c.extraPrice || 0) : 0;
        var isSelected = currentOptSelections[g.name] && currentOptSelections[g.name].label === label;
        var priceTag   = extraPrice > 0 ? ' <span class="chip-price">+฿' + extraPrice + '</span>' : '';
        var gn = g.name.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
        var lb = label.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
        return '<div class="opt-chip' + (isSelected ? ' selected' : '') + '" onclick="selectOpt(\'' + gn + '\',\'' + lb + '\',' + extraPrice + ')">' +
          label + priceTag +
        '</div>';
      }).join('') +
      '</div>';
  }).join('');
}

function selectOpt(groupName, label, extraPrice) {
  currentOptSelections[groupName] = { label: label, extraPrice: extraPrice || 0 };
  if (currentOptItem) renderOptGroupsUI(currentOptItem.groups);
  updateOptAddBtn();
}

function updateOptAddBtn() {
  if (!currentOptItem) return;
  var total    = currentOptItem.groups.length;
  var selected = Object.keys(currentOptSelections).length;
  var allDone  = selected >= total;
  var btn = document.getElementById('optAddBtn');
  btn.disabled = !allDone;
  if (allDone) {
    var extraTotal = Object.values(currentOptSelections).reduce(function(a,s){ return a + (s.extraPrice||0); }, 0);
    var basePrice  = currentOptItem.item.price;
    var finalPrice = basePrice + extraTotal;
    btn.textContent = '+ เพิ่มใส่ตะกร้า  ฿' + finalPrice.toLocaleString();
  } else {
    btn.textContent = 'เลือกให้ครบก่อน (' + selected + '/' + total + ')';
  }
}

function confirmAddToCart() {
  if (!currentOptItem) return;
  pushToCart(currentOptItem.item, Object.assign({}, currentOptSelections));
  closeOptModal();
}

function pushToCart(item, opts) {
  var extraTotal = Object.values(opts).reduce(function(a,s){ return a + (s && s.extraPrice ? s.extraPrice : 0); }, 0);
  var finalPrice = item.price + extraTotal;
  var optsKey    = JSON.stringify(opts);
  var existing   = cart.find(function(e){ return e.id === item.id && JSON.stringify(e.opts) === optsKey; });
  if (existing) {
    existing.qty += 1;
  } else {
    cart.push({ cartId: item.id + '-' + Date.now(), id: item.id, name: item.name, emoji: item.emoji || '', price: finalPrice, basePrice: item.price, qty: 1, opts: opts });
  }
  updateCartCount();
}

function updateCartCount() {
  document.getElementById('cartCount').textContent = cart.reduce(function(a,e){return a+e.qty;}, 0);
}

function toggleCart() {
  var modal   = document.getElementById('cartModal');
  var overlay = document.getElementById('overlay');
  if (!modal.classList.contains('open')) {
    renderCartItems();
    modal.classList.add('open');
    overlay.style.display = 'block';
  } else {
    modal.classList.remove('open');
    overlay.style.display = 'none';
  }
}

function renderCartItems() {
  var container = document.getElementById('cartItems');
  if (!cart.length) {
    container.innerHTML = '<div class="empty-cart">🛒<br>ยังไม่ได้เลือกอาหาร</div>';
    document.getElementById('totalPrice').textContent = '฿0';
    document.getElementById('confirmBtn').disabled = true;
    return;
  }
  document.getElementById('confirmBtn').disabled = false;
  var total = 0;
  container.innerHTML = cart.map(function(e) {
    total += e.price * e.qty;
    var optsText = Object.values(e.opts).map(function(s){ return typeof s === 'object' ? s.label : s; }).join(' · ');
    return '<div class="cart-item">' +
      '<div class="ci-emoji">' + (e.emoji||'🍽️') + '</div>' +
      '<div class="ci-info">' +
        '<div class="ci-name">' + e.name + '</div>' +
        (optsText ? '<div class="ci-opts">' + optsText + '</div>' : '') +
        '<div class="ci-price">฿' + (e.price * e.qty).toLocaleString() + '</div>' +
      '</div>' +
      '<div class="ci-qty">' +
        '<button class="qty-btn" onclick="changeQty(\'' + e.cartId + '\',-1)">−</button>' +
        '<span>' + e.qty + '</span>' +
        '<button class="qty-btn" onclick="changeQty(\'' + e.cartId + '\',1)">+</button>' +
      '</div>' +
    '</div>';
  }).join('');
  document.getElementById('totalPrice').textContent = '฿' + total.toLocaleString();
}

function changeQty(cartId, delta) {
  var idx = cart.findIndex(function(e){return e.cartId===cartId;});
  if (idx === -1) return;
  cart[idx].qty += delta;
  if (cart[idx].qty <= 0) cart.splice(idx, 1);
  updateCartCount();
  renderCartItems();
}

async function submitOrder() {
  var btn = document.getElementById('confirmBtn');
  btn.disabled    = true;
  btn.textContent = '⏳ กำลังส่ง...';
  var items = cart.map(function(e) {
    var optsLabels = Object.values(e.opts).map(function(s){ return typeof s === 'object' ? s.label : s; });
    var optsLabel  = optsLabels.length ? ' (' + optsLabels.join(', ') + ')' : '';
    return { id: e.id, name: e.name + optsLabel, emoji: e.emoji, qty: e.qty, price: e.price, total: e.price * e.qty, opts: e.opts };
  });
  var note    = document.getElementById('orderNote').value;
  var orderId = 'ORD-' + Date.now();
  var grand   = items.reduce(function(a,b){return a+b.total;}, 0);
  var payload = {
    action: 'addOrder', orderId: orderId, table: tableNum,
    items: items, note: note, total: grand, status: 'รอดำเนินการ',
    time: new Date().toLocaleString('th-TH'),
    customer: lineUser ? { name: lineUser.displayName, userId: lineUser.userId, pictureUrl: lineUser.pictureUrl } : null
  };
  try {
    await fetch(gasUrl, { method:'POST', body: JSON.stringify(payload) });
    cart = [];
    updateCartCount();
    toggleCart();
    document.getElementById('successOrderId').textContent = 'หมายเลขออเดอร์: ' + orderId;
    document.getElementById('successScreen').classList.add('show');
  } catch(e) {
    btn.disabled    = false;
    btn.textContent = '✅ ส่งออเดอร์';
    alert('เกิดข้อผิดพลาด กรุณาลองใหม่');
  }
}

function resetOrder() {
  document.getElementById('successScreen').classList.remove('show');
  document.getElementById('orderNote').value = '';
  cart = [];
  updateCartCount();
}

loadMenu();
</script>
