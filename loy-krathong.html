<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ลอยกระทงดิจิทัล 🪷</title>

<!-- LINE LIFF SDK -->
<script src="https://static.line-scdn.net/liff/edge/versions/2.22.3/sdk.js"></script>

<style>
  @import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&family=Mitr:wght@300;400;600&display=swap');

  :root {
    --gold: #F4C542;
    --gold-dark: #C89B0A;
    --orange: #FF7A1A;
    --deep: #0a0a1a;
    --water-dark: #051428;
    --water-mid: #0a2545;
    --water-light: #0d3b6e;
    --lotus-pink: #F472B6;
    --lotus-pale: #FBCFE8;
    --candle: #FFD700;
    --smoke: rgba(255,220,100,0.15);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Sarabun', sans-serif;
    background: var(--deep);
    min-height: 100vh;
    overflow-x: hidden;
    color: white;
  }

  /* ===== NIGHT SKY ===== */
  #sky {
    position: fixed; top: 0; left: 0;
    width: 100%; height: 45%;
    background: linear-gradient(180deg, #020408 0%, #06112a 50%, #0a1f4a 100%);
    z-index: 0;
    overflow: hidden;
  }

  .star {
    position: absolute;
    border-radius: 50%;
    background: white;
    animation: twinkle var(--dur) ease-in-out infinite alternate;
  }

  @keyframes twinkle {
    from { opacity: var(--min-op); transform: scale(1); }
    to { opacity: 1; transform: scale(1.3); }
  }

  /* Moon */
  #moon {
    position: absolute;
    top: 12%; right: 12%;
    width: 70px; height: 70px;
    border-radius: 50%;
    background: radial-gradient(circle at 35% 35%, #fffde7, #fdd835 40%, #f9a825);
    box-shadow: 0 0 30px 10px rgba(253,216,53,0.3), 0 0 80px 20px rgba(253,216,53,0.15);
    animation: moonGlow 4s ease-in-out infinite alternate;
  }

  @keyframes moonGlow {
    from { box-shadow: 0 0 30px 10px rgba(253,216,53,0.3), 0 0 80px 20px rgba(253,216,53,0.15); }
    to { box-shadow: 0 0 40px 15px rgba(253,216,53,0.5), 0 0 100px 30px rgba(253,216,53,0.25); }
  }

  /* ===== KHOM LOI (Sky Lanterns) ===== */
  .khom-loi {
    position: fixed;
    width: 18px; height: 24px;
    z-index: 2;
    pointer-events: none;
    animation: floatUp var(--dur) linear forwards;
  }

  .khom-loi::before {
    content: '';
    position: absolute;
    top: 0; left: 50%; transform: translateX(-50%);
    width: 18px; height: 22px;
    background: radial-gradient(ellipse at 50% 30%, rgba(255,220,80,0.9) 0%, rgba(255,160,20,0.7) 60%, rgba(200,100,0,0.3) 100%);
    border-radius: 50% 50% 40% 40%;
    box-shadow: 0 0 12px 4px rgba(255,200,50,0.6);
    animation: lanternPulse 1.5s ease-in-out infinite alternate;
  }

  .khom-loi::after {
    content: '';
    position: absolute;
    bottom: -4px; left: 50%; transform: translateX(-50%);
    width: 2px; height: 6px;
    background: rgba(255,150,0,0.8);
    border-radius: 0 0 2px 2px;
  }

  @keyframes floatUp {
    from { transform: translateY(0) translateX(0); opacity: 1; }
    to { transform: translateY(-100vh) translateX(var(--drift)); opacity: 0; }
  }

  @keyframes lanternPulse {
    from { box-shadow: 0 0 12px 4px rgba(255,200,50,0.6); }
    to { box-shadow: 0 0 20px 8px rgba(255,220,80,0.9); }
  }

  /* ===== RIVER ===== */
  #river {
    position: fixed;
    top: 42%; left: 0;
    width: 100%; height: 58%;
    background: linear-gradient(180deg,
      #062040 0%,
      #083060 20%,
      #0a4080 40%,
      #083060 70%,
      #062040 100%
    );
    overflow: hidden;
    z-index: 1;
  }

  /* Water shimmer */
  .water-shimmer {
    position: absolute;
    top: 0; left: -100%;
    width: 300%; height: 100%;
    background: repeating-linear-gradient(
      90deg,
      transparent 0px,
      rgba(255,255,255,0.02) 2px,
      transparent 4px,
      transparent 20px
    );
    animation: waterFlow 8s linear infinite;
  }

  .water-shimmer:nth-child(2) {
    animation-duration: 12s;
    animation-direction: reverse;
    opacity: 0.5;
    background: repeating-linear-gradient(
      85deg,
      transparent 0px,
      rgba(100,200,255,0.03) 3px,
      transparent 6px,
      transparent 25px
    );
  }

  @keyframes waterFlow {
    from { transform: translateX(0); }
    to { transform: translateX(33.33%); }
  }

  /* Moon reflection */
  .moon-reflection {
    position: absolute;
    top: 5%; left: 50%;
    transform: translateX(-50%);
    width: 20px;
    height: 120px;
    background: linear-gradient(180deg, rgba(253,216,53,0.6) 0%, rgba(253,216,53,0.1) 60%, transparent 100%);
    border-radius: 50%;
    filter: blur(8px);
    animation: reflectionWave 3s ease-in-out infinite alternate;
  }

  @keyframes reflectionWave {
    from { transform: translateX(-50%) scaleX(1); opacity: 0.7; }
    to { transform: translateX(-50%) scaleX(1.5); opacity: 1; }
  }

  /* ===== FLOATING KRATHONG ===== */
  .krathong {
    position: absolute;
    cursor: pointer;
    animation: floatDrift var(--dur) ease-in-out infinite alternate,
               driftAcross var(--cross-dur) linear forwards;
    transform-origin: center bottom;
    z-index: 10;
    transition: transform 0.3s;
  }

  .krathong:hover { transform: scale(1.15); }

  @keyframes floatDrift {
    from { transform: translateY(0px) rotate(-2deg); }
    to { transform: translateY(-8px) rotate(2deg); }
  }

  @keyframes driftAcross {
    from { left: var(--start-x); top: var(--start-y); }
    to { left: calc(var(--start-x) + var(--drift-x)); top: calc(var(--start-y) + var(--drift-y)); }
  }

  .krathong-svg {
    filter: drop-shadow(0 2px 8px rgba(0,0,0,0.5));
  }

  .candle-flame {
    animation: flicker 0.3s ease-in-out infinite alternate;
    transform-origin: bottom center;
  }

  @keyframes flicker {
    from { transform: scaleX(1) scaleY(1); opacity: 1; }
    to { transform: scaleX(0.85) scaleY(1.1); opacity: 0.9; }
  }

  .ripple {
    position: absolute;
    bottom: -4px; left: 50%;
    transform: translateX(-50%);
    width: 60px; height: 10px;
    border-radius: 50%;
    border: 1px solid rgba(100,180,255,0.3);
    animation: rippleOut 2s ease-out infinite;
  }

  .ripple:nth-child(2) { animation-delay: 0.7s; }
  .ripple:nth-child(3) { animation-delay: 1.4s; }

  @keyframes rippleOut {
    from { transform: translateX(-50%) scale(0.5); opacity: 0.6; }
    to { transform: translateX(-50%) scale(2.5); opacity: 0; }
  }

  /* ===== BANK / GROUND ===== */
  .bank {
    position: fixed;
    bottom: 0; left: 0;
    width: 100%; height: 8%;
    background: linear-gradient(180deg, #1a3a1a 0%, #0d2010 100%);
    z-index: 20;
  }

  .bank::before {
    content: '';
    position: absolute;
    top: -10px; left: 0;
    width: 100%; height: 15px;
    background: repeating-linear-gradient(
      90deg,
      #1e4a1e 0px, #2d6e2d 20px, #1e4a1e 40px
    );
    border-radius: 50% 50% 0 0;
    filter: blur(3px);
  }

  /* ===== TEMPLE SILHOUETTE ===== */
  #temple {
    position: fixed;
    bottom: 8%;
    right: 5%;
    z-index: 3;
    opacity: 0.6;
  }

  /* ===== UI PANEL ===== */
  #ui-panel {
    position: fixed;
    bottom: 8%;
    left: 0; right: 0;
    z-index: 50;
    display: flex;
    justify-content: center;
    padding: 0 16px;
  }

  #form-card {
    background: rgba(5, 20, 45, 0.92);
    backdrop-filter: blur(20px);
    border: 1px solid rgba(244, 197, 66, 0.3);
    border-radius: 20px;
    padding: 20px;
    width: 100%;
    max-width: 420px;
    box-shadow: 0 8px 40px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,215,0,0.1);
  }

  .form-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 16px;
  }

  #user-avatar {
    width: 46px; height: 46px;
    border-radius: 50%;
    border: 2px solid var(--gold);
    object-fit: cover;
    flex-shrink: 0;
  }

  .user-name {
    font-family: 'Mitr', sans-serif;
    font-size: 15px;
    font-weight: 600;
    color: var(--gold);
    line-height: 1.2;
  }

  .user-sub {
    font-size: 11px;
    color: rgba(255,255,255,0.5);
    margin-top: 2px;
  }

  .form-title {
    font-family: 'Mitr', sans-serif;
    text-align: center;
    font-size: 18px;
    font-weight: 600;
    color: var(--gold);
    letter-spacing: 0.05em;
    margin-bottom: 14px;
    text-shadow: 0 0 20px rgba(244,197,66,0.5);
  }

  .form-title span { font-size: 20px; }

  .input-group {
    position: relative;
    margin-bottom: 10px;
  }

  .input-group textarea,
  .input-group input {
    width: 100%;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(244,197,66,0.2);
    border-radius: 12px;
    padding: 12px 14px;
    color: white;
    font-family: 'Sarabun', sans-serif;
    font-size: 14px;
    outline: none;
    resize: none;
    transition: border-color 0.3s, box-shadow 0.3s;
  }

  .input-group textarea:focus,
  .input-group input:focus {
    border-color: rgba(244,197,66,0.6);
    box-shadow: 0 0 0 3px rgba(244,197,66,0.1);
  }

  .input-group textarea::placeholder,
  .input-group input::placeholder { color: rgba(255,255,255,0.3); }

  .char-count {
    position: absolute;
    bottom: 8px; right: 10px;
    font-size: 10px;
    color: rgba(255,255,255,0.3);
  }

  /* Krathong style picker */
  .style-label {
    font-size: 12px;
    color: rgba(255,255,255,0.5);
    margin-bottom: 8px;
  }

  .style-picker {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 6px;
    margin-bottom: 14px;
  }

  .style-option {
    flex: 1;
    padding: 8px 4px;
    border: 1.5px solid rgba(255,255,255,0.15);
    border-radius: 10px;
    cursor: pointer;
    text-align: center;
    transition: all 0.2s;
    background: rgba(255,255,255,0.04);
  }

  .style-option.selected {
    border-color: var(--gold);
    background: rgba(244,197,66,0.12);
    box-shadow: 0 0 10px rgba(244,197,66,0.2);
  }

  .style-option svg { display: block; margin: 0 auto 4px; }
  .style-option span { font-size: 10px; color: rgba(255,255,255,0.6); }
  .style-option.selected span { color: var(--gold); }

  /* Float button */
  #float-btn {
    width: 100%;
    padding: 14px;
    background: linear-gradient(135deg, #C89B0A 0%, #F4C542 50%, #C89B0A 100%);
    border: none;
    border-radius: 14px;
    color: #1a0a00;
    font-family: 'Mitr', sans-serif;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    letter-spacing: 0.05em;
    box-shadow: 0 4px 20px rgba(244,197,66,0.4);
    transition: all 0.3s;
    position: relative;
    overflow: hidden;
  }

  #float-btn::after {
    content: '';
    position: absolute;
    top: -50%; left: -60%;
    width: 40%; height: 200%;
    background: rgba(255,255,255,0.3);
    transform: skewX(-20deg);
    transition: left 0.5s;
  }

  #float-btn:hover::after { left: 120%; }
  #float-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(244,197,66,0.6); }
  #float-btn:active { transform: translateY(0); }
  #float-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

  /* ===== LOGIN SCREEN ===== */
  #login-screen {
    position: fixed;
    inset: 0;
    z-index: 100;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: radial-gradient(ellipse at center, #0a1f4a 0%, #020408 100%);
  }

  .login-logo { font-size: 72px; margin-bottom: 16px; animation: pulse 2s ease-in-out infinite; }

  @keyframes pulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.05); }
  }

  .login-title {
    font-family: 'Mitr', sans-serif;
    font-size: 28px;
    font-weight: 600;
    color: var(--gold);
    text-shadow: 0 0 30px rgba(244,197,66,0.8);
    margin-bottom: 6px;
  }

  .login-sub {
    font-size: 14px;
    color: rgba(255,255,255,0.5);
    margin-bottom: 40px;
  }

  #line-login-btn {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 16px 32px;
    background: #00C300;
    border: none;
    border-radius: 50px;
    color: white;
    font-family: 'Mitr', sans-serif;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    box-shadow: 0 4px 20px rgba(0,195,0,0.4);
    transition: all 0.3s;
  }

  #line-login-btn:hover { transform: translateY(-3px); box-shadow: 0 8px 30px rgba(0,195,0,0.6); }

  #line-login-btn svg { flex-shrink: 0; }

  /* ===== TOAST ===== */
  #toast {
    position: fixed;
    top: 20px; left: 50%;
    transform: translateX(-50%) translateY(-80px);
    z-index: 200;
    background: rgba(5,20,45,0.95);
    border: 1px solid var(--gold);
    border-radius: 12px;
    padding: 12px 20px;
    font-family: 'Mitr', sans-serif;
    font-size: 14px;
    color: white;
    transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    white-space: nowrap;
    box-shadow: 0 4px 20px rgba(0,0,0,0.5);
  }

  #toast.show { transform: translateX(-50%) translateY(0); }

  /* ===== KRATHONG POPUP ===== */
  #krathong-popup {
    position: fixed;
    inset: 0;
    z-index: 80;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(5px);
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s;
  }

  #krathong-popup.show { opacity: 1; pointer-events: all; }

  .popup-card {
    background: rgba(5,20,45,0.97);
    border: 1px solid rgba(244,197,66,0.4);
    border-radius: 20px;
    padding: 24px;
    width: 90%;
    max-width: 320px;
    text-align: center;
    box-shadow: 0 20px 60px rgba(0,0,0,0.8);
    transform: scale(0.9);
    transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  #krathong-popup.show .popup-card { transform: scale(1); }

  .popup-avatar {
    width: 52px; height: 52px;
    border-radius: 50%;
    border: 2px solid var(--gold);
    margin: 0 auto 10px;
    display: block;
  }

  .popup-name {
    font-family: 'Mitr', sans-serif;
    font-size: 14px;
    color: var(--gold);
    margin-bottom: 10px;
  }

  .popup-wish {
    font-size: 14px;
    color: rgba(255,255,255,0.8);
    line-height: 1.6;
    margin-bottom: 16px;
    font-style: italic;
  }

  .popup-close {
    padding: 8px 24px;
    background: rgba(244,197,66,0.15);
    border: 1px solid rgba(244,197,66,0.3);
    border-radius: 20px;
    color: var(--gold);
    font-family: 'Mitr', sans-serif;
    cursor: pointer;
    transition: all 0.2s;
  }

  .popup-close:hover { background: rgba(244,197,66,0.3); }

  /* Recent krathongs list */
  #recent-section {
    margin-top: 14px;
    border-top: 1px solid rgba(244,197,66,0.15);
    padding-top: 12px;
  }

  .recent-title {
    font-size: 11px;
    color: rgba(255,255,255,0.4);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .recent-list {
    display: flex;
    flex-direction: column;
    gap: 6px;
    max-height: 180px;
    overflow-y: auto;
  }

  .recent-list::-webkit-scrollbar { width: 3px; }
  .recent-list::-webkit-scrollbar-track { background: transparent; }
  .recent-list::-webkit-scrollbar-thumb { background: rgba(244,197,66,0.3); border-radius: 4px; }

  .recent-item {
    display: flex;
    align-items: center;
    gap: 8px;
    background: rgba(255,255,255,0.04);
    border-radius: 10px;
    padding: 7px 10px;
    animation: fadeSlideIn 0.4s ease forwards;
  }

  @keyframes fadeSlideIn {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .recent-avatar {
    width: 28px; height: 28px;
    border-radius: 50%;
    border: 1.5px solid rgba(244,197,66,0.4);
    object-fit: cover;
    flex-shrink: 0;
    background: rgba(255,255,255,0.1);
  }

  .recent-dot {
    width: 28px; height: 28px;
    border-radius: 50%;
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px;
    border: 1.5px solid rgba(244,197,66,0.3);
  }

  .recent-info { flex: 1; min-width: 0; }

  .recent-name {
    font-size: 12px;
    font-weight: 600;
    color: rgba(255,255,255,0.9);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .recent-wish {
    font-size: 11px;
    color: rgba(255,255,255,0.45);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    margin-top: 1px;
  }

  .recent-badge {
    width: 10px; height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  /* Loading spinner */
  .spinner {
    display: inline-block;
    width: 16px; height: 16px;
    border: 2px solid rgba(26,10,0,0.4);
    border-top-color: rgba(26,10,0,0.9);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    vertical-align: middle;
    margin-right: 6px;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* Counter */
  #krathong-counter {
    position: fixed;
    top: 16px; left: 16px;
    z-index: 30;
    background: rgba(5,20,45,0.8);
    border: 1px solid rgba(244,197,66,0.3);
    border-radius: 20px;
    padding: 6px 14px;
    font-family: 'Mitr', sans-serif;
    font-size: 13px;
    color: var(--gold);
    backdrop-filter: blur(10px);
  }

  /* Decorative lotus petals in login */
  .petal {
    position: absolute;
    font-size: 24px;
    animation: petalFloat var(--dur) ease-in-out infinite alternate;
    opacity: 0.4;
  }

  @keyframes petalFloat {
    from { transform: translateY(0) rotate(0deg); }
    to { transform: translateY(-20px) rotate(15deg); }
  }
</style>
</head>
<body>

<!-- Night Sky -->
<div id="sky">
  <div id="moon"></div>
</div>

<!-- River -->
<div id="river">
  <div class="water-shimmer"></div>
  <div class="water-shimmer"></div>
  <div class="moon-reflection"></div>
</div>

<!-- Temple Silhouette -->
<div id="temple">
  <svg width="80" height="140" viewBox="0 0 80 140" fill="none">
    <!-- Spire -->
    <polygon points="40,0 44,30 36,30" fill="#1a3a2a" opacity="0.8"/>
    <rect x="36" y="28" width="8" height="10" fill="#1a3a2a" opacity="0.8"/>
    <!-- Tiers -->
    <rect x="30" y="38" width="20" height="8" rx="1" fill="#1e4a35" opacity="0.8"/>
    <rect x="25" y="46" width="30" height="8" rx="1" fill="#1e4a35" opacity="0.8"/>
    <rect x="20" y="54" width="40" height="8" rx="1" fill="#1e4a35" opacity="0.8"/>
    <!-- Body -->
    <rect x="28" y="62" width="24" height="40" rx="2" fill="#1a3a2a" opacity="0.8"/>
    <!-- Door -->
    <rect x="36" y="82" width="8" height="20" rx="4" fill="#0a1a10" opacity="0.9"/>
    <!-- Windows -->
    <circle cx="32" cy="72" r="3" fill="#0a1a10" opacity="0.9"/>
    <circle cx="48" cy="72" r="3" fill="#0a1a10" opacity="0.9"/>
    <!-- Base -->
    <rect x="15" y="102" width="50" height="8" rx="2" fill="#152a18" opacity="0.8"/>
    <rect x="10" y="110" width="60" height="30" fill="#0d2010" opacity="0.8"/>
  </svg>
</div>

<!-- Bank -->
<div class="bank"></div>

<!-- Counter -->
<div id="krathong-counter">🪷 <span id="counter-num">0</span> กระทง</div>

<!-- UI Panel -->
<div id="ui-panel">
  <div id="form-card">
    <div class="form-header">
      <img id="user-avatar" src="https://via.placeholder.com/46x46/1a3a5c/gold?text=👤" alt="avatar">
      <div>
        <div class="user-name" id="user-display-name">กำลังโหลด...</div>
        <div class="user-sub">เข้าสู่ระบบด้วย LINE แล้ว ✓</div>
      </div>
    </div>

    <div class="form-title"><span>🪷</span> ลอยกระทง <span>🕯️</span></div>

    <div class="style-label">เลือกแบบกระทง</div>
    <div class="style-picker">

<script>
// ===== CONFIG =====
const LIFF_ID = "2007719419-D5eN6tPM";
const SHEET_ID = "1hp_8UMDA-cEAjx_pz4ICcxVmxYu5ZlDND6GxrB3u5fA";
const DISCORD_WEBHOOK = "https://discord.com/api/webhooks/1430903614196416625/SblkD6sRJsD0V2wMPLzW1OMoh09zygsW9iU9_y0XrxkwsI6x3MfuRBgQQFRM50z0XYVu";

// Google Apps Script Web App URL (deploy this script in Google Apps Script)
// กรณียังไม่ได้ deploy ให้ใช้ mock mode
const GAS_URL = "https://script.google.com/macros/s/AKfycbwM6LgPjcoKS1ER-QeBGhfG9tJOj7qXvNigPeT6Pa_st0-GIY2CMl-D7rB4Dk5cP9QOOQ/exec";

const KRATHONG_COLORS = [
  { petals: ['#228B22','#2da44e','#1a6b30'], name: 'คลาสสิก' },
  { petals: ['#FF69B4','#FF1493','#c01070'], name: 'ชมพู' },
  { petals: ['#9B59B6','#8E44AD','#6c3483'], name: 'ม่วง' },
  { petals: ['#FFD700','#FFC200','#e6a800'], name: 'ทอง' },
  { petals: ['#E74C3C','#C0392B','#922b21'], name: 'แดง' },
  { petals: ['#1ABC9C','#16A085','#0e6655'], name: 'เขียวมรกต' },
  { petals: ['#F39C12','#E67E22','#ca6f1e'], name: 'ส้ม' },
  { petals: ['#5DADE2','#2E86C1','#1a5276'], name: 'ฟ้า' },
];

// ===== STATE =====
let userProfile = null;
let selectedStyle = 0;
let krathongData = [];
let floatCount = 0;

// ===== INIT =====
window.addEventListener('DOMContentLoaded', async () => {
  generateStars();
  startKhomLoi();
  initWishInput();
  await initLiff();
  loadExistingKrathongs();
});

// ===== STARS =====
function generateStars() {
  const sky = document.getElementById('sky');
  for (let i = 0; i < 120; i++) {
    const star = document.createElement('div');
    star.className = 'star';
    const size = Math.random() * 2.5 + 0.5;
    const minOp = Math.random() * 0.3 + 0.1;
    star.style.cssText = `
      left: ${Math.random()*100}%;
      top: ${Math.random()*100}%;
      width: ${size}px; height: ${size}px;
      --dur: ${Math.random()*3+1.5}s;
      --min-op: ${minOp};
      animation-delay: ${Math.random()*3}s;
    `;
    sky.appendChild(star);
  }
}

// ===== KHOM LOI =====
function startKhomLoi() {
  setInterval(() => {
    if (Math.random() > 0.4) spawnKhomLoi();
  }, 3000);
  setTimeout(() => spawnKhomLoi(), 500);
  setTimeout(() => spawnKhomLoi(), 1500);
}

function spawnKhomLoi() {
  const el = document.createElement('div');
  el.className = 'khom-loi';
  const dur = Math.random() * 15 + 12;
  const drift = (Math.random() - 0.5) * 100;
  el.style.cssText = `
    left: ${Math.random()*100}%;
    bottom: 10%;
    --dur: ${dur}s;
    --drift: ${drift}px;
  `;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), dur * 1000 + 500);
}

// ===== WISH INPUT =====
function initWishInput() {
  const input = document.getElementById('wish-input');
  const counter = document.getElementById('char-counter');
  input.addEventListener('input', () => {
    counter.textContent = input.value.length;
  });
}

// ===== STYLE PICKER =====
function selectStyle(idx) {
  selectedStyle = idx;
  document.querySelectorAll('.style-option').forEach((el, i) => {
    el.classList.toggle('selected', i === idx);
  });
}

// ===== LIFF INIT =====
async function initLiff() {
  try {
    await liff.init({ liffId: LIFF_ID });

    if (!liff.isLoggedIn()) {
      document.getElementById('login-screen').style.display = 'flex';
      return;
    }

    const profile = await liff.getProfile();
    userProfile = {
      userId: profile.userId,
      displayName: profile.displayName,
      pictureUrl: profile.pictureUrl || 'https://via.placeholder.com/46x46/1a3a5c/gold?text=%F0%9F%AA%B7',
    };

    document.getElementById('user-display-name').textContent = userProfile.displayName;
    document.getElementById('user-avatar').src = userProfile.pictureUrl;
    document.getElementById('login-screen').style.display = 'none';

  } catch (err) {
    console.error('LIFF init error:', err);
    document.getElementById('login-screen').style.display = 'flex';
  }
}

function loginWithLine() {
  liff.login();
}

// ===== LOAD KRATHONGS FROM SHEET =====
async function loadExistingKrathongs() {
  try {
    if (!GAS_URL) return; // Skip if no GAS URL

    const res = await fetch(`${GAS_URL}?action=get&sheetId=${SHEET_ID}`);
    const data = await res.json();
    if (data.rows) {
      data.rows.forEach(row => {
        const k = {
          userId: row[0],
          displayName: row[1],
          pictureUrl: row[2],
          wish: row[3],
          style: parseInt(row[4]) || 0,
          timestamp: row[5],
        };
        krathongData.push(k);
        renderKrathong(k);
      });
      updateCounter();
    }
  } catch(e) {
    console.log('Load existing krathongs error (expected if no GAS):', e.message);
  }
}

// ===== FLOAT KRATHONG =====
async function floatKrathong() {
  if (!userProfile) { showToast('⚠️ กรุณาเข้าสู่ระบบก่อน'); return; }

  const wish = document.getElementById('wish-input').value.trim();
  if (!wish) { showToast('💭 กรุณาเขียนคำอธิษฐาน'); return; }

  const btn = document.getElementById('float-btn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> กำลังลอยกระทง...';

  const krathong = {
    userId: userProfile.userId,
    displayName: userProfile.displayName,
    pictureUrl: userProfile.pictureUrl,
    wish: wish,
    style: selectedStyle,
    timestamp: new Date().toLocaleString('th-TH', { timeZone: 'Asia/Bangkok' }),
  };

  try {
    // Save to Google Sheets via GAS
    if (GAS_URL) {
      await saveToSheet(krathong);
    } else {
      console.log('No GAS URL – skipping sheet save (demo mode)');
    }

    // Send Discord notification
    await sendDiscordNotification(krathong);

    // Render krathong on screen
    renderKrathong(krathong);
    krathongData.push(krathong);
    updateCounter();
    updateRecent();

    // Reset form
    document.getElementById('wish-input').value = '';
    document.getElementById('char-counter').textContent = '0';
    showToast('🪷 ลอยกระทงสำเร็จ! ขอให้โชคดี');

    // Celebration effect
    celebrationEffect();

  } catch(err) {
    console.error(err);
    // Still render locally
    renderKrathong(krathong);
    krathongData.push(krathong);
    updateCounter();
    updateRecent();
    document.getElementById('wish-input').value = '';
    document.getElementById('char-counter').textContent = '0';
    showToast('🪷 ลอยกระทงแล้ว! (offline mode)');
    celebrationEffect();
  }

  btn.disabled = false;
  btn.innerHTML = '🪷 &nbsp;ลอยกระทง';
}

// ===== SAVE TO SHEET (GET + no-cors เพื่อแก้ CORS ของ GAS) =====
async function saveToSheet(k) {
  const params = new URLSearchParams({
    action: 'append',
    sheetId: SHEET_ID,
    userId: k.userId,
    displayName: k.displayName,
    pictureUrl: k.pictureUrl,
    wish: k.wish,
    style: String(k.style),
    timestamp: k.timestamp,
  });
  await fetch(GAS_URL + '?' + params.toString(), {
    method: 'GET',
    mode: 'no-cors',
  });
  return { success: true };
}

// ===== DISCORD NOTIFICATION =====
async function sendDiscordNotification(k) {
  const colorMap = [0x228B22, 0xFF69B4, 0x9B59B6, 0xFFD700, 0xE74C3C, 0x1ABC9C, 0xF39C12, 0x5DADE2];
  const styleNames = ['คลาสสิก', 'ชมพู', 'ม่วง', 'ทอง', 'แดง', 'เขียวมรกต', 'ส้ม', 'ฟ้า'];

  const body = {
    embeds: [{
      title: '🪷 กระทงใหม่ลอยมา!',
      description: `**${k.displayName}** ลอยกระทงพร้อมคำอธิษฐาน`,
      color: colorMap[k.style] || 0x228B22,
      fields: [
        { name: '💭 คำอธิษฐาน', value: k.wish, inline: false },
        { name: '🎨 สไตล์กระทง', value: styleNames[k.style] || 'คลาสสิก', inline: true },
        { name: '🕐 เวลา', value: k.timestamp, inline: true },
      ],
      thumbnail: { url: k.pictureUrl },
      footer: { text: 'ลอยกระทงดิจิทัล ๒๕๖๘ 🌕' },
    }]
  };

  await fetch(DISCORD_WEBHOOK, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body),
  });
}

// ===== RENDER KRATHONG =====

      <ellipse cx="30" cy="46" rx="26" ry="8" fill="#6B3410"/>

      <path d="M50,38 Q54,30 48,28 Q42,26 42,34 Z" fill="${col.petals[0]}" opacity="0.6"/>
      <!-- Candle -->
      <rect x="27" y="16" width="6" height="14" rx="3" fill="#FFF9C4"/>
      <!-- Flame base -->
      <ellipse cx="30" cy="15" rx="3.5" ry="2" fill="#FF8C00" class="candle-flame"/>

      <path d="M30,4 Q34,8 32,14 Q30,16 28,14 Q26,8 30,4 Z" fill="#FFD700" class="candle-flame"/>
      <path d="M30,7 Q32.5,10 31.5,13 Q30,14.5 28.5,13 Q27.5,10 30,7 Z" fill="#FFF176" opacity="0.9" class="candle-flame"/>

      <!-- Flower decoration -->

      <circle cx="20" cy="28" r="3" fill="#FFA0C0"/>
      <circle cx="40" cy="28" r="3" fill="#FFA0C0"/>
    </svg>
    <div class="ripple"></div>
    <div class="ripple"></div>
    <div class="ripple"></div>
  `;

  wrapper.addEventListener('click', () => showKrathongPopup(k));

// ===== POPUP =====
function showKrathongPopup(k) {
  document.getElementById('popup-avatar').src = k.pictureUrl;
  document.getElementById('popup-name').textContent = `🪷 ${k.displayName}`;
  document.getElementById('popup-wish').textContent = `"${k.wish}"`;
  document.getElementById('popup-time').textContent = `⏰ ${k.timestamp}`;
  document.getElementById('krathong-popup').classList.add('show');
}

function closePopup() {
  document.getElementById('krathong-popup').classList.remove('show');
}

// ===== COUNTER =====
function updateCounter() {
  floatCount = krathongData.length;
  document.getElementById('counter-num').textContent = floatCount;
}

// ===== RECENT LIST =====
const STYLE_COLORS = ['#2da44e','#FF1493','#8E44AD','#FFC200','#E74C3C','#1ABC9C','#F39C12','#5DADE2'];
const STYLE_EMOJI  = ['🌿','🌸','💜','✨','🌹','💎','🍊','🩵'];

function updateRecent() {
  const list = document.getElementById('recent-list');
  if (!list) return;
  const recent = [...krathongData].reverse().slice(0, 5);
  if (recent.length === 0) return;

  list.innerHTML = recent.map(k => {
    const color = STYLE_COLORS[k.style] || STYLE_COLORS[0];
    const emoji = STYLE_EMOJI[k.style] || '🪷';
    const avatarHtml = k.pictureUrl
      ? `<img class="recent-avatar" src="${k.pictureUrl}" onerror="this.outerHTML='<div class=\'recent-dot\' style=\'background:rgba(255,255,255,0.06)\'>${emoji}</div>'">`
      : `<div class="recent-dot" style="background:rgba(255,255,255,0.06)">${emoji}</div>`;
    return `
      <div class="recent-item">
        ${avatarHtml}
        <div class="recent-info">
          <div class="recent-name">${escHtml(k.displayName)}</div>
          <div class="recent-wish">${k.wish ? escHtml(k.wish) : '—'}</div>
        </div>
        <div class="recent-badge" style="background:${color};opacity:0.8;box-shadow:0 0 6px ${color}55;"></div>
      </div>`;
  }).join('');
}

function escHtml(s) {
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ===== TOAST =====
function showToast(msg) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 3000);
}

// ===== CELEBRATION =====
function celebrationEffect() {
  const emojis = ['🪷','✨','⭐','🌸','💫','🌕','🕯️'];
  for (let i = 0; i < 12; i++) {
    setTimeout(() => {
      const el = document.createElement('div');
      el.style.cssText = `
        position:fixed;
        left:${Math.random()*100}%;
        top:${Math.random()*50+20}%;
        font-size:${Math.random()*16+16}px;
        z-index:90;
        pointer-events:none;
        animation: celebFloat 2s ease-out forwards;
      `;
      el.textContent = emojis[Math.floor(Math.random()*emojis.length)];

      const style = document.createElement('style');
      style.textContent = `
        @keyframes celebFloat {
          from { transform: translateY(0) scale(1); opacity: 1; }
          to { transform: translateY(-120px) scale(0.5) rotate(${Math.random()*60-30}deg); opacity: 0; }
        }
      `;
      document.head.appendChild(style);
      document.body.appendChild(el);
      setTimeout(() => { el.remove(); style.remove(); }, 2500);
    }, i * 120);
  }
}
