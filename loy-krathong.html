<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ลอยกระทงดิจิทัล 🪷</title>

<!-- LINE LIFF SDK -->
<script src="https://static.line-scdn.net/liff/edge/versions/2.22.3/sdk.js"></script>

<style>
  @import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&family=Mitr:wght@300;400;600&display=swap');

  :root {
    --gold: #F4C542;
    --gold-dark: #C89B0A;
    --orange: #FF7A1A;
    --deep: #0a0a1a;
    --water-dark: #051428;
    --water-mid: #0a2545;
    --water-light: #0d3b6e;
    --lotus-pink: #F472B6;
    --lotus-pale: #FBCFE8;
    --candle: #FFD700;
    --smoke: rgba(255,220,100,0.15);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Sarabun', sans-serif;
    background: var(--deep);
    min-height: 100vh;
    min-height: -webkit-fill-available;
    overflow-x: hidden;
    overflow-y: auto;
    color: white;
    display: flex;
    flex-direction: column;
  }

  /* ===== NIGHT SKY ===== */
  #sky {
    position: fixed; top: 0; left: 0;
    width: 100%; height: 45%;
    background: linear-gradient(180deg, #020408 0%, #06112a 50%, #0a1f4a 100%);
    z-index: 0;
    overflow: hidden;
  }

  .star {
    position: absolute;
    border-radius: 50%;
    background: white;
    animation: twinkle var(--dur) ease-in-out infinite alternate;
  }

  @keyframes twinkle {
    from { opacity: var(--min-op); transform: scale(1); }
    to { opacity: 1; transform: scale(1.3); }
  }

  /* Moon */
  #moon {
    position: absolute;
    top: 12%; right: 12%;
    width: 70px; height: 70px;
    border-radius: 50%;
    background: radial-gradient(circle at 35% 35%, #fffde7, #fdd835 40%, #f9a825);
    box-shadow: 0 0 30px 10px rgba(253,216,53,0.3), 0 0 80px 20px rgba(253,216,53,0.15);
    animation: moonGlow 4s ease-in-out infinite alternate;
  }

  @keyframes moonGlow {
    from { box-shadow: 0 0 30px 10px rgba(253,216,53,0.3), 0 0 80px 20px rgba(253,216,53,0.15); }
    to { box-shadow: 0 0 40px 15px rgba(253,216,53,0.5), 0 0 100px 30px rgba(253,216,53,0.25); }
  }

  /* ===== KHOM LOI (Sky Lanterns) ===== */
  .khom-loi {
    position: fixed;
    width: 18px; height: 24px;
    z-index: 2;
    pointer-events: none;
    animation: floatUp var(--dur) linear forwards;
  }

  .khom-loi::before {
    content: '';
    position: absolute;
    top: 0; left: 50%; transform: translateX(-50%);
    width: 18px; height: 22px;
    background: radial-gradient(ellipse at 50% 30%, rgba(255,220,80,0.9) 0%, rgba(255,160,20,0.7) 60%, rgba(200,100,0,0.3) 100%);
    border-radius: 50% 50% 40% 40%;
    box-shadow: 0 0 12px 4px rgba(255,200,50,0.6);
    animation: lanternPulse 1.5s ease-in-out infinite alternate;
  }

  .khom-loi::after {
    content: '';
    position: absolute;
    bottom: -4px; left: 50%; transform: translateX(-50%);
    width: 2px; height: 6px;
    background: rgba(255,150,0,0.8);
    border-radius: 0 0 2px 2px;
  }

  @keyframes floatUp {
    from { transform: translateY(0) translateX(0); opacity: 1; }
    to { transform: translateY(-100vh) translateX(var(--drift)); opacity: 0; }
  }

  @keyframes lanternPulse {
    from { box-shadow: 0 0 12px 4px rgba(255,200,50,0.6); }
    to { box-shadow: 0 0 20px 8px rgba(255,220,80,0.9); }
  }

  /* ===== RIVER ===== */
  #river {
    position: fixed;
    top: 42%; left: 0;
    width: 100%; height: 58%;
    background: linear-gradient(180deg,
      #062040 0%,
      #083060 20%,
      #0a4080 40%,
      #083060 70%,
      #062040 100%
    );
    overflow: hidden;
    z-index: 1;
  }

  /* Water shimmer */
  .water-shimmer {
    position: absolute;
    top: 0; left: -100%;
    width: 300%; height: 100%;
    background: repeating-linear-gradient(
      90deg,
      transparent 0px,
      rgba(255,255,255,0.02) 2px,
      transparent 4px,
      transparent 20px
    );
    animation: waterFlow 8s linear infinite;
  }

  .water-shimmer:nth-child(2) {
    animation-duration: 12s;
    animation-direction: reverse;
    opacity: 0.5;
    background: repeating-linear-gradient(
      85deg,
      transparent 0px,
      rgba(100,200,255,0.03) 3px,
      transparent 6px,
      transparent 25px
    );
  }

  @keyframes waterFlow {
    from { transform: translateX(0); }
    to { transform: translateX(33.33%); }
  }

  /* Moon reflection */
  .moon-reflection {
    position: absolute;
    top: 5%; left: 50%;
    transform: translateX(-50%);
    width: 20px;
    height: 120px;
    background: linear-gradient(180deg, rgba(253,216,53,0.6) 0%, rgba(253,216,53,0.1) 60%, transparent 100%);
    border-radius: 50%;
    filter: blur(8px);
    animation: reflectionWave 3s ease-in-out infinite alternate;
  }

  @keyframes reflectionWave {
    from { transform: translateX(-50%) scaleX(1); opacity: 0.7; }
    to { transform: translateX(-50%) scaleX(1.5); opacity: 1; }
  }

  /* ===== FLOATING KRATHONG ===== */
  .krathong {
    position: absolute;
    cursor: pointer;
    animation: floatDrift var(--dur) ease-in-out infinite alternate,
               driftAcross var(--cross-dur) linear forwards;
    transform-origin: center bottom;
    z-index: 10;
    transition: transform 0.3s;
  }

  .krathong:hover { transform: scale(1.15); }

  @keyframes floatDrift {
    from { transform: translateY(0px) rotate(-2deg); }
    to { transform: translateY(-8px) rotate(2deg); }
  }

  @keyframes driftAcross {
    from { left: var(--start-x); top: var(--start-y); }
    to { left: calc(var(--start-x) + var(--drift-x)); top: calc(var(--start-y) + var(--drift-y)); }
  }

  .krathong-svg {
    filter: drop-shadow(0 2px 8px rgba(0,0,0,0.5));
  }

  .candle-flame {
    animation: flicker 0.3s ease-in-out infinite alternate;
    transform-origin: bottom center;
  }

  @keyframes flicker {
    from { transform: scaleX(1) scaleY(1); opacity: 1; }
    to { transform: scaleX(0.85) scaleY(1.1); opacity: 0.9; }
  }

  .ripple {
    position: absolute;
    bottom: -4px; left: 50%;
    transform: translateX(-50%);
    width: 60px; height: 10px;
    border-radius: 50%;
    border: 1px solid rgba(100,180,255,0.3);
    animation: rippleOut 2s ease-out infinite;
  }

  .ripple:nth-child(2) { animation-delay: 0.7s; }
  .ripple:nth-child(3) { animation-delay: 1.4s; }

  @keyframes rippleOut {
    from { transform: translateX(-50%) scale(0.5); opacity: 0.6; }
    to { transform: translateX(-50%) scale(2.5); opacity: 0; }
  }

  /* ===== BANK / GROUND ===== */
  .bank {
    position: sticky;
    bottom: 0;
    width: 100%; height: 40px;
    background: linear-gradient(180deg, #1a3a1a 0%, #0d2010 100%);
    z-index: 20;
    flex-shrink: 0;
  }

  .bank::before {
    content: '';
    position: absolute;
    top: -10px; left: 0;
    width: 100%; height: 15px;
    background: repeating-linear-gradient(
      90deg,
      #1e4a1e 0px, #2d6e2d 20px, #1e4a1e 40px
    );
    border-radius: 50% 50% 0 0;
    filter: blur(3px);
  }

  /* ===== TEMPLE SILHOUETTE ===== */
  #temple {
    position: fixed;
    bottom: 8%;
    right: 5%;
    z-index: 3;
    opacity: 0.6;
  }

  /* ===== UI PANEL ===== */
  #ui-panel {
    position: relative;
    z-index: 50;
    display: flex;
    justify-content: center;
    padding: 0 16px 16px;
    margin-top: auto;
  }

  #form-card {
    background: rgba(5, 20, 45, 0.92);
    backdrop-filter: blur(20px);
    border: 1px solid rgba(244, 197, 66, 0.3);
    border-radius: 20px;
    padding: 20px;
    width: 100%;
    max-width: 420px;
    box-shadow: 0 8px 40px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,215,0,0.1);
  }

  .form-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 16px;
  }

  #user-avatar {
    width: 46px; height: 46px;
    border-radius: 50%;
    border: 2px solid var(--gold);
    object-fit: cover;
    flex-shrink: 0;
  }

  .user-name {
    font-family: 'Mitr', sans-serif;
    font-size: 15px;
    font-weight: 600;
    color: var(--gold);
    line-height: 1.2;
  }

  #name-input {
    font-family: 'Mitr', sans-serif;
    font-size: 14px;
    font-weight: 600;
    color: var(--gold);
    background: transparent;
    border: none;
    border-bottom: 1px solid rgba(244,197,66,0.3);
    outline: none;
    width: 100%;
    padding: 2px 0;
    line-height: 1.4;
  }
  #name-input:focus {
    border-bottom-color: var(--gold);
  }
  #name-input::placeholder { color: rgba(244,197,66,0.4); }

  .user-sub {
    font-size: 11px;
    color: rgba(255,255,255,0.4);
    margin-top: 3px;
    font-family: monospace;
    letter-spacing: 0.02em;
  }

  .form-title {
    font-family: 'Mitr', sans-serif;
    text-align: center;
    font-size: 18px;
    font-weight: 600;
    color: var(--gold);
    letter-spacing: 0.05em;
    margin-bottom: 14px;
    text-shadow: 0 0 20px rgba(244,197,66,0.5);
  }

  .form-title span { font-size: 20px; }

  .input-group {
    position: relative;
    margin-bottom: 10px;
  }

  .input-group textarea,
  .input-group input {
    width: 100%;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(244,197,66,0.2);
    border-radius: 12px;
    padding: 12px 14px;
    color: white;
    font-family: 'Sarabun', sans-serif;
    font-size: 14px;
    outline: none;
    resize: none;
    transition: border-color 0.3s, box-shadow 0.3s;
  }

  .input-group textarea:focus,
  .input-group input:focus {
    border-color: rgba(244,197,66,0.6);
    box-shadow: 0 0 0 3px rgba(244,197,66,0.1);
  }

  .input-group textarea::placeholder,
  .input-group input::placeholder { color: rgba(255,255,255,0.3); }

  .char-count {
    position: absolute;
    bottom: 8px; right: 10px;
    font-size: 10px;
    color: rgba(255,255,255,0.3);
  }

  /* Krathong image picker */
  .krathong-picker {
    display: flex;
    flex-direction: row;
    gap: 8px;
    margin-bottom: 14px;
    overflow-x: auto;
    overflow-y: hidden;
    padding-bottom: 6px;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: thin;
    scrollbar-color: rgba(244,197,66,0.3) transparent;
  }
  .krathong-picker::-webkit-scrollbar { height: 3px; }
  .krathong-picker::-webkit-scrollbar-track { background: transparent; }
  .krathong-picker::-webkit-scrollbar-thumb { background: rgba(244,197,66,0.3); border-radius: 4px; }

  .k-option {
    flex: 0 0 72px;
    width: 72px;
    height: 72px;
    border: 2px solid rgba(255,255,255,0.12);
    border-radius: 10px;
    cursor: pointer;
    background: rgba(255,255,255,0.04);
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 4px;
    transition: all 0.2s;
    position: relative;
  }
  .k-option:hover { border-color: rgba(244,197,66,0.4); background: rgba(244,197,66,0.06); }
  .k-option.selected { border-color: var(--gold); background: rgba(244,197,66,0.12); box-shadow: 0 0 12px rgba(244,197,66,0.25); }
  .k-option img { width: 100%; height: 100%; object-fit: contain; }
  .k-option .k-check {
    position: absolute; top: 3px; right: 3px;
    width: 14px; height: 14px;
    background: var(--gold);
    border-radius: 50%;
    display: none;
    align-items: center;
    justify-content: center;
    font-size: 8px;
    color: #1a0a00;
    font-weight: 900;
  }
  .k-option.selected .k-check { display: flex; }

  .k-eye {
    position: absolute; bottom: 3px; right: 3px;
    width: 16px; height: 16px;
    background: rgba(0,0,0,0.55);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 9px;
    opacity: 0;
    transition: opacity 0.2s;
    cursor: pointer;
  }
  .k-option:hover .k-eye { opacity: 1; }

  .k-loading {
    grid-column: 1/-1;
    text-align: center;
    padding: 16px;
    font-size: 12px;
    color: rgba(255,255,255,0.35);
  }

  /* Krathong style picker */
  .style-label {
    font-size: 12px;
    color: rgba(255,255,255,0.5);
    margin-bottom: 8px;
  }

  .style-picker {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 6px;
    margin-bottom: 14px;
  }

  .style-option {
    flex: 1;
    padding: 8px 4px;
    border: 1.5px solid rgba(255,255,255,0.15);
    border-radius: 10px;
    cursor: pointer;
    text-align: center;
    transition: all 0.2s;
    background: rgba(255,255,255,0.04);
  }

  .style-option.selected {
    border-color: var(--gold);
    background: rgba(244,197,66,0.12);
    box-shadow: 0 0 10px rgba(244,197,66,0.2);
  }

  .style-option svg { display: block; margin: 0 auto 4px; }
  .style-option span { font-size: 10px; color: rgba(255,255,255,0.6); }
  .style-option.selected span { color: var(--gold); }

  /* Float button */
  #float-btn {
    width: 100%;
    padding: 14px;
    background: linear-gradient(135deg, #C89B0A 0%, #F4C542 50%, #C89B0A 100%);
    border: none;
    border-radius: 14px;
    color: #1a0a00;
    font-family: 'Mitr', sans-serif;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    letter-spacing: 0.05em;
    box-shadow: 0 4px 20px rgba(244,197,66,0.4);
    transition: all 0.3s;
    position: relative;
    overflow: hidden;
  }

  #float-btn::after {
    content: '';
    position: absolute;
    top: -50%; left: -60%;
    width: 40%; height: 200%;
    background: rgba(255,255,255,0.3);
    transform: skewX(-20deg);
    transition: left 0.5s;
  }

  #float-btn:hover::after { left: 120%; }
  #float-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(244,197,66,0.6); }
  #float-btn:active { transform: translateY(0); }
  #float-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

  /* ===== LOGIN SCREEN ===== */
  #login-screen {
    position: fixed;
    inset: 0;
    z-index: 100;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: radial-gradient(ellipse at center, #0a1f4a 0%, #020408 100%);
  }

  .login-logo { font-size: 72px; margin-bottom: 16px; animation: pulse 2s ease-in-out infinite; }

  @keyframes pulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.05); }
  }

  .login-title {
    font-family: 'Mitr', sans-serif;
    font-size: 28px;
    font-weight: 600;
    color: var(--gold);
    text-shadow: 0 0 30px rgba(244,197,66,0.8);
    margin-bottom: 6px;
  }

  .login-sub {
    font-size: 14px;
    color: rgba(255,255,255,0.5);
    margin-bottom: 40px;
  }

  #line-login-btn {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 16px 32px;
    background: #00C300;
    border: none;
    border-radius: 50px;
    color: white;
    font-family: 'Mitr', sans-serif;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    box-shadow: 0 4px 20px rgba(0,195,0,0.4);
    transition: all 0.3s;
  }

  #line-login-btn:hover { transform: translateY(-3px); box-shadow: 0 8px 30px rgba(0,195,0,0.6); }

  #line-login-btn svg { flex-shrink: 0; }

  /* ===== TOAST ===== */
  #toast {
    position: fixed;
    top: 20px; left: 50%;
    transform: translateX(-50%) translateY(-80px);
    z-index: 200;
    background: rgba(5,20,45,0.95);
    border: 1px solid var(--gold);
    border-radius: 12px;
    padding: 12px 20px;
    font-family: 'Mitr', sans-serif;
    font-size: 14px;
    color: white;
    transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    white-space: nowrap;
    box-shadow: 0 4px 20px rgba(0,0,0,0.5);
  }

  #toast.show { transform: translateX(-50%) translateY(0); }

  /* ===== KRATHONG POPUP ===== */
  #krathong-popup {
    position: fixed;
    inset: 0;
    z-index: 80;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(5px);
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s;
  }

  #krathong-popup.show { opacity: 1; pointer-events: all; }

  .popup-card {
    background: rgba(5,20,45,0.97);
    border: 1px solid rgba(244,197,66,0.4);
    border-radius: 20px;
    padding: 24px;
    width: 90%;
    max-width: 320px;
    text-align: center;
    box-shadow: 0 20px 60px rgba(0,0,0,0.8);
    transform: scale(0.9);
    transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  #krathong-popup.show .popup-card { transform: scale(1); }

  .popup-avatar {
    width: 52px; height: 52px;
    border-radius: 50%;
    border: 2px solid var(--gold);
    margin: 0 auto 10px;
    display: block;
  }

  .popup-name {
    font-family: 'Mitr', sans-serif;
    font-size: 14px;
    color: var(--gold);
    margin-bottom: 10px;
  }

  .popup-wish {
    font-size: 14px;
    color: rgba(255,255,255,0.8);
    line-height: 1.6;
    margin-bottom: 16px;
    font-style: italic;
  }

  .popup-close {
    padding: 8px 24px;
    background: rgba(244,197,66,0.15);
    border: 1px solid rgba(244,197,66,0.3);
    border-radius: 20px;
    color: var(--gold);
    font-family: 'Mitr', sans-serif;
    cursor: pointer;
    transition: all 0.2s;
  }

  .popup-close:hover { background: rgba(244,197,66,0.3); }

  /* Recent krathongs list */
  #recent-section {
    margin-top: 14px;
    border-top: 1px solid rgba(244,197,66,0.15);
    padding-top: 12px;
  }

  .recent-title {
    font-size: 11px;
    color: rgba(255,255,255,0.4);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .recent-list {
    display: flex;
    flex-direction: column;
    gap: 6px;
    max-height: 180px;
    overflow-y: auto;
  }

  .recent-list::-webkit-scrollbar { width: 3px; }
  .recent-list::-webkit-scrollbar-track { background: transparent; }
  .recent-list::-webkit-scrollbar-thumb { background: rgba(244,197,66,0.3); border-radius: 4px; }

  .recent-item {
    display: flex;
    align-items: center;
    gap: 8px;
    background: rgba(255,255,255,0.04);
    border-radius: 10px;
    padding: 7px 10px;
    animation: fadeSlideIn 0.4s ease forwards;
  }

  @keyframes fadeSlideIn {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .recent-avatar {
    width: 28px; height: 28px;
    border-radius: 50%;
    border: 1.5px solid rgba(244,197,66,0.4);
    object-fit: cover;
    flex-shrink: 0;
    background: rgba(255,255,255,0.1);
  }

  .recent-dot {
    width: 28px; height: 28px;
    border-radius: 50%;
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px;
    border: 1.5px solid rgba(244,197,66,0.3);
  }

  .recent-info { flex: 1; min-width: 0; }

  .recent-name {
    font-size: 12px;
    font-weight: 600;
    color: rgba(255,255,255,0.9);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .recent-wish {
    font-size: 11px;
    color: rgba(255,255,255,0.45);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    margin-top: 1px;
  }

  .recent-badge {
    width: 10px; height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  /* Loading spinner */
  .spinner {
    display: inline-block;
    width: 16px; height: 16px;
    border: 2px solid rgba(26,10,0,0.4);
    border-top-color: rgba(26,10,0,0.9);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    vertical-align: middle;
    margin-right: 6px;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* Counter */
  #krathong-counter {
    position: fixed;
    top: 16px; left: 16px;
    z-index: 30;
    background: rgba(5,20,45,0.8);
    border: 1px solid rgba(244,197,66,0.3);
    border-radius: 20px;
    padding: 6px 14px;

// gasGet — ลอง fetch ปกติก่อน (ถ้า GAS support CORS)
// ถ้าไม่ได้ ค่อย fallback ไป JSONP
async function gasGet(params) {
  const p = new URLSearchParams({ ...params, _: Date.now() });
  const url = GAS_URL + '?' + p;
  // ลอง fetch ปกติก่อน
  try {
    const res = await fetch(url, { mode: 'cors', cache: 'no-store' });
    if (res.ok) return await res.json();
  } catch(_) {}
  // Fallback: JSONP
  return new Promise((resolve, reject) => {
    const cb = '_cb' + Math.random().toString(36).slice(2);
    const t  = setTimeout(() => { cleanup(); reject(new Error('GAS timeout — กรุณา Re-deploy GAS')); }, 15000);
    let script;
    function cleanup() { clearTimeout(t); delete window[cb]; if(script) script.remove(); }
    window[cb] = (data) => { cleanup(); resolve(data); };
    const p2 = new URLSearchParams({ ...params, callback: cb, _: Date.now() });
    script = document.createElement('script');
    script.src = GAS_URL + '?' + p2;
    script.onerror = () => { cleanup(); reject(new Error('JSONP load error')); };
    document.head.appendChild(script);
  });
}

// ===== KRATHONG PICKER =====
async function loadAvailableKrathongs() {
  const picker = document.getElementById('krathong-picker');
  try {
    const data = await gasGet({ action: 'listKrathongs' });
    // ดึง File ID จากทุก URL format แล้วสร้าง thumbnail URL
    // (thumbnail ไม่ redirect จึงใช้ใน LIFF ได้)
    const extractId = (url, id) => {
      if (id && id.length > 10) return id;
      if (!url) return '';
      // https://drive.google.com/uc?export=view&id=FILE_ID
      const m1 = url.match(/[?&]id=([a-zA-Z0-9_-]+)/);
      if (m1) return m1[1];
      // https://lh3.googleusercontent.com/d/FILE_ID
      const m2 = url.match(/\/d\/([a-zA-Z0-9_-]+)/);
      if (m2) return m2[1];
      return '';
    };
    const toImgUrl = (fileId) =>
      fileId ? `https://drive.google.com/thumbnail?id=${fileId}&sz=w300` : '';

    availableKrathongs = (data.krathongs || [])
      .filter(k => k.active)
      .map(k => {
        const fid = extractId(k.url, k.id);
        return { ...k, fileId: fid, url: toImgUrl(fid) };
      });
    if (!availableKrathongs.length) {
      picker.innerHTML = '<div class="k-loading">ยังไม่มีกระทง กรุณาอัพโหลดในหน้าหลังบ้าน</div>';
      return;
    }
    picker.innerHTML = availableKrathongs.map((k, i) => `
      <div class="k-option" onclick="selectKrathong(${i})" id="kopt-${i}">
        <img src="${k.url}" alt="${k.name}"
          onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 60 60%22><text y=%2248%22 font-size=%2248%22>🪷</text></svg>'">
        <div class="k-check">✓</div>
        <div class="k-eye" onclick="openKPreview(${i}, event)">👁</div>
      </div>
    `).join('');
    // เลือกอันแรกอัตโนมัติ
    selectKrathong(0);
  } catch(e) {
    console.warn('loadAvailableKrathongs error:', e.message);
    // Fallback — แสดงกระทง default SVG ให้ใช้ได้ก่อน
    availableKrathongs = [
      { id:'default', url:'', name:'กระทงใบตอง', active:true },
    ];
    picker.innerHTML = `
      <div class="k-option selected" onclick="selectKrathong(0)" id="kopt-0">
        <svg viewBox="0 0 60 55" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:100%;padding:4px;">
          <ellipse cx="30" cy="46" rx="26" ry="8" fill="#6B3410"/>
          <ellipse cx="30" cy="40" rx="22" ry="7" fill="#228B22"/>
          <ellipse cx="30" cy="34" rx="18" ry="6" fill="#2da44e"/>
          <ellipse cx="30" cy="29" rx="14" ry="5.5" fill="#1a6b30"/>
          <circle cx="30" cy="26" r="4" fill="#FF69B4"/>
          <circle cx="30" cy="26" r="2.5" fill="#FFD700"/>
          <rect x="27" y="16" width="6" height="14" rx="3" fill="#FFF9C4"/>
          <path d="M30,4 Q34,8 32,14 Q30,16 28,14 Q26,8 30,4 Z" fill="#FFD700"/>
        </svg>
        <div class="k-check">✓</div>
      </div>
      <div style="grid-column:1/-1;font-size:10px;color:rgba(255,100,100,0.7);text-align:center;padding:4px 0;">
        ⚠️ โหลดรูปไม่ได้ — กรุณา Re-deploy GAS
      </div>
    `;
    selectedKrathong = availableKrathongs[0];
  }
}

async function initLiff() {

      return;

    const profile = await liff.getProfile();

      displayName: profile.displayName,
      pictureUrl:  profile.pictureUrl || 'https://via.placeholder.com/46x46/1a3a5c/gold?text=%F0%9F%AA%B7',
    };

    // โหลดชื่อที่บันทึกไว้ก่อน (ถ้ามี) หรือใช้ชื่อจาก LINE
    const savedName = localStorage.getItem('kr_name_' + userProfile.userId);
    userProfile.displayName = savedName || userProfile.displayName;

    document.getElementById('name-input').value  = userProfile.displayName;
    document.getElementById('user-uid').textContent = userProfile.userId;
    document.getElementById('user-avatar').src   = userProfile.pictureUrl;
    document.getElementById('login-screen').style.display = 'none';

    // บันทึกชื่อเมื่อแก้ไข
    document.getElementById('name-input').addEventListener('input', function() {
      userProfile.displayName = this.value.trim() || profile.displayName;
      localStorage.setItem('kr_name_' + userProfile.userId, userProfile.displayName);
    });

    // บันทึก user ลง sheet (upsert — ไม่เพิ่ม row ใหม่ถ้ามีอยู่แล้ว)
    saveUserToSheet(userProfile);
  
  } catch (err) {

    document.getElementById('login-screen').style.display = 'flex';
  }
}

async function loadExistingKrathongs() {

    const data = await gasGet({ action: 'list' });
    const rows = data.rows || [];
    rows.forEach(row => {
      const k = {
        userId:      row[0] || '',
        displayName: row[1] || '',
        pictureUrl:  row[2] || '',
        wish:        row[3] || '',
        style:       parseInt(row[4]) || 0,
        timestamp:   row[5] || '',
      };
      krathongData.push(k);
      renderKrathong(k);
    });
    updateCounter();
    updateRecent();
  } catch(e) {
    console.error('Load krathongs error:', e.message);
  }
}

async function floatKrathong() {
  if (!userProfile) { showToast('⚠️ กรุณาเข้าสู่ระบบก่อน'); return; }

  const wish = document.getElementById('wish-input').value.trim();
  if (!wish) { showToast('💭 กรุณาเขียนคำอธิษฐาน'); return; }

  const btn = document.getElementById('float-btn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> กำลังลอยกระทง...';

  if (!selectedKrathong) { showToast('🪷 กรุณาเลือกแบบกระทงก่อน'); btn.disabled=false; btn.innerHTML='🪷 &nbsp;ลอยกระทง'; return; }

  const krathong = {
    userId:      userProfile.userId,
    displayName: document.getElementById('name-input').value.trim() || userProfile.displayName,
    pictureUrl:  userProfile.pictureUrl,
    wish:        wish,
    krathongId:  selectedKrathong.fileId || selectedKrathong.id || '',
    krathongUrl: selectedKrathong.url,
    krathongName: selectedKrathong.name,
    timestamp:   new Date().toLocaleString('th-TH', { timeZone: 'Asia/Bangkok' }),
  };

  try {
    // Save to Google Sheets via GAS
    if (GAS_URL) {
      await saveToSheet(krathong);
    } else {
      console.log('No GAS URL – skipping sheet save (demo mode)');
    }

    // Send Discord notification
    await sendDiscordNotification(krathong);

    // Render krathong on screen
    renderKrathong(krathong);
    krathongData.push(krathong);
    updateCounter();
    updateRecent();

    // Reset form
    document.getElementById('wish-input').value = '';
    document.getElementById('char-counter').textContent = '0';
    showToast('🪷 ลอยกระทงสำเร็จ! ขอให้โชคดี');

    // Celebration effect
    celebrationEffect();

  } catch(err) {
    console.error(err);
    // Still render locally
    renderKrathong(krathong);
    krathongData.push(krathong);
    updateCounter();
    updateRecent();
    document.getElementById('wish-input').value = '';
    document.getElementById('char-counter').textContent = '0';
    showToast('🪷 ลอยกระทงแล้ว! (offline mode)');
    celebrationEffect();
  }

  btn.disabled = false;
  btn.innerHTML = '🪷 &nbsp;ลอยกระทง';
}

// ===== RENDER KRATHONG =====
function renderKrathong(k) {
  const river = document.getElementById('river');
  const wrapper = document.createElement('div');
  wrapper.className = 'krathong';

  const startX  = Math.random() * 80 + 5;
  const startY  = Math.random() * 50 + 20;
  const driftX  = (Math.random() - 0.3) * 200;
  const driftY  = (Math.random() - 0.5) * 60;
  const dur     = Math.random() * 2 + 1.5;
  const crossDur = Math.random() * 60 + 40;
  // แปลง krathongUrl เป็น thumbnail สำหรับ LIFF
  const _extractId = (url, id) => {
    if (id && id.length > 10) return id;
    if (!url) return '';
    const m1 = url.match(/[?&]id=([a-zA-Z0-9_-]+)/);
    if (m1) return m1[1];
    const m2 = url.match(/\/d\/([a-zA-Z0-9_-]+)/);
    if (m2) return m2[1];
    return '';
  };
  const _fid = _extractId(k.krathongUrl, k.krathongId);
  const imgUrl = _fid
    ? `https://drive.google.com/thumbnail?id=${_fid}&sz=w200`
    : (k.krathongUrl || '');

  wrapper.style.cssText = `
    --dur: ${dur}s;
    --cross-dur: ${crossDur}s;
    --start-x: ${startX}%;
    --start-y: ${startY}%;
    --drift-x: ${driftX}px;
    --drift-y: ${driftY}px;
    width: 70px;
  `;

  wrapper.innerHTML = imgUrl ? `
    <img class="krathong-svg" src="${imgUrl}" width="70" height="70"
      style="object-fit:contain;"
      onerror="this.style.display='none'">
    <div class="ripple"></div>
    <div class="ripple"></div>
    <div class="ripple"></div>
  ` : `
    <svg class="krathong-svg" width="60" height="55" viewBox="0 0 60 55" xmlns="http://www.w3.org/2000/svg">
      <ellipse cx="30" cy="46" rx="26" ry="8" fill="#6B3410"/>
      <ellipse cx="30" cy="40" rx="22" ry="7" fill="#228B22"/>
      <ellipse cx="30" cy="34" rx="18" ry="6" fill="#2da44e"/>
      <ellipse cx="30" cy="29" rx="14" ry="5.5" fill="#1a6b30"/>
      <circle cx="30" cy="26" r="4" fill="#FF69B4"/>
      <circle cx="30" cy="26" r="2.5" fill="#FFD700"/>
      <rect x="27" y="16" width="6" height="14" rx="3" fill="#FFF9C4"/>
      <path d="M30,4 Q34,8 32,14 Q30,16 28,14 Q26,8 30,4 Z" fill="#FFD700" class="candle-flame"/>
    </svg>
    <div class="ripple"></div>
    <div class="ripple"></div>
  `;

  wrapper.addEventListener('click', () => showKrathongPopup(k));
  river.appendChild(wrapper);
  setTimeout(() => wrapper.remove(), crossDur * 1000 + 3000);
}

function updateCounter() {

// ===== RECENT LIST =====
const STYLE_COLORS = ['#2da44e','#FF1493','#8E44AD','#FFC200','#E74C3C','#1ABC9C','#F39C12','#5DADE2'];
const STYLE_EMOJI  = ['🌿','🌸','💜','✨','🌹','💎','🍊','🩵'];

function updateRecent() {
  const list = document.getElementById('recent-list');
  if (!list) return;
  const recent = [...krathongData].reverse().slice(0, 5);
  if (recent.length === 0) return;

  list.innerHTML = recent.map(k => {
    const color = STYLE_COLORS[k.style] || STYLE_COLORS[0];
    const emoji = STYLE_EMOJI[k.style] || '🪷';
    const avatarHtml = k.pictureUrl
      ? `<img class="recent-avatar" src="${k.pictureUrl}" onerror="this.outerHTML='<div class=\'recent-dot\' style=\'background:rgba(255,255,255,0.06)\'>${emoji}</div>'">`
      : `<div class="recent-dot" style="background:rgba(255,255,255,0.06)">${emoji}</div>`;
    return `
      <div class="recent-item">
        ${avatarHtml}
        <div class="recent-info">
          <div class="recent-name">${escHtml(k.displayName)}</div>
          <div class="recent-wish">${k.wish ? escHtml(k.wish) : '—'}</div>
        </div>
        <div class="recent-badge" style="background:${color};opacity:0.8;box-shadow:0 0 6px ${color}55;"></div>
      </div>`;
  }).join('');
}

function escHtml(s) {
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ===== TOAST =====
function showToast(msg) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 3000);
}

// ===== CELEBRATION =====
function celebrationEffect() {
  const emojis = ['🪷','✨','⭐','🌸','💫','🌕','🕯️'];
  for (let i = 0; i < 12; i++) {
    setTimeout(() => {
      const el = document.createElement('div');
      el.style.cssText = `
        position:fixed;
        left:${Math.random()*100}%;
        top:${Math.random()*50+20}%;
        font-size:${Math.random()*16+16}px;
        z-index:90;
        pointer-events:none;
        animation: celebFloat 2s ease-out forwards;
      `;
      el.textContent = emojis[Math.floor(Math.random()*emojis.length)];

      const style = document.createElement('style');
      style.textContent = `
        @keyframes celebFloat {
          from { transform: translateY(0) scale(1); opacity: 1; }
          to { transform: translateY(-120px) scale(0.5) rotate(${Math.random()*60-30}deg); opacity: 0; }
        }
      `;
      document.head.appendChild(style);
      document.body.appendChild(el);
      setTimeout(() => { el.remove(); style.remove(); }, 2500);
    }, i * 120);
  }
}

// ===== หา/สร้าง folder =====
function getOrCreateFolder() {
  var folders = DriveApp.getFoldersByName(FOLDER_NAME);
  if (folders.hasNext()) return folders.next();
  return DriveApp.createFolder(FOLDER_NAME);
}

// ===== doGet — ดึงข้อมูล =====
function doGet(e) {
  var action = (e.parameter.action || '');

  // --- ดึงรายการกระทงจาก Sheets ---
  if (action === '' || action === 'list') {
    var ss    = SpreadsheetApp.openById(SHEET_ID);
    var sheet = ss.getSheets()[0];
    var data  = sheet.getDataRange().getValues();
    var rows  = data.length > 1 ? data.slice(1) : [];
    return json({ rows: rows });
  }

  // --- ดึงรายการไฟล์กระทง (สำหรับหลังบ้าน) ---
  if (action === 'listKrathongs') {
    var folder = getOrCreateFolder();
    var files  = folder.getFiles();
    var list   = [];
    while (files.hasNext()) {
      var f = files.next();
      list.push({
        id:      f.getId(),
        name:    f.getName(),
        url:     'https://drive.google.com/uc?export=view&id=' + f.getId(),
        active:  f.getDescription() !== 'inactive',
        size:    f.getSize(),
        created: f.getDateCreated().toLocaleString('th-TH'),
      });
    }
    return json({ krathongs: list, folderId: folder.getId() });
  }

  // --- เปิด/ปิดกระทง ---
  if (action === 'toggle') {
    var file = DriveApp.getFileById(e.parameter.fileId);
    var isActive = file.getDescription() !== 'inactive';
    file.setDescription(isActive ? 'inactive' : 'active');
    return json({ success: true, active: !isActive });
  }

  // --- ลบกระทง ---
  if (action === 'delete') {
    DriveApp.getFileById(e.parameter.fileId).setTrashed(true);
    return json({ success: true });
  }

  return json({ error: 'unknown action' });
}

// ===== doPost — อัพโหลดไฟล์ / บันทึกกระทง =====
function doPost(e) {
  var payload = JSON.parse(e.postData.contents);

  // --- อัพโหลดรูปกระทง ---

    var folder  = getOrCreateFolder();
    var bytes   = Utilities.base64Decode(payload.base64);

    var file    = folder.createFile(blob);
    file.setSharing(DriveApp.Access.ANYONE_WITH_LINK, DriveApp.Permission.VIEW);
    file.setDescription('active');
    return json({
      success: true,
      id:   file.getId(),
      url:  'https://drive.google.com/uc?export=view&id=' + file.getId(),
      name: file.getName(),
    });
