<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>POS - พนักงาน</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&family=Prompt:wght@500;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0c0c0e;--surface:#131316;--card:#1a1a1f;--card2:#202028;
  --accent:#f0b429;--accent2:#ffd166;--red:#ef4565;--green:#06d6a0;
  --blue:#4cc9f0;--text:#f0eff4;--muted:#6b6b80;--border:#2a2a35;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{background:var(--bg);color:var(--text);font-family:'Sarabun',sans-serif;height:100vh;overflow:hidden;display:flex;flex-direction:column;}

/* ── Topbar ── */
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:10px 18px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;gap:10px;}
.topbar h1{font-family:'Prompt',sans-serif;font-size:1rem;color:var(--accent);white-space:nowrap;}
.tab-btns{display:flex;gap:3px;background:var(--card);border-radius:9px;padding:3px;}
.tab-btn{padding:6px 13px;border:none;border-radius:7px;font-family:'Sarabun',sans-serif;font-size:0.82rem;font-weight:600;cursor:pointer;background:transparent;color:var(--muted);transition:all 0.15s;white-space:nowrap;}
.tab-btn.active{background:var(--accent);color:#000;}
.topbar-right{display:flex;align-items:center;gap:10px;}
.clock{font-family:'Prompt',sans-serif;font-size:0.85rem;color:var(--muted);}
.reload-btn{background:var(--card);border:1px solid var(--border);color:var(--muted);padding:6px 10px;border-radius:7px;cursor:pointer;font-size:0.8rem;transition:all 0.15s;}
.reload-btn:hover{border-color:var(--accent);color:var(--accent);}

/* ── Main layout ── */
.main-layout{display:flex;flex:1;overflow:hidden;}

/* ── Table Panel ── */
.table-panel{width:188px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;}
.table-panel-top{padding:10px 12px 8px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);}
.table-panel-title{font-size:0.72rem;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.05em;}
.table-count-select{background:var(--card);border:1px solid var(--border);color:var(--muted);padding:3px 6px;border-radius:6px;font-size:0.72rem;font-family:'Sarabun',sans-serif;}
.table-grid{padding:10px;display:grid;grid-template-columns:1fr 1fr;gap:7px;overflow-y:auto;flex:1;}
.table-chip{border-radius:10px;padding:10px 6px;text-align:center;cursor:pointer;border:2px solid var(--border);background:var(--card);transition:all 0.15s;position:relative;}
.table-chip:hover{border-color:var(--accent);}
.table-chip.active{border-color:var(--accent);background:#2a2010;}
.table-chip.has-order{border-color:var(--green);background:#051a12;}
.table-chip.has-order.active{border-color:var(--accent);}
.table-chip.closed{opacity:0.4;pointer-events:none;background:var(--card2);}
.table-chip-num{font-family:'Prompt',sans-serif;font-size:1.05rem;font-weight:700;}
.table-chip.active .table-chip-num{color:var(--accent);}
.table-chip.has-order .table-chip-num{color:var(--green);}
.table-chip-info{font-size:0.62rem;color:var(--muted);margin-top:1px;}
.table-chip.has-order .table-chip-info{color:var(--green);}
.tdot{position:absolute;top:5px;right:5px;width:6px;height:6px;border-radius:50%;background:var(--green);}
.closed-x{position:absolute;top:4px;right:5px;font-size:0.65rem;color:var(--red);}

/* ── Menu Panel ── */
.menu-panel{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.menu-top{padding:10px 14px;border-bottom:1px solid var(--border);display:flex;gap:8px;flex-shrink:0;}
.menu-search{flex:1;background:var(--card);border:1px solid var(--border);color:var(--text);padding:8px 12px;border-radius:9px;font-family:'Sarabun',sans-serif;font-size:0.88rem;}
.menu-search:focus{outline:none;border-color:var(--accent);}
.cat-bar{display:flex;gap:7px;padding:9px 14px;overflow-x:auto;scrollbar-width:none;border-bottom:1px solid var(--border);flex-shrink:0;}
.cat-bar::-webkit-scrollbar{display:none;}
.cat-chip{padding:5px 13px;border-radius:20px;border:1px solid var(--border);background:var(--card);color:var(--muted);font-family:'Sarabun',sans-serif;font-size:0.8rem;cursor:pointer;white-space:nowrap;transition:all 0.13s;}
.cat-chip.active{background:var(--accent);color:#000;border-color:var(--accent);font-weight:700;}
.menu-grid{flex:1;overflow-y:auto;overflow-x:hidden;padding:10px 14px;display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px;align-content:start;}
.mcard{background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden;cursor:pointer;transition:all 0.15s;user-select:none;}
.mcard:hover{border-color:var(--accent);transform:translateY(-2px);}
.mcard:active{transform:scale(0.97);}
.mcard.soldout{opacity:0.3;pointer-events:none;}
.menu-grid{flex:1;overflow-y:auto;overflow-x:hidden;padding:10px 14px;display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:8px;align-content:start;}
.mcard{background:var(--card);border:1px solid var(--border);border-radius:10px;overflow:hidden;cursor:pointer;transition:all 0.15s;user-select:none;}
.mcard:hover{border-color:var(--accent);transform:translateY(-2px);}
.mcard:active{transform:scale(0.97);}
.mcard.soldout{opacity:0.3;pointer-events:none;}
.mcard-img{width:100%;height:72px;background:var(--card2);display:flex;align-items:center;justify-content:center;font-size:1.6rem;position:relative;overflow:hidden;}
.mcard-img img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;}
.mcard-emoji{position:relative;z-index:1;pointer-events:none;}
.mcard-body{padding:7px;}
.mcard-name{font-size:0.78rem;font-weight:600;line-height:1.2;margin-bottom:2px;}
.mcard-price{font-family:'Prompt',sans-serif;color:var(--accent);font-size:0.82rem;font-weight:700;}
.mcard-opt{font-size:0.62rem;color:var(--muted);margin-top:1px;}

/* ── Bill Panel ── */
.bill-panel{width:290px;background:var(--surface);border-left:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;}
.bill-head{padding:12px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.bill-table-label{font-family:'Prompt',sans-serif;font-size:1rem;font-weight:700;}
.bill-table-label em{color:var(--accent);font-style:normal;}
.bill-head-btns{display:flex;gap:6px;}
.hbtn{background:none;border:1px solid var(--border);color:var(--muted);padding:4px 9px;border-radius:7px;font-size:0.72rem;cursor:pointer;transition:all 0.13s;font-family:'Sarabun',sans-serif;}
.hbtn:hover{border-color:var(--red);color:var(--red);}
.hbtn.toggle-open{border-color:var(--green);color:var(--green);}
.hbtn.toggle-open:hover{background:var(--green);color:#000;}
.hbtn.toggle-closed{border-color:var(--red);color:var(--red);}
.hbtn.toggle-closed:hover{background:var(--red);color:#fff;}
.bill-body{flex:1;overflow-y:auto;padding:10px;}
.bill-empty{text-align:center;padding:30px 16px;color:var(--muted);font-size:0.83rem;}
.bill-empty i{font-size:2rem;display:block;margin-bottom:8px;font-style:normal;}
.brow{display:flex;align-items:flex-start;gap:8px;padding:7px 0;border-bottom:1px solid var(--border);}
.brow:last-child{border-bottom:none;}
.brow-info{flex:1;min-width:0;}
.brow-name{font-size:0.83rem;font-weight:600;line-height:1.3;}
.brow-opts{font-size:0.7rem;color:var(--accent);margin-top:1px;}
.brow-price{font-size:0.78rem;color:var(--muted);margin-top:1px;}
.brow-ctrl{display:flex;align-items:center;gap:5px;flex-shrink:0;}
.qbtn{width:22px;height:22px;border-radius:50%;border:1px solid var(--border);background:var(--card);color:var(--text);font-size:0.8rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.13s;}
.qbtn:hover{background:var(--accent);color:#000;border-color:var(--accent);}
.qnum{font-weight:700;font-size:0.82rem;min-width:16px;text-align:center;}
.bill-foot{padding:12px 14px;border-top:1px solid var(--border);flex-shrink:0;}
.bill-note{width:100%;background:var(--card);border:1px solid var(--border);color:var(--text);padding:7px 10px;border-radius:7px;font-family:'Sarabun',sans-serif;font-size:0.8rem;resize:none;margin-bottom:9px;}
.bill-note:focus{outline:none;border-color:var(--accent);}
.bill-subtotal{display:flex;justify-content:space-between;font-size:0.8rem;color:var(--muted);margin-bottom:3px;}
.bill-total-row{display:flex;justify-content:space-between;font-family:'Prompt',sans-serif;font-size:1.1rem;font-weight:700;margin-bottom:10px;}
.bill-total-row em{color:var(--accent);font-style:normal;}
.bill-actions{display:grid;grid-template-columns:1fr 1fr;gap:7px;}
.bbtn{padding:10px 6px;border:none;border-radius:9px;font-family:'Sarabun',sans-serif;font-weight:700;font-size:0.82rem;cursor:pointer;transition:all 0.15s;text-align:center;}
.bbtn:active{transform:scale(0.96);}
.bbtn-send{background:var(--accent);color:#000;grid-column:1/-1;}
.bbtn-receipt{background:var(--card);border:1px solid var(--border);color:var(--text);}
.bbtn-pay{background:var(--green);color:#000;}
.bbtn:disabled{opacity:0.4;cursor:not-allowed;}

/* ── Summary Tab ── */
.sum-wrap{flex:1;overflow-y:auto;padding:18px;}
.sum-filter-bar{display:flex;align-items:center;gap:10px;margin-bottom:18px;flex-wrap:wrap;}
.sum-filter-label{font-size:0.8rem;color:var(--muted);font-weight:600;}
.sum-date-inp{background:var(--card);border:1px solid var(--border);color:var(--text);padding:7px 12px;border-radius:8px;font-family:'Sarabun',sans-serif;font-size:0.83rem;}
.sum-date-inp:focus{outline:none;border-color:var(--accent);}
.filter-btn{padding:7px 16px;border-radius:8px;border:none;font-family:'Sarabun',sans-serif;font-weight:700;font-size:0.82rem;cursor:pointer;background:var(--accent);color:#000;transition:all 0.15s;}
.filter-btn.sec{background:var(--card);border:1px solid var(--border);color:var(--muted);}
.sum-cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:22px;}
.scard{background:var(--card);border-radius:14px;padding:16px;border:1px solid var(--border);}
.scard-num{font-family:'Prompt',sans-serif;font-size:1.7rem;font-weight:800;color:var(--accent);}
.scard-label{font-size:0.77rem;color:var(--muted);margin-top:3px;}
.sum-section{font-family:'Prompt',sans-serif;font-size:0.9rem;color:var(--muted);margin-bottom:10px;margin-top:20px;}
.stable{width:100%;border-collapse:collapse;background:var(--card);border-radius:12px;overflow:hidden;border:1px solid var(--border);margin-bottom:20px;}
.stable th{background:var(--card2);padding:9px 12px;text-align:left;font-size:0.72rem;color:var(--muted);font-weight:700;text-transform:uppercase;}
.stable td{padding:9px 12px;font-size:0.82rem;border-top:1px solid var(--border);}
.stable tr:hover td{background:#1e1e26;}
.badge{padding:3px 9px;border-radius:20px;font-size:0.68rem;font-weight:700;}
.b-pending{background:#2a1a08;color:var(--accent);}
.b-cooking{background:#2a2000;color:#f39c12;}
.b-done{background:#051a12;color:var(--green);}
.b-paid{background:#0a1f2a;color:var(--blue);}
.top-menu-table{width:100%;border-collapse:collapse;background:var(--card);border-radius:12px;overflow:hidden;border:1px solid var(--border);}
.top-menu-table th{background:var(--card2);padding:9px 12px;text-align:left;font-size:0.72rem;color:var(--muted);font-weight:700;text-transform:uppercase;}
.top-menu-table td{padding:9px 12px;font-size:0.82rem;border-top:1px solid var(--border);}
.rank-num{font-family:'Prompt',sans-serif;font-weight:800;color:var(--accent);font-size:1rem;}

/* ── Options Modal ── */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.72);z-index:200;display:none;align-items:center;justify-content:center;}
.modal-bg.open{display:flex;}
.opt-box{background:var(--surface);border-radius:18px;padding:22px;width:92%;max-width:380px;border:1px solid var(--border);}
.opt-box-title{font-family:'Prompt',sans-serif;font-size:1rem;margin-bottom:14px;display:flex;align-items:center;gap:9px;}
.opt-glabel{font-size:0.72rem;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.05em;margin:13px 0 7px;}
.opt-chips{display:flex;flex-wrap:wrap;gap:7px;}
.opt-chip{padding:8px 15px;border-radius:50px;border:1.5px solid var(--border);background:var(--card);color:var(--text);font-family:'Sarabun',sans-serif;font-size:0.86rem;cursor:pointer;transition:all 0.13s;}
.opt-chip.sel{background:var(--accent);color:#000;border-color:var(--accent);font-weight:700;}
.opt-box-actions{display:flex;gap:8px;margin-top:18px;}
.opt-cancel{padding:11px 18px;background:var(--card);border:1px solid var(--border);color:var(--text);border-radius:9px;font-family:'Sarabun',sans-serif;cursor:pointer;}
.opt-confirm{flex:1;padding:11px;background:var(--accent);color:#000;border:none;border-radius:9px;font-family:'Sarabun',sans-serif;font-weight:700;font-size:0.88rem;cursor:pointer;}
.opt-confirm:disabled{background:var(--muted);cursor:not-allowed;}

/* ── Receipt ── */
.receipt-bg{position:fixed;inset:0;background:rgba(0,0,0,0.8);z-index:300;display:none;align-items:center;justify-content:center;}
.receipt-bg.open{display:flex;}
.receipt-paper{background:#fff;color:#111;border-radius:4px;padding:22px;width:310px;font-family:'Sarabun',sans-serif;max-height:90vh;overflow-y:auto;}
.rh{text-align:center;border-bottom:1px dashed #bbb;padding-bottom:10px;margin-bottom:10px;}
.rh h2{font-size:1rem;font-weight:700;}
.rh p{font-size:0.75rem;color:#666;margin-top:2px;}
.rrow{display:flex;justify-content:space-between;font-size:0.8rem;margin-bottom:3px;}
.rrow.opts-row{font-size:0.7rem;color:#888;margin-left:10px;margin-bottom:2px;}
.rrow.total{font-weight:700;font-size:0.92rem;border-top:1px dashed #bbb;padding-top:7px;margin-top:7px;}
.rfoot{text-align:center;font-size:0.72rem;color:#999;margin-top:10px;border-top:1px dashed #bbb;padding-top:8px;}
.receipt-actions{display:flex;gap:8px;margin-top:12px;}
.r-print{flex:1;padding:9px;background:#111;color:#fff;border:none;border-radius:7px;font-family:'Sarabun',sans-serif;font-weight:700;cursor:pointer;}
.r-close{padding:9px 14px;background:#eee;border:none;border-radius:7px;cursor:pointer;font-family:'Sarabun',sans-serif;}

/* ── Toast ── */
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(60px);background:var(--surface);color:var(--text);padding:11px 22px;border-radius:12px;font-size:0.88rem;z-index:999;border:1px solid var(--border);opacity:0;transition:all 0.28s;pointer-events:none;white-space:nowrap;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

@media print{
  body>*:not(.receipt-bg){display:none!important;}
  .receipt-bg{display:flex!important;position:static!important;background:none!important;}
  .receipt-actions{display:none!important;}
}
</style>
</head>
<body>

<div class="topbar">
  <div style="display:flex;align-items:center;gap:10px;">
    <h1>🧾 POS</h1>
    <div class="tab-btns">
      <button class="tab-btn active" onclick="gotoTab('pos',this)">🍽️ สั่งอาหาร</button>
      <button class="tab-btn" onclick="gotoTab('summary',this)">📊 ยอดขาย</button>
    </div>
  </div>
  <div class="topbar-right">
    <button class="reload-btn" onclick="loadData()">🔄</button>
    <span class="clock" id="clock"></span>
  </div>
</div>

<!-- POS Tab -->
<div class="main-layout" id="tab-pos">

  <!-- Table Panel -->
  <div class="table-panel">
    <div class="table-panel-top">
      <span class="table-panel-title">โต๊ะ</span>
      <select class="table-count-select" id="tableCountSel" onchange="renderTableGrid()">
        <option value="5">5</option><option value="8">8</option>
        <option value="10" selected>10</option><option value="15">15</option>
        <option value="20">20</option><option value="30">30</option>
      </select>
    </div>
    <div class="table-grid" id="tableGrid"></div>
  </div>

  <!-- Menu Panel -->
  <div class="menu-panel">
    <div class="menu-top">
      <input class="menu-search" id="menuSearch" placeholder="🔍 ค้นหาเมนู..." oninput="renderMenu()">
    </div>
    <div class="cat-bar" id="catBar"></div>
    <div class="menu-grid" id="menuGrid">
      <div style="grid-column:1/-1;text-align:center;padding:50px;color:var(--muted);">กำลังโหลด...</div>
    </div>
  </div>

  <!-- Bill Panel -->
  <div class="bill-panel">
    <div class="bill-head">
      <div class="bill-table-label">โต๊ะ <em id="billNum">1</em></div>
      <div class="bill-head-btns">
        <button class="hbtn toggle-open" id="tableToggleBtn" onclick="toggleCurrentTable()">เปิดอยู่</button>
        <button class="hbtn" onclick="clearBill()">🗑 ล้าง</button>
      </div>
    </div>
    <div class="bill-body" id="billBody">
      <div class="bill-empty"><i>🛒</i>เลือกเมนูจากด้านซ้าย</div>
    </div>
    <div class="bill-foot">
      <textarea class="bill-note" id="billNote" rows="2" placeholder="หมายเหตุ..."></textarea>
      <div class="bill-subtotal"><span>รายการ</span><span id="billCount">0 รายการ</span></div>
      <div class="bill-total-row"><span>รวม</span><em id="billTotal">฿0</em></div>
      <div class="bill-actions">
        <button class="bbtn bbtn-send" id="sendBtn" onclick="sendOrder()">📤 ส่งครัว</button>
        <button class="bbtn bbtn-receipt" onclick="showReceipt()">🧾 ใบเสร็จ</button>
        <button class="bbtn bbtn-pay" onclick="markPaid()">✅ ชำระแล้ว</button>
      </div>
    </div>
  </div>
</div>

<!-- Summary Tab -->
<div class="main-layout" id="tab-summary" style="display:none;">
  <div class="sum-wrap">
    <div class="sum-filter-bar">
      <span class="sum-filter-label">ช่วงวันที่:</span>
      <input class="sum-date-inp" type="date" id="dateFrom">
      <span style="color:var(--muted);font-size:0.85rem;">ถึง</span>
      <input class="sum-date-inp" type="date" id="dateTo">
      <button class="filter-btn" onclick="renderSummary()">ดูรายงาน</button>
      <button class="filter-btn sec" onclick="setToday()">วันนี้</button>
      <button class="filter-btn sec" onclick="setThisMonth()">เดือนนี้</button>
    </div>
    <div class="sum-cards">
      <div class="scard"><div class="scard-num" id="sOrders">-</div><div class="scard-label">ออเดอร์ทั้งหมด</div></div>
      <div class="scard"><div class="scard-num" id="sRevenue">-</div><div class="scard-label">ยอดขาย (฿)</div></div>
      <div class="scard"><div class="scard-num" id="sPaid">-</div><div class="scard-label">ชำระแล้ว (฿)</div></div>
      <div class="scard"><div class="scard-num" id="sPending">-</div><div class="scard-label">รอดำเนินการ</div></div>
    </div>

    <div class="sum-section">🏆 เมนูขายดี</div>
    <table class="top-menu-table">
      <thead><tr><th>#</th><th>เมนู</th><th>จำนวน</th><th>ยอด (฿)</th></tr></thead>
      <tbody id="topMenuBody"></tbody>
    </table>

    <div class="sum-section">📋 รายการออเดอร์</div>
    <table class="stable">
      <thead><tr><th>ออเดอร์</th><th>โต๊ะ</th><th>รายการ</th><th>รวม</th><th>สถานะ</th><th>เวลา</th></tr></thead>
      <tbody id="orderTableBody"></tbody>
    </table>
  </div>
</div>

<!-- Options Modal -->
<div class="modal-bg" id="optModal">
  <div class="opt-box">
    <div class="opt-box-title"><span id="oEmoji"></span><span id="oName"></span></div>
    <div id="oGroups"></div>
    <div class="opt-box-actions">
      <button class="opt-cancel" onclick="closeOptModal()">ยกเลิก</button>
      <button class="opt-confirm" id="oConfirm" onclick="confirmOpt()">+ เพิ่ม</button>
    </div>
  </div>
</div>

<!-- Receipt Modal -->
<div class="receipt-bg" id="receiptBg">
  <div class="receipt-paper">
    <div class="rh">
      <h2 id="rName"></h2>
      <p id="rDate"></p>
      <p>โต๊ะ <strong id="rTable"></strong></p>
    </div>
    <div id="rItems"></div>
    <div class="rrow total"><span>รวมทั้งสิ้น</span><span id="rTotal"></span></div>
    <div class="rfoot">ขอบคุณที่ใช้บริการ 🙏</div>
    <div class="receipt-actions">
      <button class="r-print" onclick="window.print()">🖨️ พิมพ์</button>
      <button class="r-close" onclick="document.getElementById('receiptBg').classList.remove('open')">ปิด</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const GAS = 'https://script.google.com/macros/s/AKfycbzX3F5pmXMe2lerCHLPDn9Ky3Tf8ToFR0AwpD8Q6rm5_GcjVWRdlRfp-UJZbVdFnKll/exec';

let menu = [], allOrders = [], restaurantName = 'ร้านอาหาร';
let tableStates = {}; // { '1': false = closed }
let currentTable = 1, currentCat = 'ทั้งหมด';
let bills = {}; // { tableNum: [cartEntry] }
let optItem = null, optSel = {};

// ── Init ──────────────────────────────────────────────────────
window.onload = () => {
  setInterval(() => document.getElementById('clock').textContent = new Date().toLocaleTimeString('th-TH'), 1000);
  setToday();
  loadData();
  setInterval(loadData, 30000);
};

async function loadData() {
  try {
    const r = await fetch(GAS + '?action=getAll');
    const d = await r.json();
    menu           = (d.menu || []).filter(m => m.name);
    allOrders      = d.orders || [];
    restaurantName = d.restaurantName || 'ร้านอาหาร';
    try { tableStates = JSON.parse(d.settings?.tableStates || '{}'); } catch(e) { tableStates = {}; }
    renderTableGrid();
    renderCategories();
    renderMenu();
    renderBill();
  } catch(e) { toast('โหลดไม่ได้ ⚠️'); }
}

// ── Tables ────────────────────────────────────────────────────
function tableCount() { return parseInt(document.getElementById('tableCountSel').value) || 10; }

function renderTableGrid() {
  const grid = document.getElementById('tableGrid');
  grid.innerHTML = '';
  for (let i = 1; i <= tableCount(); i++) {
    const active   = i === currentTable;
    const hasOrder = allOrders.some(o => String(o.table) === String(i) && !['เสร็จแล้ว','ชำระแล้ว'].includes(o.status));
    const closed   = tableStates[String(i)] === false;
    const billTotal = (bills[i]||[]).reduce((a,e)=>a+e.price*e.qty,0);
    const chip = document.createElement('div');
    chip.className = 'table-chip'+(active?' active':'')+(hasOrder?' has-order':'')+(closed?' closed':'');
    chip.innerHTML = (hasOrder?'<div class="tdot"></div>':(closed?'<div class="closed-x">✕</div>':''))+
      `<div class="table-chip-num">${i}</div>`+
      `<div class="table-chip-info">${billTotal>0?'฿'+billTotal.toLocaleString():hasOrder?'มีออเดอร์':closed?'ปิด':''}</div>`;
    chip.onclick = () => selectTable(i);
    grid.appendChild(chip);
  }
  // update toggle btn
  const closed = tableStates[String(currentTable)] === false;
  const btn = document.getElementById('tableToggleBtn');
  btn.textContent = closed ? 'ปิดอยู่' : 'เปิดอยู่';
  btn.className = 'hbtn ' + (closed ? 'toggle-closed' : 'toggle-open');
}

function selectTable(t) {
  currentTable = t;
  document.getElementById('billNum').textContent = t;
  renderTableGrid();
  renderBill();
}

async function toggleCurrentTable() {
  const closed = tableStates[String(currentTable)] === false;
  if (closed) { delete tableStates[String(currentTable)]; }
  else { tableStates[String(currentTable)] = false; }
  try {
    await fetch(GAS, { method:'POST', body: JSON.stringify({
      action:'saveSettings', settings:{ tableStates: JSON.stringify(tableStates) }
    })});
    toast((closed?'✅ เปิด':'🔒 ปิด') + ' โต๊ะ ' + currentTable);
  } catch(e) {}
  renderTableGrid();
}

// ── Menu ──────────────────────────────────────────────────────
function renderCategories() {
  const cats = ['ทั้งหมด', ...new Set(menu.map(m=>m.category).filter(Boolean))];
  document.getElementById('catBar').innerHTML = cats.map(c=>
    `<div class="cat-chip ${c===currentCat?'active':''}" onclick="selCat('${c}')">${c}</div>`
  ).join('');
}
function selCat(c) { currentCat=c; renderCategories(); renderMenu(); }

function renderMenu() {
  const q = (document.getElementById('menuSearch').value||'').toLowerCase();
  let items = currentCat==='ทั้งหมด'?menu:menu.filter(m=>m.category===currentCat);
  if (q) items = items.filter(m=>m.name.toLowerCase().includes(q));
  if (!items.length) {
    document.getElementById('menuGrid').innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:50px;color:var(--muted);">ไม่พบเมนู</div>';
    return;
  }
  document.getElementById('menuGrid').innerHTML = items.map(item => {
    const sold = item.available===false||item.available==='false';
    const opts = hasOpts(item);
    return `<div class="mcard ${sold?'soldout':''}" onclick="clickMenu('${item.id}')">
      <div class="mcard-img"><span class="mcard-emoji">${item.emoji||'🍽️'}</span>${item.image?`<img src="${item.image}" onload="this.previousSibling.style.display='none'" onerror="this.style.display='none'">`:''}</div>
      <div class="mcard-body">
        <div class="mcard-name">${item.name}</div>
        <div class="mcard-price">฿${Number(item.price).toLocaleString()}</div>
        ${opts?'<div class="mcard-opt">🎛️ มีตัวเลือก</div>':''}
      </div>
    </div>`;
  }).join('');
}

function hasOpts(item) {
  try { return !!(item.options&&JSON.parse(item.options).filter(g=>g.name&&g.choices?.length).length); } catch(e) { return false; }
}

// ── Add to Bill ───────────────────────────────────────────────
function clickMenu(id) {
  if (tableStates[String(currentTable)]===false) { toast('⛔ โต๊ะนี้ปิดอยู่'); return; }
  const item = menu.find(m=>m.id===id); if (!item) return;
  let groups = [];
  try { groups = item.options?JSON.parse(item.options).filter(g=>g.name&&g.choices?.length):[]; } catch(e) {}
  if (groups.length) openOptModal(item, groups);
  else pushBill(item, {});
}

function pushBill(item, opts) {
  if (!bills[currentTable]) bills[currentTable] = [];
  const extra = Object.values(opts).reduce((a,s)=>a+(s?.extraPrice||0),0);
  const price = item.price + extra;
  const key   = JSON.stringify(opts);
  const ex    = bills[currentTable].find(e=>e.id===item.id&&JSON.stringify(e.opts)===key);
  if (ex) { ex.qty++; } else {
    bills[currentTable].push({cartId:item.id+'-'+Date.now(),id:item.id,name:item.name,emoji:item.emoji||'',price,qty:1,opts});
  }
  renderBill(); renderTableGrid();
}

// ── Options Modal ─────────────────────────────────────────────
function openOptModal(item, groups) {
  optItem={item,groups}; optSel={};
  document.getElementById('oEmoji').textContent=item.emoji||'🍽️';
  document.getElementById('oName').textContent=item.name;
  renderOGroups(groups); updateOConfirm();
  document.getElementById('optModal').classList.add('open');
}
function closeOptModal() { document.getElementById('optModal').classList.remove('open'); optItem=null; optSel={}; }

function renderOGroups(groups) {
  document.getElementById('oGroups').innerHTML = groups.map(g=>`
    <div class="opt-glabel">${g.name}</div>
    <div class="opt-chips">${g.choices.map(c=>{
      const lb=typeof c==='object'?c.label:c, ep=typeof c==='object'?(c.extraPrice||0):0;
      const sel=optSel[g.name]?.label===lb;
      return `<div class="opt-chip ${sel?'sel':''}" onclick="selOpt('${g.name.replace(/'/g,"\\'")}','${lb.replace(/'/g,"\\'")}',${ep})">${lb}${ep>0?` <small>+฿${ep}</small>`:''}</div>`;
    }).join('')}</div>
  `).join('');
}
function selOpt(gn,lb,ep) { optSel[gn]={label:lb,extraPrice:ep}; if(optItem) renderOGroups(optItem.groups); updateOConfirm(); }
function updateOConfirm() {
  if (!optItem) return;
  const done=optItem.groups.every(g=>optSel[g.name]);
  const btn=document.getElementById('oConfirm');
  btn.disabled=!done;
  if (done) { const ex=Object.values(optSel).reduce((a,s)=>a+(s.extraPrice||0),0); btn.textContent=`+ เพิ่ม ฿${(optItem.item.price+ex).toLocaleString()}`; }
  else btn.textContent='+ เพิ่ม';
}
function confirmOpt() { if(!optItem)return; pushBill(optItem.item,{...optSel}); closeOptModal(); }

// ── Bill ──────────────────────────────────────────────────────
function renderBill() {
  const bill=bills[currentTable]||[];
  const body=document.getElementById('billBody');
  if (!bill.length) { body.innerHTML='<div class="bill-empty"><i>🛒</i>เลือกเมนูจากด้านซ้าย</div>'; document.getElementById('billTotal').textContent='฿0'; document.getElementById('billCount').textContent='0 รายการ'; return; }
  let total=0, count=0;
  body.innerHTML=bill.map(e=>{
    total+=e.price*e.qty; count+=e.qty;
    const ot=Object.values(e.opts).map(s=>typeof s==='object'?s.label:s).join(', ');
    return `<div class="brow">
      <div class="brow-info">
        <div class="brow-name">${e.emoji} ${e.name}</div>
        ${ot?`<div class="brow-opts">${ot}</div>`:''}
        <div class="brow-price">฿${e.price.toLocaleString()} × ${e.qty}</div>
      </div>
      <div class="brow-ctrl">
        <button class="qbtn" onclick="chgQty('${e.cartId}',-1)">−</button>
        <span class="qnum">${e.qty}</span>
        <button class="qbtn" onclick="chgQty('${e.cartId}',1)">+</button>
      </div>
    </div>`;
  }).join('');
  document.getElementById('billTotal').textContent='฿'+total.toLocaleString();
  document.getElementById('billCount').textContent=count+' รายการ';
}

function chgQty(cartId, d) {
  const bill=bills[currentTable]||[]; const idx=bill.findIndex(e=>e.cartId===cartId); if(idx===-1)return;
  bill[idx].qty+=d; if(bill[idx].qty<=0) bill.splice(idx,1);
  renderBill(); renderTableGrid();
}

function clearBill() {
  if (!(bills[currentTable]?.length)) return;
  if (!confirm('ล้างรายการโต๊ะ '+currentTable+'?')) return;
  bills[currentTable]=[]; document.getElementById('billNote').value='';
  renderBill(); renderTableGrid();
}

// ── Send Order ────────────────────────────────────────────────
async function sendOrder() {
  const bill=bills[currentTable]||[];
  if (!bill.length) { toast('ยังไม่มีรายการ'); return; }
  const items=bill.map(e=>{
    const ol=Object.values(e.opts).map(s=>typeof s==='object'?s.label:s);
    return {id:e.id,name:e.name+(ol.length?` (${ol.join(', ')})`:``),emoji:e.emoji,qty:e.qty,price:e.price,total:e.price*e.qty,opts:e.opts};
  });
  const orderId='POS-'+Date.now();
  const grand=items.reduce((a,b)=>a+b.total,0);
  const payload={action:'addOrder',orderId,table:currentTable,items,note:document.getElementById('billNote').value,total:grand,status:'รอดำเนินการ',time:new Date().toLocaleString('th-TH'),customer:{name:'พนักงาน (POS)',userId:'pos-staff'}};
  document.getElementById('sendBtn').disabled=true;
  try {
    await fetch(GAS,{method:'POST',body:JSON.stringify(payload)});
    bills[currentTable]=[]; document.getElementById('billNote').value='';
    renderBill(); await loadData(); toast('✅ ส่งครัวแล้ว — โต๊ะ '+currentTable);
  } catch(e) { toast('ส่งไม่ได้ ⚠️'); }
  document.getElementById('sendBtn').disabled=false;
}

// ── Mark Paid ─────────────────────────────────────────────────
async function markPaid() {
  const tableOrders=allOrders.filter(o=>String(o.table)===String(currentTable)&&!['ชำระแล้ว'].includes(o.status));
  if (!tableOrders.length&&!bills[currentTable]?.length) { toast('ไม่มีออเดอร์'); return; }
  if (!confirm('ยืนยันชำระเงินโต๊ะ '+currentTable+'?')) return;
  for (const o of tableOrders) {
    await fetch(GAS,{method:'POST',body:JSON.stringify({action:'updateOrderStatus',orderId:o.orderId,status:'ชำระแล้ว'})});
  }
  bills[currentTable]=[]; renderBill(); await loadData(); toast('💰 ชำระแล้ว — โต๊ะ '+currentTable);
}

// ── Receipt ───────────────────────────────────────────────────
function showReceipt() {
  const bill=bills[currentTable]||[];
  const tableOrders=allOrders.filter(o=>String(o.table)===String(currentTable)&&o.status!=='ชำระแล้ว');
  let all=[...bill];
  tableOrders.forEach(o=>{
    const raw=o.items;
    const items=Array.isArray(raw)?raw:(typeof raw==='string'&&raw.startsWith('[')?JSON.parse(raw):[]);
    if (Array.isArray(items)) items.forEach(i=>all.push({name:i.name,emoji:i.emoji||'',price:i.price,qty:i.qty,opts:{}}));
  });
  if (!all.length) { toast('ไม่มีรายการ'); return; }
  const total=all.reduce((a,e)=>a+e.price*e.qty,0);
  document.getElementById('rName').textContent=restaurantName;
  document.getElementById('rDate').textContent=new Date().toLocaleString('th-TH');
  document.getElementById('rTable').textContent=currentTable;
  document.getElementById('rTotal').textContent='฿'+total.toLocaleString();
  document.getElementById('rItems').innerHTML=all.map(e=>{
    const ot=Object.values(e.opts||{}).map(s=>typeof s==='object'?s.label:s).filter(Boolean).join(', ');
    return `<div class="rrow"><span>${e.emoji} ${e.name}</span><span>฿${(e.price*e.qty).toLocaleString()}</span></div>`+
           (ot?`<div class="rrow opts-row"><span>${ot}</span><span>×${e.qty}</span></div>`:'');
  }).join('');
  document.getElementById('receiptBg').classList.add('open');
}

// ── Summary ───────────────────────────────────────────────────
function setToday() {
  const d=new Date().toISOString().split('T')[0];
  document.getElementById('dateFrom').value=d;
  document.getElementById('dateTo').value=d;
}
function setThisMonth() {
  const now=new Date();
  const from=new Date(now.getFullYear(),now.getMonth(),1).toISOString().split('T')[0];
  const to  =new Date(now.getFullYear(),now.getMonth()+1,0).toISOString().split('T')[0];
  document.getElementById('dateFrom').value=from;
  document.getElementById('dateTo').value=to;
}

function parseOrderDate(o) {
  // time format: "16/3/2569 BE, 05:21:05" or ISO
  try {
    if (!o.time) return null;
    // Try orderId timestamp (more reliable)
    const match = String(o.orderId).match(/\d{13}/);
    if (match) return new Date(parseInt(match[0]));
    return new Date(o.time);
  } catch(e) { return null; }
}

function renderSummary() {
  const from=new Date(document.getElementById('dateFrom').value);
  const to  =new Date(document.getElementById('dateTo').value);
  to.setHours(23,59,59,999);

  const filtered=allOrders.filter(o=>{
    const d=parseOrderDate(o); if(!d) return true; // ถ้า parse ไม่ได้รวมทั้งหมด
    return d>=from&&d<=to;
  });

  const revenue=filtered.reduce((a,o)=>a+(Number(o.total)||0),0);
  const paid   =filtered.filter(o=>o.status==='ชำระแล้ว').reduce((a,o)=>a+(Number(o.total)||0),0);
  const pending=filtered.filter(o=>o.status==='รอดำเนินการ').length;

  document.getElementById('sOrders').textContent=filtered.length;
  document.getElementById('sRevenue').textContent=revenue.toLocaleString();
  document.getElementById('sPaid').textContent=paid.toLocaleString();
  document.getElementById('sPending').textContent=pending;

  // Top menus
  const menuCount={};
  filtered.forEach(o=>{
    const raw=o.items;
    const items=Array.isArray(raw)?raw:(typeof raw==='string'&&raw.startsWith('[')?(() =>{try{return JSON.parse(raw);}catch(e){return[];}})():[]);
    if (Array.isArray(items)) items.forEach(i=>{
      const key=i.name||'?';
      if (!menuCount[key]) menuCount[key]={qty:0,total:0};
      menuCount[key].qty+=i.qty||1;
      menuCount[key].total+=(i.price||0)*(i.qty||1);
    });
  });
  const topMenus=Object.entries(menuCount).sort((a,b)=>b[1].qty-a[1].qty).slice(0,10);
  document.getElementById('topMenuBody').innerHTML=topMenus.length
    ? topMenus.map(([name,v],i)=>`<tr><td><span class="rank-num">${i+1}</span></td><td>${name}</td><td>${v.qty}</td><td>฿${v.total.toLocaleString()}</td></tr>`).join('')
    : '<tr><td colspan="4" style="text-align:center;color:var(--muted);padding:16px;">ไม่มีข้อมูล</td></tr>';

  // Orders table
  const sc={รอดำเนินการ:'b-pending',กำลังทำ:'b-cooking',เสร็จแล้ว:'b-done',ชำระแล้ว:'b-paid'};
  document.getElementById('orderTableBody').innerHTML=[...filtered].reverse().map(o=>{
    const raw=o.items; let prev='';
    if (typeof raw==='string') prev=raw.replace(/\n/g,', ').substring(0,35)+(raw.length>35?'...':'');
    else if (Array.isArray(raw)) prev=raw.map(i=>i.name).join(', ').substring(0,35);
    return `<tr>
      <td style="font-size:0.72rem;color:var(--muted);">${(o.orderId||'').slice(-10)}</td>
      <td>โต๊ะ ${o.table}</td>
      <td style="font-size:0.75rem;color:var(--muted);max-width:110px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${prev}</td>
      <td>฿${Number(o.total).toLocaleString()}</td>
      <td><span class="badge ${sc[o.status]||''}">${o.status||'-'}</span></td>
      <td style="font-size:0.72rem;color:var(--muted);">${(o.time||'').substring(0,16)}</td>
    </tr>`;
  }).join('')||'<tr><td colspan="6" style="text-align:center;color:var(--muted);padding:18px;">ไม่มีออเดอร์ในช่วงนี้</td></tr>';
}

// ── Tab ───────────────────────────────────────────────────────
function gotoTab(tab, btn) {
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('tab-pos').style.display     = tab==='pos'?'flex':'none';
  document.getElementById('tab-summary').style.display = tab==='summary'?'flex':'none';
  if (tab==='summary') renderSummary();
}

// ── Toast ─────────────────────────────────────────────────────
function toast(msg) {
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  clearTimeout(t._t); t._t=setTimeout(()=>t.classList.remove('show'),2400);
}

// Init
selectTable(1);
</script>
</body>
</html>
